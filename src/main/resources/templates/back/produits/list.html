<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{back/fragments/layout :: head('Produits')}"></head>

  <body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('produits')}"></aside>

    <main class="bo-main">
      <header th:replace="~{back/fragments/layout :: topbar('Catalogue des produits')}"></header>

      <div class="bo-contenu">
        <div class="page-tete">
          <div>
            <p class="fil">Catalogue <i class="fas fa-chevron-right"></i> Produits</p>
            <h1>Catalogue des produits</h1>
            <p class="sous-titre">Gérez les produits proposés sur la boutique et leurs prix.</p>
          </div>
          <div class="page-actions">
            <a th:href="@{/back/stocks}" class="btn btn-ligne">
              <i class="fas fa-boxes-stacked"></i> Suivi des stocks
            </a>
            <a th:href="@{/back/produits/nouveau}" class="btn btn-vert">
              <i class="fas fa-plus"></i> Ajouter un produit
            </a>
          </div>
        </div>

        <th:block th:replace="~{back/fragments/layout :: alertes}"></th:block>

        <form th:action="@{/back/produits}" method="get" class="barre-filtres">
          <div class="filtre">
            <label for="idCategorie">Catégorie</label>
            <select name="idCategorie" id="idCategorie">
              <option value="">Toutes les catégories</option>
              <option
                th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.libelle}"
                th:selected="${cat.id == selectedCategorie}"
              ></option>
            </select>
          </div>

          <div class="filtre filtre-large">
            <label for="motCle">Mot clé</label>
            <input
              type="text"
              id="motCle"
              name="motCle"
              th:value="${motCle}"
              placeholder="Nom ou matricule du produit…"
            />
          </div>

          <div class="filtre-actions">
            <button type="submit" class="btn btn-vert">
              <i class="fas fa-magnifying-glass"></i> Rechercher
            </button>
          </div>
        </form>

        <div class="tableau-scroll">
          <table>
            <thead>
              <tr>
                <th>Matricule</th>
                <th>Nom</th>
                <th>Catégorie</th>
                <th class="num">Prix unitaire</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="p : ${produits}">
                <td class="mono" th:text="${p.matricule}"></td>
                <td><strong th:text="${p.nom}"></strong></td>
                <td>
                  <span
                    class="badge badge-feuille badge-sans-point"
                    th:text="${p.categorie != null ? p.categorie.libelle : 'Non spécifié'}"
                  ></span>
                </td>
                <td class="num texte-ocre" th:text="${p.pu + ' Ar'}"></td>
                <td>
                  <div class="cellule-actions">
                    <a th:href="@{/back/produits/detail/{id}(id=${p.id})}" class="btn btn-sm btn-ligne">
                      <i class="fas fa-eye"></i> Détail
                    </a>
                    <a th:href="@{/back/produits/modifier/{id}(id=${p.id})}" class="btn btn-sm btn-doux">
                      <i class="fas fa-pen"></i> Modifier
                    </a>
                    <a
                      th:href="@{/back/produits/supprimer/{id}(id=${p.id})}"
                      onclick="return confirm('Supprimer ce produit ?');"
                      class="btn btn-sm btn-doux-rouge"
                    >
                      <i class="fas fa-trash"></i> Supprimer
                    </a>
                  </div>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(produits)}">
                <td colspan="5">
                  <div class="vide">
                    <i class="fas fa-seedling"></i>
                    <p>Aucun produit ne correspond à cette recherche.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
  </body>
</html>
