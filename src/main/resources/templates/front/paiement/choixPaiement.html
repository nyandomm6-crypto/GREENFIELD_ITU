<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head
    th:replace="~{front/fragments/layout :: head(pageTitle='Choix du paiement - GreenField')}"
  >
    <title>Choix du paiement - GreenField</title>
  </head>

  <body th:replace="~{front/fragments/layout :: layout(~{::pageContent})}">
    <div th:fragment="pageContent">
      <!-- Single Page Header start -->
      <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Paiement</h1>
      </div>
      <!-- Single Page Header End -->

      <div class="container-fluid fruite py-5">
        <div class="container py-5">
          <div class="row g-4 justify-content-center">
            <div class="col-lg-8">
              <div th:if="${commande == null}" class="alert alert-warning">
                <i class="fas fa-exclamation-circle me-2"></i> Commande
                introuvable.
              </div>

              <div
                th:if="${commande != null}"
                class="card border-0 shadow-sm rounded-4"
              >
                <div class="card-body p-4 p-md-5">
                  <div class="text-center mb-4">
                    <h2 class="mb-1">
                      <i class="fas fa-money-bill-wave text-primary me-2"></i>
                      Commande #<span th:text="${commande.id}"></span>
                    </h2>
                    <p class="text-muted mb-0">
                      Choisissez comment vous souhaitez régler votre commande.
                    </p>
                  </div>

                  <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item d-flex justify-content-between">
                      <span class="text-muted">Total produits</span>
                      <strong th:text="${commande.totalGeneral}"></strong>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                      <span class="text-muted">Frais de livraison</span>
                      <strong th:text="${commande.fraisLivraison}"></strong>
                    </li>
                    <li class="list-group-item d-flex justify-content-between">
                      <span class="text-muted">Montant total à payer</span>
                      <strong class="text-primary" th:text="${montantTotal}"></strong>
                    </li>
                  </ul>

                  <div class="d-flex gap-3 flex-wrap justify-content-center">
                    <a
                      th:href="@{|/paiements/avance/${commande.id}|}"
                      class="btn btn-outline-primary rounded-pill px-4 py-3"
                    >
                      <i class="fas fa-hand-holding-usd me-2"></i> Payer l'avance
                    </a>
                    <a
                      th:href="@{|/paiements/total/${commande.id}|}"
                      class="btn btn-primary rounded-pill px-4 py-3"
                    >
                      <i class="fas fa-check me-2"></i> Payer en totalité
                    </a>
                  </div>

                  <div class="text-center mt-4">
                    <a
                      th:href="@{|/commandes/fo/detail/${commande.id}|}"
                      class="btn btn-link text-muted"
                    >
                      <i class="fas fa-arrow-left me-2"></i> Retour à la commande
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
