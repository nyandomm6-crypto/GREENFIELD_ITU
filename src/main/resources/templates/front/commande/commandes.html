<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{front/fragments/layout :: head(pageTitle='Mes commandes - GreenField')}"
  >
    <title>Mes commandes - GreenField</title>
  </head>

  <body th:replace="~{front/fragments/layout :: layout(~{::pageContent})}">
    <div th:fragment="pageContent">
      <!-- Single Page Header start -->
      <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Mes commandes</h1>
        <ol class="breadcrumb justify-content-center mb-0">
          <li class="breadcrumb-item"><a th:href="@{/}">Accueil</a></li>
          <li class="breadcrumb-item active text-white">Mes commandes</li>
        </ol>
      </div>
      <!-- Single Page Header End -->

      <!-- Commandes Start -->
      <div class="container-fluid fruite py-5">
        <div class="container py-5">
          <div class="row g-4">
            <div class="col-lg-12">
              <div class="row g-4">
                <!-- En-tête -->
                <div class="col-12">
                  <div
                    class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4"
                  >
                    <div>
                      <h2 class="mb-0">
                        <i class="fas fa-receipt text-primary me-2"></i>Mes
                        commandes
                      </h2>
                      <p class="text-muted mb-0">
                        Consultez vos commandes, leur statut actuel et leur
                        détail.
                      </p>
                    </div>
                    <div>
                      <a
                        th:href="@{/produits}"
                        class="btn btn-primary rounded-pill px-4 py-2"
                      >
                        <i class="fa fa-plus me-2"></i> Nouvelle commande
                      </a>
                    </div>
                  </div>
                </div>

                <!-- Liste des commandes -->
                <div
                  class="col-12"
                  th:if="${commandes != null and !commandes.isEmpty()}"
                >
                  <div class="row g-4">
                    <div class="col-12" th:each="commande : ${commandes}">
                      <div class="card shadow-sm border-0 rounded-3">
                        <div class="card-body p-4">
                          <!-- En-tête commande -->
                          <div
                            class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3"
                          >
                            <div>
                              <h5 class="card-title mb-1">
                                <i class="fas fa-receipt text-primary me-2"></i>
                                Commande #<span th:text="${commande.id}"></span>
                              </h5>
                              <div class="text-muted small">
                                <span
                                  th:text="${#dates.format(commande.datecommande, 'dd/MM/yyyy HH:mm')}"
                                ></span>
                                <span class="mx-2">|</span>
                                <i class="fas fa-truck me-1"></i>
                                <span
                                  th:text="${commande.modeReception}"
                                ></span>
                              </div>
                            </div>
                            <span
                              class="badge rounded-pill px-3 py-2"
                              th:classappend="${commande.statutActuel != null and commande.statutActuel.nom == 'Validee'} ? 'bg-success' : (${commande.statutActuel != null and commande.statutActuel.nom == 'En cours'} ? 'bg-warning text-dark' : (${commande.statutActuel != null and commande.statutActuel.nom == 'Livree'} ? 'bg-info' : (${commande.statutActuel != null and commande.statutActuel.nom == 'Annulee'} ? 'bg-danger' : (${commande.statutActuel != null and commande.statutActuel.nom == 'Remboursee'} ? 'bg-secondary' : 'bg-secondary'))))"
                              th:text="${commande.statutActuel != null and commande.statutActuel.nom != null ? commande.statutActuel.nom : 'En attente'}"
                            >
                            </span>
                          </div>

                          <!-- Informations commande -->
                          <div class="row g-3">
                            <div class="col-md-3 col-6">
                              <div class="bg-light rounded-3 p-3 text-center">
                                <small class="text-muted d-block"
                                  ><i class="fas fa-user me-1"></i>Client</small
                                >
                                <strong
                                  th:text="${commande.client != null ? commande.client.prenom + ' ' + commande.client.nom : 'Non défini'}"
                                ></strong>
                              </div>
                            </div>
                            <div class="col-md-3 col-6">
                              <div class="bg-light rounded-3 p-3 text-center">
                                <small class="text-muted d-block"
                                  ><i class="fas fa-credit-card me-1"></i
                                  >Total</small
                                >
                                <strong
                                  class="text-primary"
                                  th:text="${#numbers.formatDecimal(commande.totalGeneral, 0, 'DEFAULT', 0, 'DEFAULT') + ' Ar'}"
                                ></strong>
                              </div>
                            </div>
                            <div class="col-md-3 col-6">
                              <div class="bg-light rounded-3 p-3 text-center">
                                <small class="text-muted d-block"
                                  ><i class="fas fa-boxes me-1"></i
                                  >Produits</small
                                >
                                <strong
                                  th:text="${commande.totalProduits != null ? commande.totalProduits : 0}"
                                ></strong>
                              </div>
                            </div>
                            <div class="col-md-3 col-6">
                              <div class="bg-light rounded-3 p-3 text-center">
                                <small class="text-muted d-block"
                                  ><i class="fas fa-truck me-1"></i
                                  >Réception</small
                                >
                                <strong
                                  th:text="${commande.modeReception != null ? commande.modeReception : 'Non défini'}"
                                ></strong>
                              </div>
                            </div>
                          </div>

                          <!-- Actions -->
                          <div class="mt-3 text-end">
                            <a
                              th:href="@{|/commandes/${commande.id}|}"
                              class="btn btn-outline-primary rounded-pill px-4"
                            >
                              <i class="fas fa-eye me-2"></i> Voir le détail
                            </a>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Message si aucune commande -->
                <div
                  class="col-12"
                  th:unless="${commandes != null and !commandes.isEmpty()}"
                >
                  <div class="text-center py-5">
                    <i class="fas fa-inbox fa-4x text-muted mb-3"></i>
                    <h4 class="text-muted">Aucune commande trouvée</h4>
                    <p class="text-muted">
                      Vous n'avez pas encore passé de commande.
                    </p>
                    <a
                      th:href="@{/produits}"
                      class="btn btn-primary rounded-pill px-4 py-2 mt-2"
                    >
                      <i class="fas fa-shopping-bag me-2"></i> Découvrir nos
                      produits
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Commandes End -->
    </div>
  </body>
</html>
