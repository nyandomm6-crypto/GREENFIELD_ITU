<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head th:replace="~{back/fragments/layout :: head('Importation de commandes')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('commandes')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Commandes')}"></header>

        <div class="bo-contenu bo-contenu-etroit">

            <div class="page-tete">
                <div>
                    <p class="fil"><a th:href="@{/commandes/list}">Commandes</a> / Importation</p>
                    <h1>Importation de commandes</h1>
                </div>
                <div class="page-actions">
                    <a th:href="@{/commandes/list}" class="btn btn-ligne">Voir la liste</a>
                    <a th:href="@{/commandes/api/download-template}" class="btn btn-doux"><i class="fa-solid fa-download"></i> Télécharger le modèle</a>
                    <a th:href="@{/commandes/form/new}" class="btn btn-vert"><i class="fa-solid fa-arrow-left"></i> Retour au formulaire</a>
                </div>
            </div>

            <div th:if="${alert}" class="alerte alerte-erreur" th:text="${alert}"></div>
            <div th:if="${error}" class="alerte alerte-erreur" th:text="${error}"></div>
            <div th:if="${succes}" class="alerte alerte-succes" th:text="${succes}"></div>
            <div th:if="${message}" class="alerte alerte-succes" th:text="${message}"></div>

            <div class="carte">
                <div class="carte-tete">
                    <h2><i class="fa-solid fa-file-excel"></i> Importer un fichier Excel</h2>
                </div>
                <div class="carte-corps">
                    <form th:action="@{/commandes/importExcel}" method="post" enctype="multipart/form-data">
                        <div class="champ">
                            <label for="file">Sélectionnez un fichier Excel</label>
                            <input type="file" id="file" name="file" accept=".xlsx" required />
                            <span class="aide">Format .xlsx uniquement, généré depuis le modèle ci-dessus.</span>
                        </div>
                        <div class="barre-form">
                            <button type="submit" class="btn btn-vert"><i class="fa-solid fa-upload"></i> Importer</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
