<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenfield - Ventes</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --panel2:#1c2333; --line:#30363d; --text:#e6edf3; --muted:#8b949e; --green:#2ea043; --blue:#58a6ff; --radius:16px; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1300px; margin:0 auto; padding:24px; }
    .topbar { display:flex; justify-content:space-between; gap:16px; align-items:center; flex-wrap:wrap; margin-bottom:18px; }
    a { color:var(--blue); text-decoration:none; }
    .panel { background:linear-gradient(180deg, rgba(28,35,51,.96), rgba(22,27,34,.96)); border:1px solid var(--line); border-radius:24px; padding:20px; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; margin:16px 0; }
    select { background:#0d1117; color:var(--text); border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
    .chart { height:520px; margin-top:12px; }
    canvas { width:100% !important; height:100% !important; }
    .hint { color:var(--muted); font-size:.9rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div style="color:var(--green); font-size:.78rem; text-transform:uppercase; letter-spacing:.14em;">Statistiques / Ventes</div>
        <h1 style="margin:.2rem 0 0;">Évolution des ventes</h1>
      </div>
      <a th:href="@{/dashboard}">Retour au dashboard</a>
    </div>

    <section class="panel">
      <div class="hint">Filtre sur une année ou un produit pour voir l’évolution journalière du chiffre d’affaires.</div>
      <div class="controls">
        <select id="filter-ventes-produit" onchange="loadVentesChart()">
          <option value="">Tous les produits</option>
        </select>
        <select id="filter-ventes-annee" onchange="loadVentesChart()">
          <option value="">Toutes les années</option>
          <option value="2026" selected>2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
          <option value="2022">2022</option>
        </select>
      </div>
      <div class="chart"><canvas id="chart-ventes"></canvas></div>
    </section>
  </div>

<script>
const API_BASE = '';
let ventesChart;

function getBase() { return API_BASE; }

async function loadProductsDropdown() {
  const resp = await fetch(getBase() + '/api/back/statistiques/produits');
  if (!resp.ok) return;
  const data = await resp.json();
  const select = document.getElementById('filter-ventes-produit');
  data.forEach(p => select.insertAdjacentHTML('beforeend', `<option value="${p.id}">${p.nom} (${p.matricule})</option>`));
}

function initChart() {
  const ctx = document.getElementById('chart-ventes').getContext('2d');
  ventesChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'CA', data: [], borderColor: '#2ea043', backgroundColor: 'rgba(46,160,67,.12)', fill: true, tension: .35, pointRadius: 3 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#8b949e' } }, y: { ticks: { color: '#8b949e' } } } }
  });
}

async function loadVentesChart() {
  const prod = document.getElementById('filter-ventes-produit').value;
  const year = document.getElementById('filter-ventes-annee').value;
  let query = '';
  if (prod) query += (query ? '&' : '?') + `idproduit=${prod}`;
  if (year) query += (query ? '&' : '?') + `year=${year}`;
  const resp = await fetch(getBase() + '/api/back/statistiques/evolution-ventes' + query);
  if (!resp.ok) return;
  const data = await resp.json();
  ventesChart.data.labels = data.map(d => d.date);
  ventesChart.data.datasets[0].data = data.map(d => d.totalVentes);
  ventesChart.update();
}

initChart();
loadProductsDropdown().then(loadVentesChart);
</script>
</body>
</html>
