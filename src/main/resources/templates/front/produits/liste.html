<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nos produits - greenField</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      /* =====================================================
           TOKENS - DESIGN SYSTEM UNIFIÉ
        ====================================================== */
      :root {
        /* Couleurs principales */
        --gf-forest: #0A2E1C;
        --gf-forest-2: #123D27;
        --gf-green: #009951;
        --gf-green-light: #5EB453;
        --gf-leaf: #93D888;
        --gf-gold: #A46D2C;
        --gf-cream: #F7F4EC;
        --gf-line: #E3E9E1;
        --gf-text: #14261B;
        --gf-muted: #62705F;

        /* Couleurs d'accent */
        --ali-orange: #A46D2C;
        --ali-orange-light: #B98136;
        --ali-orange-dark: #7E5C15;
        --danger: #d32f2f;
        --success: #2e7d32;

        /* Ombres */
        --ombre: 0 4px 12px rgba(0, 0, 0, 0.06);
        --ombre-forte: 0 8px 30px rgba(0, 0, 0, 0.12);
        --ombre-card: 0 4px 20px rgba(0, 0, 0, 0.08);

        /* Tailles de police */
        --fs-xs: 11px;
        --fs-sm: 13px;
        --fs-base: 14px;
        --fs-md: 15px;
        --fs-lg: 18px;
        --fs-xl: 20px;
        --fs-2xl: 24px;
        --fs-3xl: 28px;
        --fs-4xl: 32px;

        /* Espacements */
        --sp-2: 2px;
        --sp-4: 4px;
        --sp-6: 6px;
        --sp-8: 8px;
        --sp-10: 10px;
        --sp-12: 12px;
        --sp-14: 14px;
        --sp-16: 16px;
        --sp-18: 18px;
        --sp-20: 20px;
        --sp-24: 24px;
        --sp-28: 28px;
        --sp-30: 30px;
        --sp-40: 40px;

        /* Rayons */
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --radius-full: 50px;

        /* Transitions */
        --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);

        --bg-panier: #f5f3ef;
        --blanc: #ffffff;
      }

      /* =====================================================
           RESET & BASE
        ====================================================== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg-panier);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        font-size: var(--fs-base);
        color: var(--gf-text);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        line-height: 1.6;
      }

      a {
        text-decoration: none;
        color: inherit;
      }
      ul {
        list-style: none;
      }
      .conteneur {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 var(--sp-20);
      }

      /* =====================================================
           BOUTONS UNIFORMISÉS
        ====================================================== */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--sp-8);
        padding: var(--sp-10) var(--sp-20);
        border: none;
        border-radius: var(--radius-full);
        font-size: var(--fs-base);
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        text-align: center;
        min-height: 44px;
        min-width: 120px;
        font-family: inherit;
        line-height: 1.2;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          var(--gf-green),
          var(--gf-forest-2)
        );
        color: #fff;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(45, 106, 79, 0.3);
      }

      .btn-orange {
        background: linear-gradient(
          135deg,
          var(--ali-orange-light),
          var(--ali-orange-dark)
        );
        color: #fff;
      }
      .btn-orange:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(255, 106, 0, 0.35);
      }

      .btn-outline {
        background: transparent;
        color: var(--gf-green);
        border: 2px solid var(--gf-green);
      }
      .btn-outline:hover {
        background: var(--gf-green);
        color: #fff;
      }

      .btn-sm {
        padding: var(--sp-6) var(--sp-14);
        font-size: var(--fs-sm);
        min-height: 36px;
        min-width: 80px;
      }

      .btn-block {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .btn-icon {
        min-width: 44px;
        width: 44px;
        height: 44px;
        padding: 0;
        border-radius: 50%;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
      }

      .btn-cta-orange {
        background: var(--ali-orange);
        color: #fff !important;
        padding: var(--sp-10) var(--sp-20);
        border-radius: var(--radius-full);
        font-weight: 600;
        font-size: var(--fs-base);
        transition: background 0.2s;
        display: inline-block;
        min-height: 44px;
        min-width: 120px;
        text-align: center;
        line-height: 1.2;
      }
      .btn-cta-orange:hover {
        background: var(--ali-orange-dark);
        color: #fff;
      }

      /* =====================================================
           HEADER
        ====================================================== */
      .market-header {
        background: #ffffff;
        padding: var(--sp-12) 0;
        position: sticky;
        top: 0;
        z-index: 1002;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        border-bottom: 1px solid #e6e6e6;
      }
      .market-header .conteneur {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--sp-28);
      }

      .mh-logo {
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }
      .mh-logo-text {
        font-size: var(--fs-3xl);
        font-weight: 700;
        color: var(--ali-orange);
        letter-spacing: -1px;
      }
      .mh-logo-text span {
        color: #333;
      }
      .mh-logo-text i {
        color: var(--gf-green);
        font-size: var(--fs-xl);
        margin-right: var(--sp-4);
      }

      .mh-search {
        flex: 1;
        max-width: 700px;
      }
      .mh-search form {
        display: flex;
        height: 44px;
        border: 2px solid var(--ali-orange);
        border-radius: var(--radius-full);
        overflow: hidden;
        background: #fff;
      }
      .mh-search input {
        flex: 1;
        border: none;
        padding: 0 var(--sp-16);
        font-size: var(--fs-base);
        outline: none;
        color: #333;
      }
      .mh-search input::placeholder {
        color: #999;
      }
      .mh-search .search-icons {
        display: flex;
        align-items: center;
        padding-right: var(--sp-10);
        color: #999;
        gap: var(--sp-8);
        cursor: pointer;
      }
      .mh-search button {
        background: linear-gradient(
          135deg,
          var(--ali-orange-light),
          var(--ali-orange-dark)
        );
        border: none;
        color: #fff;
        padding: 0 var(--sp-28);
        font-weight: 600;
        font-size: var(--fs-md);
        cursor: pointer;
        transition: opacity 0.2s;
        display: flex;
        align-items: center;
        gap: var(--sp-8);
        min-height: 44px;
      }
      .mh-search button:hover {
        opacity: 0.9;
      }

      .mh-actions {
        display: flex;
        align-items: center;
        gap: var(--sp-18);
        flex-shrink: 0;
      }
      .mh-action {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #333;
        font-size: var(--fs-sm);
        font-weight: 500;
        transition: color 0.2s;
        position: relative;
      }
      .mh-action:hover {
        color: var(--ali-orange);
      }
      .mh-action i {
        font-size: var(--fs-xl);
        margin-bottom: 0px;
      }
      .mh-action .cart-count {
        position: absolute;
        top: -4px;
        right: -8px;
        background: var(--ali-orange);
        color: #fff;
        font-size: var(--fs-xs);
        font-weight: 700;
        min-width: 16px;
        height: 16px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* =====================================================
         PAGE PRODUITS
        ====================================================== */
      .page-produits {
        padding: var(--sp-24) 0 var(--sp-40);
        flex: 1 0 auto;
        background: var(--bg-panier);
      }

      .breadcrumb {
        font-size: var(--fs-sm);
        color: var(--gf-muted);
        margin-bottom: var(--sp-16);
      }
      .breadcrumb a {
        color: var(--gf-green);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
      }
      .breadcrumb span {
        color: var(--gf-text);
        font-weight: 600;
      }

      .shop-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: var(--sp-16);
        margin-bottom: var(--sp-24);
      }

      .shop-header h1 {
        font-size: var(--fs-4xl);
        font-weight: 700;
        color: var(--gf-forest);
        letter-spacing: -0.5px;
      }

      .shop-header h1 i {
        color: var(--ali-orange);
        margin-right: var(--sp-8);
      }

      .shop-controls {
        display: flex;
        align-items: center;
        gap: var(--sp-14);
        flex-wrap: wrap;
      }

      .shop-controls select {
        padding: var(--sp-8) var(--sp-16);
        border: 1px solid var(--gf-line);
        border-radius: var(--radius-sm);
        font-size: var(--fs-sm);
        background: var(--blanc);
        color: var(--gf-text);
        font-family: inherit;
        cursor: pointer;
        outline: none;
        transition: var(--transition);
        min-height: 40px;
      }

      .shop-controls select:focus {
        border-color: var(--gf-green);
        box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.12);
      }

      .view-toggle {
        display: flex;
        gap: var(--sp-4);
        background: var(--gf-cream);
        border-radius: var(--radius-sm);
        padding: var(--sp-2);
        border: 1px solid var(--gf-line);
      }

      .view-toggle button {
        background: transparent;
        border: none;
        padding: var(--sp-6) var(--sp-12);
        border-radius: var(--sp-6);
        cursor: pointer;
        color: var(--gf-muted);
        transition: var(--transition);
        font-size: var(--fs-base);
        min-height: 34px;
        min-width: 34px;
      }

      .view-toggle button.active {
        background: var(--blanc);
        color: var(--gf-forest);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }

      .view-toggle button:hover:not(.active) {
        color: var(--gf-text);
      }

      /* ===== LAYOUT PRINCIPAL ===== */
      .shop-layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        gap: var(--sp-30);
        align-items: start;
      }

      /* ===== SIDEBAR FILTRES ===== */
      .sidebar-filtres {
        background: var(--blanc);
        border-radius: var(--radius-lg);
        border: 1px solid var(--gf-line);
        padding: var(--sp-24) var(--sp-20);
        box-shadow: var(--ombre);
        position: sticky;
        top: 90px;
      }

      .sidebar-filtres h3 {
        font-size: var(--fs-md);
        font-weight: 700;
        color: var(--gf-forest);
        margin-bottom: var(--sp-18);
        padding-bottom: var(--sp-12);
        border-bottom: 2px solid var(--gf-line);
        display: flex;
        align-items: center;
        gap: var(--sp-10);
      }

      .sidebar-filtres h3 i {
        color: var(--gf-green);
        font-size: var(--fs-lg);
      }

      .filtre-groupe {
        margin-bottom: var(--sp-20);
      }

      .filtre-groupe:last-child {
        margin-bottom: 0;
      }

      .filtre-groupe h4 {
        font-size: var(--fs-sm);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--gf-muted);
        margin-bottom: var(--sp-10);
      }

      .filtre-groupe ul li {
        margin-bottom: var(--sp-6);
      }

      .filtre-groupe ul li a {
        font-size: var(--fs-base);
        color: var(--gf-text);
        transition: var(--transition);
        display: flex;
        align-items: center;
        gap: var(--sp-8);
        padding: var(--sp-4) 0;
      }

      .filtre-groupe ul li a:hover {
        color: var(--gf-green);
      }

      .filtre-tags {
        display: flex;
        flex-wrap: wrap;
        gap: var(--sp-6);
      }

      .filtre-tags .tag {
        padding: var(--sp-4) var(--sp-14);
        border-radius: var(--radius-xl);
        font-size: var(--fs-sm);
        font-weight: 500;
        border: 1px solid var(--gf-line);
        background: var(--blanc);
        color: var(--gf-text);
        cursor: pointer;
        transition: var(--transition);
        min-height: 32px;
        display: inline-flex;
        align-items: center;
      }

      .filtre-tags .tag:hover,
      .filtre-tags .tag.active {
        border-color: var(--gf-green);
        background: var(--gf-cream);
        color: var(--gf-forest);
      }

      .price-range {
        display: flex;
        align-items: center;
        gap: var(--sp-12);
        margin-top: var(--sp-8);
      }

      .price-range input[type="range"] {
        flex: 1;
        accent-color: var(--gf-green);
        height: 4px;
        border-radius: var(--sp-4);
        background: var(--gf-line);
        outline: none;
        -webkit-appearance: none;
        appearance: none;
      }

      .price-range input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--gf-green);
        cursor: pointer;
        border: 2px solid var(--blanc);
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      }

      .price-range .price-labels {
        display: flex;
        justify-content: space-between;
        font-size: var(--fs-sm);
        color: var(--gf-muted);
        font-weight: 500;
        width: 100%;
        margin-top: var(--sp-4);
      }

      /* =====================================================
           CARTES PRODUIT MODERNES - IMAGE PLEINE LARGEUR
        ====================================================== */
      .grille-produits {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--sp-24);
      }

      .carte-produit {
        background: var(--blanc);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--ombre-card);
        transition: var(--transition);
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .carte-produit:hover {
        transform: translateY(-8px);
        box-shadow: var(--ombre-forte);
      }

      /* Image pleine largeur */
      .carte-produit .image-container {
        position: relative;
        width: 100%;
        padding-top: 75%; /* Ratio 4:3 */
        overflow: hidden;
        background: linear-gradient(135deg, #eaf3e8, #f6f0e6);
      }

      .carte-produit .image-container img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      .carte-produit:hover .image-container img {
        transform: scale(1.08);
      }

      /* Badge sur l'image */
      .carte-produit .badge {
        position: absolute;
        top: var(--sp-12);
        left: var(--sp-12);
        padding: var(--sp-4) var(--sp-14);
        border-radius: var(--radius-xl);
        font-size: var(--fs-xs);
        font-weight: 800;
        text-transform: uppercase;
        color: #fff;
        letter-spacing: 0.5px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        z-index: 2;
        background: linear-gradient(135deg, #A46D2C, #b8863f);
      }

      .carte-produit .badge.nouveau {
        background: linear-gradient(135deg, #40916c, #009951);
      }

      .carte-produit .badge.promo {
        background: linear-gradient(135deg, #e74c3c, #c0392b);
      }

      /* Badge stock */
      .carte-produit .stock-badge {
        position: absolute;
        bottom: var(--sp-12);
        right: var(--sp-12);
        padding: var(--sp-4) var(--sp-12);
        border-radius: var(--radius-xl);
        font-size: var(--fs-xs);
        font-weight: 600;
        color: #fff;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        z-index: 2;
        display: flex;
        align-items: center;
        gap: var(--sp-4);
      }

      .carte-produit .stock-badge i {
        font-size: var(--fs-xs);
      }

      .carte-produit .stock-badge.in-stock {
        background: rgba(46, 125, 50, 0.85);
        backdrop-filter: blur(4px);
      }

      .carte-produit .stock-badge.out-of-stock {
        background: rgba(211, 47, 47, 0.85);
        backdrop-filter: blur(4px);
      }

      /* Contenu de la carte */
      .carte-produit .infos {
        padding: var(--sp-16) var(--sp-18) var(--sp-18);
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: var(--sp-4);
      }

      .carte-produit .categorie-tag {
        font-size: var(--fs-xs);
        color: var(--gf-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        font-weight: 600;
        margin-bottom: var(--sp-2);
      }

      .carte-produit .nom {
        font-weight: 700;
        font-size: var(--fs-md);
        color: var(--gf-forest);
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        min-height: 40px;
      }

      .carte-produit .prix {
        font-size: var(--fs-xl);
        font-weight: 800;
        color: var(--gf-forest);
        margin: var(--sp-4) 0 var(--sp-8);
      }

      .carte-produit .prix .old-price {
        font-size: var(--fs-base);
        font-weight: 400;
        color: #999;
        text-decoration: line-through;
        margin-left: var(--sp-8);
      }

      /* Actions */
      .carte-produit .actions {
        display: flex;
        align-items: center;
        gap: var(--sp-10);
        margin-top: auto;
        padding-top: var(--sp-12);
        border-top: 1px solid var(--gf-line);
        flex-wrap: wrap;
      }

      .carte-produit .controle-quantite {
        display: flex;
        align-items: center;
        gap: var(--sp-4);
        background: var(--gf-cream);
        border-radius: var(--radius-full);
        padding: var(--sp-2);
        border: 1px solid var(--gf-line);
        flex-shrink: 0;
      }

      .carte-produit .controle-quantite .btn-qte {
        background: transparent;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--gf-text);
        cursor: pointer;
        transition: var(--transition);
        font-size: var(--fs-base);
        font-weight: 700;
      }

      .carte-produit .controle-quantite .btn-qte:hover {
        background: var(--gf-green);
        color: var(--blanc);
      }

      .carte-produit .controle-quantite .btn-qte:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .carte-produit .controle-quantite .qte-display {
        min-width: 28px;
        text-align: center;
        font-weight: 700;
        font-size: var(--fs-base);
        color: var(--gf-forest);
      }

      .carte-produit .btn-ajouter {
        flex: 1;
        min-width: 80px;
        padding: var(--sp-8) var(--sp-16);
        border: none;
        border-radius: var(--radius-full);
        font-weight: 600;
        font-size: var(--fs-sm);
        cursor: pointer;
        transition: var(--transition);
        font-family: inherit;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--sp-6);
        min-height: 40px;
        background: linear-gradient(
          135deg,
          var(--ali-orange-light),
          var(--ali-orange-dark)
        );
        color: #fff;
        box-shadow: 0 4px 15px rgba(255, 106, 0, 0.25);
      }

      .carte-produit .btn-ajouter:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(255, 106, 0, 0.35);
      }

      .carte-produit .btn-ajouter:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
      }

      .carte-produit .btn-detail {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--gf-line);
        background: var(--blanc);
        color: var(--gf-muted);
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: var(--fs-base);
        flex-shrink: 0;
      }

      .carte-produit .btn-detail:hover {
        background: var(--gf-cream);
        color: var(--gf-forest);
        border-color: var(--gf-green);
      }

      .carte-produit .btn-indisponible {
        flex: 1;
        padding: var(--sp-8) var(--sp-16);
        border-radius: var(--radius-full);
        font-weight: 500;
        font-size: var(--fs-sm);
        background: var(--gf-cream);
        color: var(--gf-muted);
        border: 1px solid var(--gf-line);
        cursor: not-allowed;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--sp-6);
        min-height: 40px;
        opacity: 0.7;
      }

      /* ===== TOAST ===== */
      .toast {
        position: fixed;
        bottom: var(--sp-30);
        right: var(--sp-30);
        background: var(--gf-forest);
        color: var(--blanc);
        padding: var(--sp-14) var(--sp-24);
        border-radius: var(--radius-md);
        box-shadow: var(--ombre-forte);
        display: flex;
        align-items: center;
        gap: var(--sp-12);
        z-index: 9999;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.4s ease;
        font-weight: 500;
        font-size: var(--fs-base);
        border-left: 4px solid var(--ali-orange);
        max-width: 400px;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      .toast i {
        font-size: var(--fs-xl);
        color: var(--ali-orange);
        flex-shrink: 0;
      }

      /* ===== PAGINATION ===== */
      .pagination {
        display: flex;
        justify-content: center;
        gap: var(--sp-8);
        margin-top: var(--sp-30);
        flex-wrap: wrap;
      }

      .pagination a,
      .pagination span {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 38px;
        height: 38px;
        padding: 0 var(--sp-12);
        border-radius: var(--radius-sm);
        font-weight: 600;
        font-size: var(--fs-base);
        transition: var(--transition);
        border: 1px solid var(--gf-line);
        background: var(--blanc);
        color: var(--gf-text);
      }

      .pagination a:hover {
        background: var(--gf-cream);
        border-color: var(--gf-green);
        color: var(--gf-forest);
      }

      .pagination .active {
        background: var(--gf-green);
        border-color: var(--gf-green);
        color: var(--blanc);
      }

      .aucun-produit {
        text-align: center;
        color: var(--gf-muted);
        padding: var(--sp-40) var(--sp-20);
        background: var(--blanc);
        border-radius: var(--radius-lg);
        border: 2px dashed var(--gf-line);
        grid-column: 1 / -1;
      }

      .aucun-produit i {
        font-size: 48px;
        display: block;
        margin-bottom: var(--sp-16);
        color: var(--gf-line);
      }

      .aucun-produit p {
        font-size: var(--fs-md);
      }

      /* =====================================================
         FOOTER
        ====================================================== */
      .footer {
        background: var(--gf-forest);
        color: rgba(255, 255, 255, 0.7);
        margin-top: auto;
        border-top: 3px solid var(--gf-green);
        flex-shrink: 0;
        width: 100%;
      }
      .footer-newsletter {
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding: var(--sp-24) 0;
      }
      .footer-newsletter .conteneur {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--sp-20);
        flex-wrap: wrap;
      }
      .footer-newsletter .nl-text h3 {
        color: #fff;
        font-size: var(--fs-lg);
        font-weight: 700;
        margin-bottom: var(--sp-4);
      }
      .footer-newsletter .nl-text p {
        font-size: var(--fs-base);
        color: rgba(255, 255, 255, 0.6);
        margin: 0;
      }
      .nl-form {
        display: flex;
        gap: 0;
        flex-shrink: 0;
      }
      .nl-form input {
        border: none;
        padding: 0 var(--sp-16);
        height: 46px;
        width: 280px;
        border-radius: var(--radius-sm) 0 0 var(--radius-sm);
        font-size: var(--fs-base);
        outline: none;
        background: rgba(255, 255, 255, 0.95);
        min-height: 46px;
      }
      .nl-form input:focus {
        background: #fff;
      }
      .nl-form button {
        background: var(--gf-gold);
        color: #3D2A0F;
        border: none;
        padding: 0 var(--sp-28);
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        font-weight: 700;
        font-size: var(--fs-base);
        cursor: pointer;
        transition: all 0.2s ease-in-out;
        white-space: nowrap;
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        gap: var(--sp-8);
      }
      .nl-form button:hover {
        background: #C9924D;
      }

      .footer-grid {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
        gap: var(--sp-30);
        padding: var(--sp-40) 0 var(--sp-28);
      }
      .footer .logo {
        color: #fff;
        font-size: var(--fs-xl);
        font-weight: 800;
        display: inline-block;
        margin-bottom: var(--sp-12);
      }
      .footer .logo i {
        color: var(--gf-leaf);
      }
      .footer .footer-description {
        font-size: var(--fs-base);
        line-height: 1.8;
        max-width: 280px;
        color: rgba(255, 255, 255, 0.65);
        margin: 0;
      }
      .footer h4 {
        color: #fff;
        font-size: var(--fs-md);
        font-weight: 700;
        margin-bottom: var(--sp-14);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .footer ul li {
        margin-bottom: var(--sp-8);
      }
      .footer ul li a {
        color: rgba(255, 255, 255, 0.6);
        font-size: var(--fs-base);
        transition: all 0.2s ease-in-out;
        display: inline-flex;
        align-items: center;
        gap: var(--sp-4);
      }
      .footer ul li a:hover {
        color: #fff;
      }
      .footer ul li i {
        width: 22px;
        color: var(--gf-gold);
      }
      .footer-bottom {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding: var(--sp-18) 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: var(--sp-12);
        font-size: var(--fs-sm);
      }
      .footer-socials {
        display: flex;
        gap: var(--sp-10);
      }
      .footer-socials a {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.5);
        transition: all 0.2s ease-in-out;
        font-size: var(--fs-md);
      }
      .footer-socials a:hover {
        background: var(--gf-green);
        color: #fff;
        transform: translateY(-2px);
      }

      /* =====================================================
           RESPONSIVE
        ====================================================== */

      @media (max-width: 1024px) {
        .grille-produits {
          grid-template-columns: repeat(2, 1fr);
          gap: var(--sp-20);
        }
        .footer-grid {
          grid-template-columns: 1fr 1fr 1fr;

      @media (max-width: 900px) {
        .mh-actions .mh-action.delivery {

        .btn-cta-orange {

        .shop-layout {

        .sidebar-filtres {

          padding: var(--sp-18) var(--sp-16);

        .mh-actions {

        .mh-action i {

        }
        .mh-action {

        }
        .btn-cta-orange {
          padding: var(--sp-6) var(--sp-14);
          font-size: var(--fs-sm);
          min-height: 36px;
          min-width: 80px;
        }

        .page-produits {
          padding: var(--sp-16) 0 var(--sp-30);

        .carte-produit .infos {

        }

        .carte-produit .nom {
          font-size: var(--fs-base);
          min-height: 34px;
        }
        .carte-produit .prix {
          font-size: var(--fs-lg);
        }

        .carte-produit .controle-quantite .btn-qte {
          width: 28px;
          height: 28px;
          font-size: var(--fs-sm);
        }
        .carte-produit .controle-quantite .qte-display {
          font-size: var(--fs-sm);
          min-width: 20px;
        }

        .carte-produit .btn-ajouter {
          font-size: var(--fs-sm);
          padding: var(--sp-6) var(--sp-12);
          min-height: 36px;
          min-width: 60px;
        }

        .carte-produit .btn-detail {
          width: 36px;
          height: 36px;
          font-size: var(--fs-sm);
        }

        .carte-produit .btn-indisponible {
          font-size: var(--fs-sm);
          padding: var(--sp-6) var(--sp-12);
          min-height: 36px;
        }

        .carte-produit .badge {
          font-size: var(--fs-xs);
          padding: var(--sp-2) var(--sp-10);
          top: var(--sp-8);
          left: var(--sp-8);
        }

        .carte-produit .stock-badge {
          font-size: var(--fs-xs);
          padding: var(--sp-2) var(--sp-10);
          bottom: var(--sp-8);
          right: var(--sp-8);
        }

        .footer-newsletter .conteneur {
          flex-direction: column;
          align-items: stretch;
        }
        .footer-newsletter .nl-text {
          text-align: center;
        }
        .nl-form {
          width: 100%;
        }
        .nl-form input {
          width: 100%;
          flex: 1;
        }
        .nl-form button {
          padding: 0 var(--sp-20);
          font-size: var(--fs-sm);
        }

        .footer-grid {
          grid-template-columns: 1fr 1fr;
          gap: var(--sp-20);
          padding: var(--sp-30) 0 var(--sp-20);
        }
        .footer .footer-description {
          max-width: 100%;
        }
        .footer-bottom {
          flex-direction: column;
          text-align: center;
        }

        .toast {
          bottom: var(--sp-16);
          right: var(--sp-16);
          left: var(--sp-16);
          padding: var(--sp-12) var(--sp-18);
          font-size: var(--fs-sm);
          border-left-width: 3px;
          max-width: none;
        }
        .toast i {
          font-size: var(--fs-md);
        }
      }

      @media (max-width: 480px) {
        .mh-logo-text {
          font-size: var(--fs-lg);
        }
        .mh-logo-text i {
          font-size: var(--fs-md);
        }
        .mh-search form {
          height: 34px;
          border-radius: var(--radius-xl);
        }
        .mh-search input {
          font-size: var(--fs-sm);
          padding: 0 var(--sp-12);
        }
        .mh-search button {
          padding: 0 var(--sp-12);
          font-size: var(--fs-sm);
        }
        .mh-search button span {
          display: none;
        }
        .mh-actions {
          gap: var(--sp-8);
        }
        .mh-action i {
          font-size: var(--fs-md);
        }
        .mh-action .cart-count {
          font-size: var(--fs-xs);
          min-width: 14px;
          height: 14px;
          top: -3px;
          right: -6px;
        }
        .btn-cta-orange {
          padding: var(--sp-4) var(--sp-10);
          font-size: var(--fs-xs);
          border-radius: var(--radius-xl);
          min-height: 28px;
          min-width: 60px;
        }
        .market-header {
          padding: var(--sp-8) 0;
        }
        .conteneur {
          padding: 0 var(--sp-12);
        }

        .shop-header h1 {
          font-size: var(--fs-lg);
        }

        .shop-controls select {
          font-size: var(--fs-sm);
          padding: var(--sp-6) var(--sp-10);
          min-height: 34px;
        }
        .view-toggle button {
          font-size: var(--fs-sm);
          padding: var(--sp-4) var(--sp-8);
          min-height: 30px;
          min-width: 30px;
        }

        .grille-produits {
          grid-template-columns: 1fr 1fr;
          gap: var(--sp-10);
        }

        .carte-produit .infos {
          padding: var(--sp-10) var(--sp-10) var(--sp-12);
        }

        .carte-produit .categorie-tag {
          font-size: var(--fs-xs);
        }

        .carte-produit .nom {
          font-size: var(--fs-sm);
          min-height: 28px;
        }
        .carte-produit .prix {
          font-size: var(--fs-md);
          margin: var(--sp-2) 0 var(--sp-4);
        }
        .carte-produit .prix .old-price {
          font-size: var(--fs-sm);
        }

        .carte-produit .actions {
          gap: var(--sp-6);
          padding-top: var(--sp-8);
        }

        .carte-produit .controle-quantite {
          padding: var(--sp-1);
        }
        .carte-produit .controle-quantite .btn-qte {
          width: 22px;
          height: 22px;
          font-size: var(--fs-xs);
        }
        .carte-produit .controle-quantite .qte-display {
          font-size: var(--fs-xs);
          min-width: 16px;
        }

        .carte-produit .btn-ajouter {
          font-size: var(--fs-xs);
          padding: var(--sp-4) var(--sp-8);
          min-height: 28px;
          min-width: 44px;
          gap: var(--sp-4);
        }
        .carte-produit .btn-ajouter i {
          font-size: var(--fs-xs);
        }

        .carte-produit .btn-detail {
          width: 28px;
          height: 28px;
          font-size: var(--fs-xs);
        }

        .carte-produit .btn-indisponible {
          font-size: var(--fs-xs);
          padding: var(--sp-4) var(--sp-8);
          min-height: 28px;
          min-width: 44px;
        }

        .carte-produit .badge {
          font-size: 8px;
          padding: var(--sp-2) var(--sp-8);
          top: var(--sp-6);
          left: var(--sp-6);
        }

        .carte-produit .stock-badge {
          font-size: 8px;
          padding: var(--sp-2) var(--sp-8);
          bottom: var(--sp-6);
          right: var(--sp-6);
        }

        .carte-produit .stock-badge i {
          font-size: var(--fs-xs);
        }

        .sidebar-filtres {
          padding: var(--sp-12) var(--sp-10);
          gap: var(--sp-10);
        }
        .sidebar-filtres h3 {
          font-size: var(--fs-sm);
          margin-bottom: var(--sp-10);
          padding-bottom: var(--sp-6);
        }
        .filtre-groupe h4 {
          font-size: var(--fs-xs);
        }
        .filtre-groupe ul li a {
          font-size: var(--fs-sm);
        }
        .filtre-tags .tag {
          font-size: var(--fs-xs);
          padding: var(--sp-2) var(--sp-8);

        .pagination a,
        .pagination span {
          min-width: 30px;
          height: 30px;
          font-size: var(--fs-sm);

        .footer-newsletter {
          padding: var(--sp-18) 0;
        }
        .footer-newsletter .nl-text h3 {

    <style>

        font-family: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }

</head>

  <body>
    <!-- HEADER -->
    <div th:replace="~{front/fragments/layout :: mainHeader}"></div>

    <!-- CONTENU PRINCIPAL -->
    <main class="page-produits">
      <div class="conteneur">
        <div class="breadcrumb">
          <a href="/">Accueil</a> / <span>Nos produits</span>
        </div>

        <div class="shop-header">
          <h1><i class="fas fa-store-alt"></i> Nos produits</h1>
          <div class="shop-controls">
            <select name="tri">
              <option value="pertinence">Tri par défaut</option>
              <option value="prix_croissant">Prix croissant</option>
              <option value="prix_decroissant">Prix décroissant</option>
              <option value="nom">Nom A-Z</option>
            </select>
            <div class="view-toggle">
              <button class="active" title="Grille">
                <i class="fas fa-th"></i>
              </button>
              <button title="Liste"><i class="fas fa-list"></i></button>
            </div>
          </div>
        </div>

        <div class="shop-layout">
          <!-- SIDEBAR FILTRES -->
          <aside class="sidebar-filtres">
            <h3><i class="fas fa-sliders-h"></i> Filtres</h3>

            <div class="filtre-groupe">
              <h4>Catégories</h4>
              <ul>
                <li th:each="categorie : ${categories}">
                  <a th:href="@{/produits(idCategorie=${categorie.id})}">
                    <span th:text="${categorie.libelle}"></span>
                  </a>
                </li>
              </ul>
            </div>

            <div class="filtre-groupe">
              <h4>Prix</h4>
              <div class="price-range">
                <div style="width: 100%">
                  <input type="range" min="0" max="100000" value="50000" />
                  <div class="price-labels">
                    <span>0 Ar</span>
                    <span>100 000 Ar</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="filtre-groupe">
              <h4>Étiquettes</h4>
              <div class="filtre-tags">
                <span class="tag active">Bio</span>
                <span class="tag">Local</span>
                <span class="tag">Frais</span>
                <span class="tag">Saison</span>
                <span class="tag">Artisanal</span>
                <span class="tag">Certifié</span>
              </div>
            </div>
          </aside>

          <!-- GRILLE PRODUITS AVEC IMAGES PLEINE LARGEUR -->
          <div
            class="grille-produits"
            th:if="${produits != null and !produits.isEmpty()}"
          >
            <div
              class="carte-produit"
              th:each="produit : ${produits}"
              th:data-id="${produit.id}"
            >
              <!-- Image pleine largeur -->
              <div class="image-container">
                <img
                  src="https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?auto=format&fit=crop&w=400&h=300&q=80"
                  th:alt="${produit.nom}"
                />

                <!-- Badge promotion -->

                <!-- Badge stock -->
                <span
                  class="stock-badge"
                  th:classappend="${stocks != null and stocks.get(produit.id) != null and stocks.get(produit.id) > 0} ? 'in-stock' : 'out-of-stock'"
                >
                  <i
                    th:if="${stocks != null and stocks.get(produit.id) != null and stocks.get(produit.id) > 0}"
                    class="fas fa-check-circle"
                  ></i>
                  <i
                    th:unless="${stocks != null and stocks.get(produit.id) != null and stocks.get(produit.id) > 0}"
                    class="fas fa-times-circle"
                  ></i>
                  <span
                    th:if="${stocks != null and stocks.get(produit.id) != null and stocks.get(produit.id) > 0}"
                    th:text="${stocks.get(produit.id)} + ' en stock'"
                    >En stock</span
                  >
                  <span
                    th:unless="${stocks != null and stocks.get(produit.id) != null and stocks.get(produit.id) > 0}"
                    >Rupture</span
                  >
                </span>
              </div>

              <!-- Informations -->
              <div class="infos">
                <div
                  class="categorie-tag"
                  th:text="${produit.categorie != null ? produit.categorie.libelle : 'Produit'}"
                >
                  Catégorie
                </div>
                <div class="nom" th:text="${produit.nom}">Nom du produit</div>
                <div class="prix">
                  <span th:text="${produit.pu} + ' Ar'">0 Ar</span>
                  <span 1ar></span>
                </div>

                <!-- Actions -->
                <div
                  class="actions"
                  th:if="${stocks != null and stocks.get(produit.id) != null and stocks.get(produit.id) > 0}"
                >
                  <div class="controle-quantite">
                    <button
                      class="btn-qte"
                      onclick="changerQuantite(this, -1)"
                      type="button"
                    >
                      <i class="fas fa-minus"></i>
                    </button>
                    <span class="qte-display">1</span>
                    <button
                      class="btn-qte"
                      onclick="changerQuantite(this, 1)"
                      type="button"
                    >
                      <i class="fas fa-plus"></i>
                    </button>
                  </div>
                  <button
                    class="btn-ajouter"
                    onclick="ajouterAuPanier(this)"
                    th:data-id="${produit.id}"
                    th:data-nom="${produit.nom}"
                    th:data-prix="${produit.pu}"
                  >
                    <i class="fas fa-cart-plus"></i> Ajouter
                  </button>
                  <a
                    class="btn-detail"
                    th:href="@{/produits/{id}(id=${produit.id})}"
                    aria-label="Voir les détails"
                  >
                    <i class="fas fa-eye"></i>
                  </a>
                </div>

                <div
                  class="actions"
                  th:unless="${stocks != null and stocks.get(produit.id) != null and stocks.get(produit.id) > 0}"
                >
                  <span class="btn-indisponible">
                    <i class="fas fa-times"></i> Indisponible
                  </span>
                  <a
                    class="btn-detail"
                    th:href="@{/produits/{id}(id=${produit.id})}"
                    aria-label="Voir les détails"
                  >
                    <i class="fas fa-eye"></i>
                  </a>
                </div>
              </div>
            </div>
          </div>

          <div
            class="aucun-produit"
            th:if="${produits == null or produits.isEmpty()}"
          >
            <i class="fas fa-seedling"></i>
            <p>Aucun produit ne correspond à votre recherche.</p>
            <a
              th:href="@{/produits}"
              style="
                display: inline-block;
                margin-top: var(--sp-12);
                color: var(--gf-green);
                font-weight: 600;
              "
            >
              <i class="fas fa-undo"></i> Voir tous les produits
            </a>
          </div>

          <div
            class="pagination"
            th:if="${totalPages != null and totalPages > 1}"
          >
            <a
              th:if="${currentPage > 0}"
              th:href="@{/produits(page=${currentPage - 1}, motCle=${motCle}, idCategorie=${idCategorieSelectionnee})}"
            >
              <i class="fas fa-chevron-left"></i>
            </a>
            <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
              <a
                th:if="${i != currentPage}"
                th:href="@{/produits(page=${i}, motCle=${motCle}, idCategorie=${idCategorieSelectionnee})}"
                th:text="${i + 1}"
              ></a>
              <span
                th:if="${i == currentPage}"
                class="active"
                th:text="${i + 1}"
              ></span>
            </span>
            <a
              th:if="${currentPage < totalPages - 1}"
              th:href="@{/produits(page=${currentPage + 1}, motCle=${motCle}, idCategorie=${idCategorieSelectionnee})}"
            >
              <i class="fas fa-chevron-right"></i>
            </a>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <div th:replace="~{front/fragments/layout :: footer}"></div>

    <!-- TOAST -->
    <div id="toast" class="toast">
      <i class="fas fa-check-circle"></i>
      <span id="toastMessage">Produit ajouté au panier</span>
    </div>

    <!-- SCRIPT -->
    <script>
      let toastTimeout = null;

      function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        const toastMessage = document.getElementById("toastMessage");
        const icon = toast.querySelector("i");

        toastMessage.textContent = message;

        if (isError) {
          icon.className = "fas fa-exclamation-circle";
          toast.style.borderLeftColor = "#d32f2f";
        } else {
          icon.className = "fas fa-check-circle";
          toast.style.borderLeftColor = "var(--ali-orange)";
        }

        toast.classList.add("show");

        if (toastTimeout) clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove("show"), 3000);
      }

      function changerQuantite(btn, delta) {
        const controle = btn.closest(".controle-quantite");
        const display = controle.querySelector(".qte-display");
        let qte = parseInt(display.textContent) || 1;
        qte = Math.max(1, qte + delta);
        display.textContent = qte;
      }

      function ajouterAuPanier(btn) {
        const produitId = btn.getAttribute("data-id");
        const produitNom = btn.getAttribute("data-nom");

        if (!produitId || produitId === "null" || produitId === "") {
          showToast("Erreur : ID du produit manquant", true);
          return;
        }

        const controle = btn
          .closest(".actions")
          .querySelector(".controle-quantite");
        const qteDisplay = controle
          ? controle.querySelector(".qte-display")
          : null;
        let quantite = qteDisplay ? parseInt(qteDisplay.textContent) : 1;

        if (isNaN(quantite) || quantite < 1) {
          quantite = 1;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        const url =
          "/panier/ajouter?idProduit=" +
          encodeURIComponent(produitId) +
          "&quantite=" +
          encodeURIComponent(quantite);

        fetch(url, {
          method: "POST",
          headers: {
            Accept: "application/json",
            "X-Requested-With": "XMLHttpRequest",
          },
        })
          .then((response) => {
            if (!response.ok)
              throw new Error("Erreur serveur: " + response.status);
            return response.json();
          })
          .then((data) => {
            if (data.success) {
              const cartCount = document.querySelector(".cart-count");
              if (cartCount) {
                cartCount.textContent =
                  data.nouveauTotal ||
                  parseInt(cartCount.textContent) + quantite;
              }
              showToast(
                (produitNom || "Produit") +
                  " ajouté au panier ! (" +
                  quantite +
                  "x)",
              );
              if (qteDisplay) qteDisplay.textContent = "1";
            } else {
              showToast(data.message || "Erreur lors de l'ajout", true);
            }
          })
          .catch((error) => {
            showToast("Erreur: " + error.message, true);
          })
          .finally(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-cart-plus"></i> Ajouter';
          });
      }

      // Tags cliquables
      document.querySelectorAll(".filtre-tags .tag").forEach((tag) => {
        tag.addEventListener("click", function () {
          this.classList.toggle("active");
        });
      });

      // Vue toggle
      document.querySelectorAll(".view-toggle button").forEach((btn) => {
        btn.addEventListener("click", function () {
          document
            .querySelectorAll(".view-toggle button")
            .forEach((b) => b.classList.remove("active"));
          this.classList.add("active");
        });
      });
    </script>
  </body>
</html>
