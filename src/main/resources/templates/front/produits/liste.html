<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nos produits - GreenField</title>
    <th:block th:replace="~{front/fragments/layout :: styles}"></th:block>

    <style>
      .barre-filtre {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 20px 0 30px;
        align-items: center;
      }

      .barre-filtre select,
      .barre-filtre input[type="text"] {
        padding: 9px 12px;
        border: 1px solid var(--bordure);
        border-radius: 8px;
        font-size: 14px;
      }

      .barre-filtre input[type="text"] {
        min-width: 220px;
      }

      .grille-produits {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
      }

      .carte-produit {
        background: white;
        border: 1px solid var(--bordure);
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: box-shadow 0.15s ease;
      }

      .carte-produit:hover {
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      }

      .vignette-produit {
        width: 100%;
        height: 130px;
        background: var(--vert-clair);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
      }

      .nom-produit {
        font-weight: 600;
        font-size: 16px;
        margin: 0;
      }

      .categorie-produit {
        font-size: 12px;
        color: var(--gris);
      }

      .prix-produit {
        font-size: 18px;
        font-weight: 700;
        color: var(--vert-fonce);
      }

      .stock-info {
        font-size: 13px;
      }

      .stock-ok {
        color: var(--vert-fonce);
      }

      .stock-rupture {
        color: var(--rouge);
      }

      .aucun-produit {
        text-align: center;
        color: var(--gris);
        margin-top: 60px;
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <div th:replace="~{front/fragments/layout :: nav}"></div>

    <main class="conteneur">
      <h1>Nos produits</h1>
      <p>Découvrez notre sélection de plantes et produits GreenField.</p>

      <div class="message success" th:if="${success}" th:text="${success}"></div>
      <div class="message error" th:if="${error}" th:text="${error}"></div>

      <!-- FILTRES -->
      <form class="barre-filtre" th:action="@{/produits}" method="get">
        <input
          type="text"
          name="motCle"
          placeholder="Rechercher un produit..."
          th:value="${motCle}"
        />

        <select name="idCategorie">
          <option value="">Toutes les catégories</option>
          <option
            th:each="categorie : ${categories}"
            th:value="${categorie.id}"
            th:text="${categorie.libelle}"
            th:selected="${categorie.id == idCategorieSelectionnee}"
          ></option>
        </select>

        <button type="submit" class="btn">Filtrer</button>
        <a th:href="@{/produits}" class="btn secondaire">Réinitialiser</a>
      </form>

      <!-- LISTE DES PRODUITS -->
      <div class="grille-produits" th:if="${!produits.isEmpty()}">
        <div class="carte-produit" th:each="produit : ${produits}">
          <div class="vignette-produit">🌱</div>

          <p class="nom-produit" th:text="${produit.nom}"></p>
          <p
            class="categorie-produit"
            th:if="${produit.categorie != null}"
            th:text="${produit.categorie.libelle}"
          ></p>

          <p class="prix-produit" th:text="${produit.pu} + ' Ar'"></p>

          <p
            class="stock-info"
            th:classappend="${stocks.get(produit.id) > 0} ? 'stock-ok' : 'stock-rupture'"
          >
            <span th:if="${stocks.get(produit.id) > 0}"
              >En stock (<span th:text="${stocks.get(produit.id)}"></span>)</span
            >
            <span th:unless="${stocks.get(produit.id) > 0}">Rupture de stock</span>
          </p>

          <a class="btn" th:href="@{/produits/{id}(id=${produit.id})}"
            >Voir le détail</a
          >
        </div>
      </div>

      <p class="aucun-produit" th:if="${produits.isEmpty()}">
        Aucun produit ne correspond à votre recherche.
      </p>
    </main>
  </body>
</html>
