<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="transferts/layout :: head"></head>
<body>
    <div th:fragment="content">
        <div class="text-center py-5">
            <div class="mb-4">
                <i class="fas fa-check-circle text-success" style="font-size: 80px;"></i>
            </div>
            <h1 class="text-success" th:text="${success}">✅ Opération réussie !</h1>
            <p class="text-muted">L'opération a été effectuée avec succès.</p>
            <div class="mt-4">
                <a href="/views/transferts" class="btn btn-primary">
                    <i class="fas fa-list"></i> Voir la liste
                </a>
                <a href="/views/transferts/demande" class="btn btn-warning">
                    <i class="fas fa-pen"></i> Nouvelle demande
                </a>
                <a href="/views/transferts/creer" class="btn btn-success">
                    <i class="fas fa-plus"></i> Nouveau transfert
                </a>
            </div>
        </div>
    </div>
</body>
</html>
