<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liste de commandes</title>
    <style>
        .d-none {
            display: none;
        }
    </style>
</head>

<body>
    <div class="head">
        <h1>Liste des commandes</h1>
        <a th:href="@{/commandes/fo/form/new}">Ajouter nouveau</a>
    </div><br>
    <div class="section-alert">
        <div th:if="${alert != null}" th:text="${alert}" class="alert-danger"></div>
        <div th:if="${succes != null}" th:text="${succes}" class="alert-success"></div>
    </div>
    <form th:action="@{/commandes/fo/list}" th:object="${commandeFilterDto}" method="POST" id="form">
        <div class="section-filtre">
            <div class="filtre">
                <label for="mode-reception-input">Mode de réception:</label>
                <select id="mode-reception-option">
                    <option value="">Tous</option>
                    <option th:each="mode : ${modeReceptionOptions}" th:value="${mode}"
                        th:text="${mode == 'Retrait_Boutique' ? 'Retrait' : (mode == 'Livraison_Domicile' ? 'Livraison' : mode)}">
                    </option>
                </select>
            </div>
            <div class="filtre">
                <label for="type-commande">Type de commande:</label>
                <select id="type-commande">
                    <option value="">Tous</option>
                    <option th:each="type : ${typeCommandeOptions}" th:value="${type}" th:text="${type}">
                    </option>
                </select>
            </div>
            <div class="filtre">
                <label for="statut-commande">Statut de commande:</label>
                <select id="statut-commande">
                    <option value="">Tous</option>
                    <option th:each="statut : ${statutCommandeOptions}" th:value="${statut.id}"
                        th:text="${statut.nom}"></option>
                </select>
            </div>
            <div class="filtre">
                <label for="date-debut-commande">Filtre pour les dates</label>
                <select id="filtre-date-option">
                    <option th:each="opt : ${filtreDateOptions}" th:value="${opt.value}" th:text="${opt.label}">
                    </option>
                </select>

                <select id="calcul-date-option">
                    <option th:each="opt : ${calculOptions}" th:value="${opt.value}" th:text="${opt.label}">
                    </option>
                </select>
                <input type="datetime-local" id="date-input">
                <button id="ajouter-filtre-date" type="button">Ajouter</button>
            </div>
            <div class="filtre">
                <label>Filtre pour les nombres :</label>
                <select id="filtre-nombre-option">
                    <option th:each="opt : ${filtreNombreOptions}" th:value="${opt.value}" th:text="${opt.label}">
                    </option>
                </select>

                <select id="calcul-nombre-option">
                    <option th:each="opt : ${calculOptions}" th:value="${opt.value}" th:text="${opt.label}"></option>
                </select>

                <input type="number" id="nombre-value-input" step="any" placeholder="Valeur..." />
                <button type="button" id="ajouter-filtre-nombre">Ajouter</button>
            </div>
            <div id="activeFiltresDiv" class="active-filtres d-flex flex-wrap gap-2 mb-3">
                <div th:if="${commandeFilterDto?.statutCommande != null and !#strings.isEmpty(commandeFilterDto.statutCommande)}"
                    class="filtre-actif">
                    <span th:text="'Statut de commande: ' + ${commandeFilterDto.statutCommande}"></span>
                    <input type="hidden" name="statutCommande" th:value="${commandeFilterDto.statutCommande}" />
                    <button type="button" onclick="removeStaticFilter(this, 'statutCommandeSelect')">x</button>
                </div>

                <div th:if="${commandeFilterDto?.typeCommande != null and !#strings.isEmpty(commandeFilterDto.typeCommande)}"
                    class="filtre-actif">
                    <span th:text="'Type de commande: ' + ${commandeFilterDto.typeCommande}"></span>
                    <input type="hidden" name="typeCommande" th:value="${commandeFilterDto.typeCommande}" />
                    <button type="button" onclick="removeStaticFilter(this, 'typeCommandeSelect')">x</button>
                </div>

                <div th:if="${commandeFilterDto?.modeReception != null and !#strings.isEmpty(commandeFilterDto.modeReception)}"
                    class="filtre-actif">
                    <span th:text="'Mode de réception: ' + ${commandeFilterDto.modeReception}"></span>
                    <input type="hidden" name="modeReception" th:value="${commandeFilterDto.modeReception}" />
                    <button type="button" onclick="removeStaticFilter(this, 'modeReceptionSelect')">x</button>
                </div>

                <th:block
                    th:if="${commandeFilterDto?.typeFiltreDate != null and !#lists.isEmpty(commandeFilterDto.typeFiltreDate)}">
                    <div th:each="typeDate, iter : ${commandeFilterDto.typeFiltreDate}" class="filtre-actif">
                        <span
                            th:text="'Filtre date: ' + ${typeDate} + ' ' + ${commandeFilterDto.operateurDate[iter.index]} + ' ' + ${commandeFilterDto.dateValue[iter.index]}"></span>
                        <input type="hidden" name="typeFiltreDate" th:value="${typeDate}" />
                        <input type="hidden" name="operateurDate"
                            th:value="${commandeFilterDto.operateurDate[iter.index]}" />
                        <input type="hidden" name="dateValue" th:value="${commandeFilterDto.dateValue[iter.index]}" />
                        <button type="button" onclick="removeArrayFilter(this)">x</button>
                    </div>
                </th:block>

                <th:block
                    th:if="${commandeFilterDto?.typeFiltreNombre != null and !#lists.isEmpty(commandeFilterDto.typeFiltreNombre)}">
                    <div th:each="typeNombre, iter : ${commandeFilterDto.typeFiltreNombre}" class="filtre-actif">
                        <span
                            th:text="'Filtre nombre: ' + ${typeNombre} + ' ' + ${commandeFilterDto.operateurNombre[iter.index]} + ' ' + ${commandeFilterDto.nombreValue[iter.index]}"></span>
                        <input type="hidden" name="typeFiltreNombre" th:value="${typeNombre}" />
                        <input type="hidden" name="operateurNombre"
                            th:value="${commandeFilterDto.operateurNombre[iter.index]}" />
                        <input type="hidden" name="nombreValue"
                            th:value="${commandeFilterDto.nombreValue[iter.index]}" />
                        <button type="button" onclick="removeArrayFilter(this)">x</button>
                    </div>
                </th:block>
            </div>
            <button type="submit">Appliquer les filtres</button>
            <a th:href="@{/commandes/fo/list}">Réinitialiser</a>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Mode de réception</th>
                        <th>Lieu de récupération</th>
                        <th>Début de récupération</th>
                        <th>Fin de récupération</th>
                        <th>Frais de livraison</th>
                        <th>Statut</th>
                        <th>Quantité totale</th>
                        <th>Poids total</th>
                        <th>Valeur totale</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cmd : ${commandes}">
                        <td th:text="${cmd.id}"></td>
                        <td
                            th:text="${cmd.datecommande != null ? #dates.format(cmd.datecommande, 'yyyy-MM-dd HH:mm') : ''}">
                        </td>
                        <td th:text="${cmd.typeCommande}"></td>
                        <td th:text="${cmd.modeReception}"></td>
                        <td
                            th:text="${cmd.pointDeVenteRetrait?.code != null ? cmd.pointDeVenteRetrait?.code : cmd.adresseLivraison}">
                        </td>
                        <td
                            th:text="${cmd.heureReceptionDebut != null ? #dates.format(cmd.heureReceptionDebut, 'yyyy-MM-dd HH:mm') : ''}">
                        </td>
                        <td
                            th:text="${cmd.heureReceptionFin != null ? #dates.format(cmd.heureReceptionFin, 'yyyy-MM-dd HH:mm') : ''}">
                        </td>
                        <td th:text="${cmd.fraisLivraison}"></td>
                        <td th:text="${cmd.statutActuel?.nom}"></td>
                        <td th:text="${cmd.totalProduits}"></td>
                        <td th:text="${cmd.poidsTotal}"></td>
                        <td th:text="${cmd.totalGeneral}"></td>
                        <td>
                            <a th:href="@{|/commandes/fo/detail/${cmd.id}|}">Detail</a>
                            <a th:href="@{|/commandes/fo/form/edit/${cmd.id}|}">Modifier</a>
                            <a th:href="@{|/commandes/fo/delete/${cmd.id}|}">Supprimer</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="section-pagination">
            <label for="line-number">Nombre de lignes</label>
            <input type="number" th:field="*{lineNumber}" id="line-number">
            <input type="hidden" th:field="*{pageNumber}" id="pageParam">
            <button type="submit">Appliquer</button>
            <div class="pagination">
                <button type="button" th:if="${hasPrevious}"
                    th:onclick="'changePage(' + (${commandeFilterDto.pageNumber - 1}) + ')'" class="btn-pagination">
                    « Précédent
                </button>

                <span>Page <strong th:text="${commandeFilterDto.pageNumber}">1</strong> sur <strong
                        th:text="${totalPages}">5</strong></span>

                <button type="button" th:if="${hasNext}"
                    th:onclick="'changePage(' + (${commandeFilterDto.pageNumber + 1}) + ')'" class="btn-pagination">
                    Suivant »
                </button>
            </div>
        </div>
    </form>
    <script>
        function changePage(pageNumber) {
            pageNumberInput.value = pageNumber;
            form.submit();
        }

        function removeStaticFilter(buttonElement, selectId) {
            const badge = buttonElement.parentElement;

            const select = document.getElementById(selectId);
            if (select) {
                select.value = '';
            }

            badge.remove();
        }

        function removeArrayFilter(buttonElement) {
            buttonElement.parentElement.remove();
        }
    </script>
    <script>
        const form = document.getElementById('form');
        const listeClientsDiv = document.getElementById('liste-clients');
        const activeFiltresDiv = document.querySelector('.active-filtres');
        const modeReceptionSelect = document.getElementById('mode-reception-option');
        const filtreDateSelect = document.getElementById('filtre-date-option');
        const calculDateSelect = document.getElementById('calcul-date-option');
        const dateInput = document.getElementById('date-input');
        const ajouterFiltreDateButton = document.getElementById('ajouter-filtre-date');
        const ajouterFiltreNombreButton = document.getElementById('ajouter-filtre-nombre');
        const typeCommandeSelect = document.getElementById('type-commande');
        const statutCommandeSelect = document.getElementById('statut-commande');
        const pageNumberInput = document.getElementById('pageParam');

        modeReceptionSelect.addEventListener('change', function () {
            const selectedMode = modeReceptionSelect.value;
            const modeReceptioninput = document.createElement("input");
            modeReceptioninput.type = "hidden";
            modeReceptioninput.name = "modeReception";
            modeReceptioninput.value = selectedMode;

            if (selectedMode) {
                const filtreDiv = document.createElement("div");
                filtreDiv.classList.add("filtre-actif");

                const filtreText = document.createElement("span");
                const text = selectedMode === 'Retrait_Boutique' ? 'Retrait' : (selectedMode === 'Livraison_Domicile' ? 'Livraison' : selectedMode);
                filtreText.textContent = `Mode de réception: ${text}`;
                filtreDiv.appendChild(filtreText);
                filtreDiv.appendChild(modeReceptioninput);
                activeFiltresDiv.appendChild(filtreDiv);

                const removeButton = document.createElement("button");
                removeButton.textContent = "x";
                removeButton.addEventListener("click", function () {
                    modeReceptionSelect.value = '';
                    filtreDiv.remove();
                });
                filtreDiv.appendChild(removeButton);
            }
        });

        ajouterFiltreDateButton.addEventListener('click', function () {
            const selectedFiltreDate = filtreDateSelect.value;
            const selectedCalculDate = calculDateSelect.value;
            const selectedDate = dateInput.value;

            if (selectedFiltreDate && selectedCalculDate && selectedDate) {
                const labelDateInput = document.createElement("input");
                labelDateInput.type = "hidden";
                labelDateInput.name = "typeFiltreDate";
                labelDateInput.value = selectedFiltreDate;

                const operateurDateInput = document.createElement("input");
                operateurDateInput.type = "hidden";
                operateurDateInput.name = "operateurDate";
                operateurDateInput.value = selectedCalculDate;

                const dateValueInput = document.createElement("input");
                dateValueInput.type = "hidden";
                dateValueInput.name = "dateValue";
                dateValueInput.value = selectedDate;

                const filtreDiv = document.createElement("div");
                filtreDiv.classList.add("filtre-actif");
                filtreDiv.appendChild(dateValueInput);
                filtreDiv.appendChild(labelDateInput);
                filtreDiv.appendChild(operateurDateInput);

                const filtreText = document.createElement("span");
                filtreText.textContent = `Filtre date: ${selectedFiltreDate} ${selectedCalculDate} ${selectedDate}`;
                filtreDiv.appendChild(filtreText);
                activeFiltresDiv.appendChild(filtreDiv);

                const removeButton = document.createElement("button");
                removeButton.textContent = "x";
                removeButton.addEventListener("click", function () {
                    filtreDiv.remove();
                });
                filtreDiv.appendChild(removeButton);
            }
        });

        ajouterFiltreNombreButton.addEventListener('click', function () {
            const selectedFiltreNombre = document.getElementById('filtre-nombre-option').value;
            const selectedCalculNombre = document.getElementById('calcul-nombre-option').value;
            const selectedNombreVal = document.getElementById('nombre-value-input').value;

            if (selectedFiltreNombre && selectedCalculNombre && selectedNombreVal) {

                // 1. Input pour le type de colonne (ex: valeurTotale)
                const labelNombreInput = document.createElement("input");
                labelNombreInput.type = "hidden";
                labelNombreInput.name = "typeFiltreNombre";
                labelNombreInput.value = selectedFiltreNombre;

                // 2. Input pour l'opérateur (0, 1, 2...)
                const operateurNombreInput = document.createElement("input");
                operateurNombreInput.type = "hidden";
                operateurNombreInput.name = "operateurNombre";
                operateurNombreInput.value = selectedCalculNombre;

                // 3. Input pour la valeur numérique saisie
                const nombreValueInput = document.createElement("input");
                nombreValueInput.type = "hidden";
                nombreValueInput.name = "nombreValue";
                nombreValueInput.value = selectedNombreVal;

                // 4. Création visuelle du badge
                const filtreDiv = document.createElement("div");
                filtreDiv.classList.add("filtre-actif");
                filtreDiv.appendChild(labelNombreInput);
                filtreDiv.appendChild(operateurNombreInput);
                filtreDiv.appendChild(nombreValueInput);

                const filtreText = document.createElement("span");
                filtreText.textContent = `Filtre nombre: ${selectedFiltreNombre} ${selectedCalculNombre} ${selectedNombreVal}`;
                filtreDiv.appendChild(filtreText);

                const removeButton = document.createElement("button");
                removeButton.textContent = "x";

                // Suppression propre si on clique sur "x"
                removeButton.addEventListener('click', function () {
                    filtreDiv.remove();
                });

                filtreDiv.appendChild(removeButton);
                activeFiltresDiv.appendChild(filtreDiv);

                // On vide le champ de saisie
                document.getElementById('nombre-value-input').value = '';
            }
        });

        typeCommandeSelect.addEventListener('change', function () {
            const selectedTypeCommande = typeCommandeSelect.value;
            const typeCommandeInput = document.createElement("input");
            typeCommandeInput.type = "hidden";
            typeCommandeInput.name = "typeCommande";
            typeCommandeInput.value = selectedTypeCommande;

            if (selectedTypeCommande) {
                const filtreDiv = document.createElement("div");
                filtreDiv.classList.add("filtre-actif");
                filtreDiv.appendChild(typeCommandeInput);

                const filtreText = document.createElement("span");
                filtreText.textContent = `Type de commande: ${selectedTypeCommande}`;
                filtreDiv.appendChild(filtreText);

                const removeButton = document.createElement("button");
                removeButton.textContent = "x";
                removeButton.addEventListener("click", function () {
                    typeCommandeSelect.value = '';
                    filtreDiv.remove();
                });

                filtreDiv.appendChild(removeButton);
                activeFiltresDiv.appendChild(filtreDiv);
            }
        });

        statutCommandeSelect.addEventListener('change', function () {
            const selectedStatutCommande = statutCommandeSelect.value;
            const statutCommandeInput = document.createElement("input");
            statutCommandeInput.type = "hidden";
            statutCommandeInput.name = "statutCommande";
            statutCommandeInput.value = selectedStatutCommande;
            form.appendChild(statutCommandeInput);

            if (selectedStatutCommande) {
                const filtreDiv = document.createElement("div");
                filtreDiv.classList.add("filtre-actif");

                const filtreText = document.createElement("span");
                filtreText.textContent = `Statut de commande: ${selectedStatutCommande}`;
                filtreDiv.appendChild(filtreText);
                activeFiltresDiv.appendChild(filtreDiv);

                const removeButton = document.createElement("button");
                removeButton.textContent = "x";
                removeButton.addEventListener("click", function () {
                    statutCommandeSelect.value = '';
                    activeFiltresDiv.removeChild(filtreDiv);
                    form.removeChild(statutCommandeInput);
                });
                filtreDiv.appendChild(removeButton);
            }
        });
    </script>
</body>
