<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{back/fragments/layout-caissier :: head('Paiements')}"
  ></head>

  <body class="bo">
    <aside
      th:replace="~{back/fragments/layout-caissier :: sidebar('paiements')}"
    ></aside>

    <main class="bo-main">
      <header
        th:replace="~{back/fragments/layout-caissier :: topbar('Paiements')}"
      ></header>

      <div class="bo-contenu">
        <div class="page-tete">
          <div>
            <p class="fil">
              Paiements <i class="fas fa-chevron-right"></i> Liste
            </p>
            <h1>Paiements</h1>
            <p class="sous-titre">
              Liste des paiements enregistrés par la boutique.
            </p>
          </div>
        </div>

        <th:block th:replace="~{back/fragments/layout-caissier :: alertes}"></th:block>

        <form
          th:action="@{/caissier/paiements}"
          method="GET"
          class="section-filtre barre-filtres"
        >
          <div class="filtre">
            <label for="statut">Statut</label>
            <select id="statut" name="statut">
              <option value="">Tous</option>
              <option
                th:each="s : ${statutsPaiement}"
                th:value="${s}"
                th:text="${s}"
                th:selected="${s == statut}"
              ></option>
            </select>
          </div>
          <div class="filtre">
            <label for="size">Éléments par page</label>
            <select name="size" id="size" onchange="this.form.submit()">
              <option
                th:each="opt : ${ {5, 10, 25, 50, 100} }"
                th:value="${opt}"
                th:text="${opt}"
                th:selected="${opt == size}"
              ></option>
            </select>
          </div>
          <div class="barre-form" style="justify-content: flex-start">
            <button type="submit" class="btn btn-vert btn-sm">
              <i class="fas fa-filter"></i> Filtrer
            </button>
          </div>
        </form>

        <div class="tableau-scroll">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Commande</th>
                <th>Statut</th>
                <th>Date</th>
                <th class="num">Total</th>
                <th class="num">À confirmer</th>
                <th class="num">Reste à payer</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="paiement : ${paiements}">
                <td class="mono" th:text="${paiement.id}">1</td>
                <td
                  class="mono"
                  th:text="${paiement.commande != null ? paiement.commande.id : '—'}"
                >
                  1
                </td>
                <td>
                  <span
                    class="badge"
                    th:classappend="${paiement.statut != null and paiement.statut.name() == 'Cloture'} ? 'badge-vert' : 'badge-ocre'"
                    th:text="${paiement.statut != null ? paiement.statut.name() : '—'}"
                  >
                    Statut
                  </span>
                </td>
                <td th:text="${paiement.date != null ? paiement.date : '—'}">
                  Date
                </td>
                <td class="num texte-ocre"
                    th:text="${paiementService.getMontantTotalCommande(paiement.commande)}">0</td>
                <td class="num mono" th:text="${paiementService.getMontantEnAttente(paiement)}">0</td>
                <td class="num mono"
                    th:text="${paiementService.getMontantRestant(paiement.commande)}">0</td>
                <td>
                  <div class="cellule-actions">
                    <a th:href="@{/caissier/paiement/detail/{id}(id=${paiement.id})}"
                       class="btn btn-sm btn-ligne">
                      <i class="fas fa-eye"></i> Détail
                    </a>
                    <a th:if="${paiementService.aDesLignesEnAttente(paiement)}"
                       th:href="@{/caissier/paiement/detail/{id}(id=${paiement.id})}"
                       class="btn btn-sm btn-doux">
                      <i class="fas fa-check"></i> Confirmer
                    </a>
                    <!-- Le reste n'est payable qu'une fois les versements déjà saisis confirmés. -->
                    <a th:if="${paiementService.getMontantRestant(paiement.commande).compareTo(T(java.math.BigDecimal).ZERO) > 0
                               and !paiementService.aDesLignesEnAttente(paiement)}"
                       th:href="@{/caissier/paiement/reste/{id}(id=${paiement.commande.id})}"
                       class="btn btn-sm btn-ocre">
                      <i class="fas fa-money-bill-wave"></i> Payer le reste
                    </a>
                  </div>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(paiements)}">
                <td colspan="8">
                  <div class="vide">
                    <i class="fas fa-coins"></i>
                    <p>Aucun paiement trouvé.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="section-pagination" th:if="${totalPages > 0}">
          <span>Total : <strong th:text="${totalElements}">0</strong> paiement(s)</span>
          <div class="pagination">
            <a class="btn-pagination" th:if="${page > 0}"
               th:href="@{/caissier/paiements(statut=${statut},page=${page - 1},size=${size})}">« Précédent</a>
            <span>Page <strong th:text="${page + 1}">1</strong> sur <strong th:text="${totalPages}">1</strong></span>
            <a class="btn-pagination" th:if="${page + 1 < totalPages}"
               th:href="@{/caissier/paiements(statut=${statut},page=${page + 1},size=${size})}">Suivant »</a>
          </div>
        </div>
      </div>

      <footer th:replace="~{back/fragments/layout-caissier :: pied}"></footer>
    </main>
  </body>
</html>
