<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{back/fragments/layout :: head(${titre})}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('employes')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Employés')}"></header>

        <div class="bo-contenu">

            <div class="page-tete">
                <div>
                    <p class="fil">Réseau &amp; équipe <i class="fas fa-chevron-right"></i> Employés</p>
                    <h1 th:text="${titre}">Liste employé</h1>
                </div>
                <div class="page-actions">
                    <a th:href="@{/employes}" class="btn btn-ligne" th:if="${!estActif}">Employés actifs</a>
                    <a th:href="@{/employes/archives}" class="btn btn-ligne" th:if="${estActif}">Archives</a>
                    <a th:href="@{/employes/new}" class="btn btn-vert"><i class="fas fa-plus"></i> Ajouter</a>
                </div>
            </div>

            <div class="alerte alerte-succes" th:if="${success}" th:text="${success}"></div>

            <form class="section-filtre barre-filtres" method="get" th:action="${estActif} ? @{/employes} : @{/employes/archives}">
                <div class="filtre filtre-large">
                    <label>Mot clé</label>
                    <input type="text" name="motCle" placeholder="Mot clé" th:value="${motCle}" />
                </div>
                <div class="filtre">
                    <label>Date</label>
                    <input type="date" name="date" th:value="${date}" />
                </div>
                <div class="filtre">
                    <label>Rôle</label>
                    <select name="role">
                        <option value="">Tous les rôles</option>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"
                            th:selected="${role != null and role == r}"></option>
                    </select>
                </div>
                <div class="barre-form" style="justify-content: flex-start;">
                    <button type="submit" class="btn btn-vert btn-sm">Filtrer</button>
                    <a th:href="${estActif} ? @{/employes} : @{/employes/archives}" class="btn btn-ligne btn-sm">Réinitialiser</a>
                </div>
            </form>

            <div class="tableau-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Prénom</th>
                            <th>Mail</th>
                            <th>Contact</th>
                            <th>Rôle</th>
                            <th>Point de vente</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="employe : ${employes}">
                            <td><strong th:text="${employe.nom}"></strong></td>
                            <td th:text="${employe.prenom}"></td>
                            <td th:text="${employe.mail}"></td>
                            <td th:text="${employe.contact ?: '-'}"></td>
                            <td><span class="badge badge-vert" th:text="${employe.role}"></span></td>
                            <td th:text="${employe.pointDeVente != null ? employe.pointDeVente.nom : '-'}"></td>
                            <td th:text="${employe.date}"></td>
                            <td>
                                <div class="cellule-actions">
                                    <a class="btn btn-sm btn-ligne" th:href="@{/employes/{id}(id=${employe.id})}">Détail</a>
                                    <a class="btn btn-sm btn-doux" th:if="${estActif}" th:href="@{/employes/{id}/edit(id=${employe.id})}">Modifier</a>
                                    <form th:if="${estActif}" th:action="@{/employes/{id}/delete(id=${employe.id})}" method="post" style="display: inline">
                                        <button class="btn btn-sm btn-doux-rouge" type="submit">Supprimer</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(employes)}">
                            <td colspan="8">
                                <div class="vide">
                                    <i class="fa-solid fa-users"></i>
                                    <p>Aucun employé trouvé.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
