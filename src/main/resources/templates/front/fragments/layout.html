<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="head">
    <meta charset="utf-8" />
    <title th:text="${pageTitle} ?: 'GreenField'">GreenField</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="" name="keywords" />
    <meta content="" name="description" />

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap"
      rel="stylesheet"
    />

    <!-- Icon Font -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/lib/lightbox/css/lightbox.min.css}" />
    <link
      rel="stylesheet"
      th:href="@{/lib/owlcarousel/assets/owl.carousel.min.css}"
    />
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/acc.css}" />

    <th:block th:replace="${extraCss} ?: _"></th:block>
  </head>
  <body th:fragment="layout(pageContent)">
    <!-- Spinner -->
    <div
      id="spinner"
      class="show w-100 vh-100 bg-white position-fixed translate-middle top-50 start-50 d-flex align-items-center justify-content-center"
      style="z-index: 9999"
    >
      <div class="spinner-grow text-primary" role="status"></div>
    </div>

    <!-- Header -->
    <th:block th:replace="~{front/fragments/header :: header}"></th:block>

    <!-- Contenu -->
    <main>
      <th:block th:replace="${pageContent}"></th:block>
    </main>

    <!-- Footer -->
    <th:block th:replace="~{front/fragments/footer :: footer}"></th:block>

    <!-- Back To Top -->
    <a
      href="#"
      class="btn btn-primary border-3 border-primary rounded-circle back-to-top"
    >
      <i class="fa fa-arrow-up"></i>
    </a>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/lib/easing/easing.min.js}"></script>
    <script th:src="@{/lib/waypoints/waypoints.min.js}"></script>
    <script th:src="@{/lib/lightbox/js/lightbox.min.js}"></script>
    <script th:src="@{/lib/owlcarousel/owl.carousel.min.js}"></script>

    <!-- Template Javascript -->
    <script th:src="@{/js/main.js}"></script>

    <!-- Script pour cacher le spinner -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Cacher le spinner
        var spinner = document.getElementById("spinner");
        if (spinner) {
          spinner.classList.remove("show");
          spinner.style.display = "none";
        }
      });

      // Alternative avec jQuery si chargé
      $(window).on("load", function () {
        $("#spinner").removeClass("show").hide();
      });
    </script>

    <th:block th:replace="${extraJs} ?: _"></th:block>
  </body>
</html>
