<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Détail Livraison</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="container mt-4">
    <h2>Détail de la Livraison</h2>

    <div th:if="${livraison != null}">
      <p><strong>ID :</strong> <span th:text="${livraison.id}"></span></p>

      <p>
        <strong>Statut :</strong>
        <span th:text="${livraison.statutLivraison}"></span>
      </p>

      <p>
        <strong>Date :</strong>
        <span th:text="${livraison.dateLivraison}"></span>
      </p>

      <p>
        <strong>Véhicule :</strong>
        <span th:text="${livraison.vehicule.matricule}"></span>
      </p>

      <p>
        <strong>Livreur :</strong>
        <span th:text="${livraison.livreur.nom}"></span>
      </p>

      <hr />

      <h3>Commandes</h3>

      <table class="table table-bordered">
        <thead>
          <tr>
            <th>ID Ligne</th>
            <th>Commande</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr th:each="f : ${livraison.filles}">
            <td th:text="${f.id}"></td>

            <td th:text="${f.commande.id}"></td>

            <!-- IMPORTANT: id ajouté pour AJAX -->
            <td>
              <span
                th:id="'statut_' + ${f.id}"
                th:text="${f.statutLivraisonFille}"
              ></span>
            </td>

            <td>
              <!-- VALIDER -->
              <button
                type="button"
                class="btn btn-success btn-sm"
                th:if="${f.statutLivraisonFille.name() == 'En_attente'}"
              >
                Valider
              </button>

              <!-- ACTION MODAL -->
              <button
                type="button"
                class="btn btn-danger btn-sm"
                th:if="${f.statutLivraisonFille.name() != 'Annule'
                        && f.statutLivraisonFille.name() != 'Livre'}"
                data-bs-toggle="modal"
                th:attr="data-bs-target='#modal_' + ${f.id}"
              >
                Action
              </button>

              <!-- MODAL -->
              <div class="modal fade" th:id="'modal_' + ${f.id}" tabindex="-1">
                <div class="modal-dialog">
                  <div class="modal-content">
                    <div class="modal-header">
                      <h5 class="modal-title">Gestion Livraison</h5>
                      <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                      ></button>
                    </div>

                    <div class="modal-body">
                      <p>
                        <strong>Commande :</strong>
                        <span th:text="${f.commande.id}"></span>
                      </p>

                      <hr />

                      <!-- ANNULER -->
                      <h6>Annuler commande</h6>

                      <button
                        type="button"
                        class="btn btn-danger btn-sm"
                        th:attr="onclick=|annuler(${f.id})|"
                      >
                        Confirmer annulation
                      </button>

                      <hr />

                      <!-- REPORTER -->
                      <h6>Reporter livraison</h6>

                      <form
                        th:action="@{'/livraison-fille/reporter/' + ${f.id}}"
                        method="get"
                      >
                        <label>Date de report :</label>
                        <input type="date" name="dateReport" required />

                        <br /><br />

                        <button type="submit" class="btn btn-warning btn-sm">
                          Confirmer report
                        </button>
                      </form>
                    </div>

                    <div class="modal-footer">
                      <button class="btn btn-secondary" data-bs-dismiss="modal">
                        Fermer
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div th:if="${livraison == null}">
      <p>Aucune livraison trouvée.</p>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS AJAX -->
    <script>
      function annuler(id) {
        fetch("/livraison-fille/annuler/" + id, {
          method: "POST",
        })
          .then((r) => {
            if (!r.ok) throw new Error("Erreur serveur");
            return r.text();
          })
          .then(() => {
            window.location.href = "/livraison/" + id;
          })
          .catch((err) => {
            alert("Erreur : " + err.message);
          });
      }
    </script>
  </body>
</html>
