<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{back/fragments/layout :: head(${titre})}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('employes')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Employés')}"></header>

        <div class="bo-contenu bo-contenu-etroit">

            <div class="page-tete">
                <div>
                    <p class="fil"><a th:href="@{/employes}">Employés</a> / Formulaire</p>
                    <h1 th:text="${titre}">Formulaire employé</h1>
                </div>
                <div class="page-actions">
                    <a th:href="@{/employes}" class="btn btn-ligne"><i class="fa-solid fa-arrow-left"></i> Voir la liste</a>
                </div>
            </div>

            <div class="alerte alerte-erreur" th:if="${error}" th:text="${error}"></div>

            <div class="carte">
                <div class="carte-tete">
                    <h2><i class="fa-solid fa-id-badge"></i> Informations de l'employé</h2>
                </div>
                <div class="carte-corps">
                    <form th:action="${action}" method="post" th:object="${employe}">

                        <div class="grille-form">
                            <div class="champ">
                                <label>Nom</label>
                                <input type="text" th:field="*{nom}" required />
                            </div>

                            <div class="champ">
                                <label>Prénom</label>
                                <input type="text" th:field="*{prenom}" required />
                            </div>

                            <div class="champ">
                                <label>Adresse</label>
                                <input type="text" th:field="*{adresse}" />
                            </div>

                            <div class="champ">
                                <label>Contact</label>
                                <input type="text" th:field="*{contact}" />
                            </div>

                            <div class="champ">
                                <label>Mail</label>
                                <input type="email" th:field="*{mail}" required />
                            </div>

                            <div class="champ">
                                <label>Mot de passe</label>
                                <input type="password" th:field="*{motdepasse}" th:required="${creation}" autocomplete="new-password" />
                                <span class="aide" th:if="${!creation}">
                                    Laisser vide pour garder le mot de passe actuel.
                                </span>
                            </div>

                            <div class="champ">
                                <label>Rôle</label>
                                <select th:field="*{role}" required>
                                    <option value="">Choisir rôle</option>
                                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                                </select>
                            </div>

                            <div class="champ">
                                <label>Point de vente</label>
                                <select name="codePointDeVente">
                                    <option value="">Aucun</option>
                                    <option th:each="point : ${pointsDeVente}" th:value="${point.code}"
                                        th:text="${point.nom + ' (' + point.code + ')'}"
                                        th:selected="${codePointDeVente != null and codePointDeVente == point.code}"></option>
                                </select>
                            </div>

                            <div class="champ">
                                <label>Date</label>
                                <input type="date" th:field="*{date}" />
                            </div>
                        </div>

                        <div class="btn-list barre-form">
                            <a th:href="@{/employes}" class="btn btn-ligne">Annuler</a>
                            <button type="submit" class="btn btn-vert"><i class="fa-solid fa-check"></i> Enregistrer</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
