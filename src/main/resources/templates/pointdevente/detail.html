<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Détail Point de Vente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="container">
      <h1>Détail du Point de Vente</h1>

      <div class="detail-card">
        <div class="detail-item">
          <strong>Nom</strong>
          <span th:text="${pointDeVente.nom}"></span>
        </div>
        <div class="detail-item">
          <strong>Code</strong>
          <span th:text="${pointDeVente.code}"></span>
        </div>
        <div class="detail-item">
          <strong>Adresse</strong>
          <span th:text="${pointDeVente.adresse}"></span>
        </div>
        <div class="detail-item">
          <strong>Contact</strong>
          <span th:text="${pointDeVente.contact}"></span>
        </div>
      </div>

      <div class="actions">
        <h2>Actions</h2>
        <div class="action-buttons">
          <a th:href="@{/pointdevente/} + ${pointDeVente.id} + '/modifier'" class="btn-modify">Modifier</a>
          <a th:href="@{/pointdevente/} + ${pointDeVente.id} + '/stock'" class="btn-stock">Voir le stock</a>
          <a th:href="@{/pointdevente/} + ${pointDeVente.id} + '/employes'" class="btn-employees">Voir les employés</a>
          <a th:href="@{/pointdevente/} + ${pointDeVente.id} + '/mouvements'" class="btn-movements">Voir les mouvements</a>
          <a th:href="@{/pointdevente}" class="btn-back">Retour à la liste</a>
        </div>
      </div>
    </div>
  </body>
</html>
