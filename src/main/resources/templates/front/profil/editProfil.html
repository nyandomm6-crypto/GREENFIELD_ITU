<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modifier mon profil - greenField</title>
    <th:block th:replace="~{front/fragments/layout :: styles}"></th:block>

    <style>
      .edit-profil-wrap {
        max-width: 820px;
        margin: 0 auto;
      }

      .edit-card {
        background: white;
        border: 1px solid var(--bordure);
        border-radius: 14px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.04);
        padding: 28px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 22px;
      }

      .champ {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .champ label {
        font-size: 14px;
        font-weight: 600;
      }

      .champ input,
      .champ textarea {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid var(--bordure);
        border-radius: 10px;
        font-size: 15px;
        font-family: inherit;
      }

      .champ textarea {
        min-height: 110px;
        resize: vertical;
      }

      .champ.full {
        grid-column: 1 / -1;
      }

      .actions-formulaire {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 22px;
      }

      .note-edit {
        margin-top: 14px;
        font-size: 14px;
        color: var(--gris);
      }

      @media (max-width: 720px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div th:replace="~{front/fragments/layout :: nav}"></div>

    <main class="conteneur edit-profil-wrap">
      <h1>Modifier mon profil</h1>
      <p>Préparez vos nouvelles informations personnelles.</p>

      <div class="edit-card" th:if="${client != null}">
        <div
          class="message success"
          th:if="${success}"
          th:text="${success}"
        ></div>
        <div class="message error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/profil/edit}" method="post">
          <div class="form-grid">
            <div class="champ">
              <label for="prenom">Prénom</label>
              <input
                id="prenom"
                type="text"
                name="prenom"
                th:value="${client.prenom}"
                required
              />
            </div>

            <div class="champ">
              <label for="nom">Nom</label>
              <input
                id="nom"
                type="text"
                name="nom"
                th:value="${client.nom}"
                required
              />
            </div>

            <div class="champ full">
              <label for="mail">Email</label>
              <input
                id="mail"
                type="email"
                name="mail"
                th:value="${client.mail}"
                required
              />
            </div>

            <div class="champ">
              <label for="contact">Contact</label>
              <input
                id="contact"
                type="text"
                name="contact"
                th:value="${client.contact}"
              />
            </div>

            <div class="champ">
              <label for="motDePasse">Mot de passe</label>
              <input
                id="motDePasse"
                type="password"
                name="motdepasse"
                placeholder="Laisser vide pour conserver l'ancien"
              />
            </div>

            <div class="champ full">
              <label for="adresse">Adresse</label>
              <textarea
                id="adresse"
                name="adresse"
                th:text="${client.adresse}"
              ></textarea>
            </div>
          </div>

          <div class="actions-formulaire">
            <button type="submit" class="btn">Enregistrer</button>
            <a class="btn secondaire" th:href="@{/profil}">Annuler</a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
