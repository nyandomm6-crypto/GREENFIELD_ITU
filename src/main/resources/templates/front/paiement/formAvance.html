<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head
    th:replace="~{front/fragments/layout :: head(pageTitle='Paiement avance - GreenField')}"
  >
    <title>Paiement avance - GreenField</title>
  </head>

  <body th:replace="~{front/fragments/layout :: layout(~{::pageContent})}">
    <div th:fragment="pageContent">
      <!-- Single Page Header start -->
      <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Paiement de l'avance</h1>
      </div>
      <!-- Single Page Header End -->

      <div class="container-fluid fruite py-5">
        <div class="container py-5">
          <div class="row g-4 justify-content-center">
            <div class="col-lg-8">
              <div class="alert alert-danger" th:if="${alert != null}" th:text="${alert}"></div>
              <div class="alert alert-success" th:if="${succes != null}" th:text="${succes}"></div>

              <form th:action="@{|/paiements/avance/${commande.id}|}" method="POST">
                <div class="card border-0 shadow-sm rounded-4">
                  <div class="card-body p-4 p-md-5">
                    <h2 class="mb-4">
                      <i class="fas fa-hand-holding-usd text-primary me-2"></i>
                      Commande #<span th:text="${commande.id}"></span>
                    </h2>

                    <ul class="list-group list-group-flush mb-4">
                      <li class="list-group-item d-flex justify-content-between">
                        <span class="text-muted">Montant total à payer</span>
                        <strong th:text="${montantTotal}"></strong>
                      </li>
                      <li class="list-group-item d-flex justify-content-between">
                        <span class="text-muted">Frais de livraison</span>
                        <strong th:text="${commande.fraisLivraison}"></strong>
                      </li>
                      <li class="list-group-item d-flex justify-content-between">
                        <span class="text-muted">Avance à payer</span>
                        <strong class="text-primary" th:text="${avanceAPayer}"></strong>
                      </li>
                    </ul>

                    <div class="mb-4">
                      <label class="form-label fw-bold">Mode de paiement</label>
                      <div class="form-check" th:each="t : ${typesPaiement}">
                        <input
                          class="form-check-input"
                          type="radio"
                          th:id="${'type-' + t}"
                          name="typePayement"
                          th:value="${t}"
                          checked
                        />
                        <label class="form-check-label" th:for="${'type-' + t}" th:text="${t}"></label>
                      </div>
                    </div>

                    <!-- Mobile Money : le montant n'est pas saisi, c'est l'avance calculée. -->
                    <input type="hidden" name="montant" th:value="${avanceAPayer}" />

                    <div class="mb-4">
                      <label class="form-label fw-bold">Numéros de transfert</label>
                      <ul class="list-group mb-3">
                        <li
                          class="list-group-item"
                          th:each="numero : ${numerosTransfert}"
                          th:text="${numero}"
                        ></li>
                      </ul>

                      <label for="messageMobileMoney" class="form-label"
                        >Message (facultatif)</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="messageMobileMoney"
                        name="messageMobileMoney"
                        placeholder="Référence du transfert, remarque..."
                      />
                    </div>

                    <div class="alert alert-info">
                      <i class="fas fa-info-circle me-2"></i>
                      Effectuez le transfert vers l'un des numéros ci-dessus.
                      Votre avance sera validée après vérification par la
                      boutique.
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                      <a
                        th:href="@{|/paiements/choix/${commande.id}|}"
                        class="btn btn-outline-secondary rounded-pill px-4"
                      >
                        <i class="fas fa-arrow-left me-2"></i> Retour
                      </a>
                      <button type="submit" class="btn btn-primary rounded-pill px-4">
                        <i class="fas fa-check me-2"></i> Valider l'avance
                      </button>
                    </div>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
