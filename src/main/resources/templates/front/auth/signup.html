<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head
    th:replace="~{front/fragments/layout :: head(pageTitle='Inscription - GreenField')}"
  >
    <title>Inscription - GreenField</title>
  </head>

  <body th:replace="~{front/fragments/layout :: layout(~{::pageContent})}">
    <div th:fragment="pageContent">
      <!-- Single Page Header start -->
      <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Inscription</h1>
        <ol class="breadcrumb justify-content-center mb-0">
          <li class="breadcrumb-item"><a th:href="@{/}">Accueil</a></li>
          <li class="breadcrumb-item active text-white">Inscription</li>
        </ol>
      </div>
      <!-- Single Page Header End -->

      <!-- Inscription Start -->
      <div class="container-fluid fruite py-5">
        <div class="container py-5">
          <div class="row g-4">
            <div class="col-lg-12">
              <div class="row g-4 justify-content-center">
                <div class="col-lg-6 col-md-8">
                  <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">
                      <div class="text-center mb-4">
                        <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
                        <h3 class="mb-1">Inscription</h3>
                        <p class="text-muted">
                          Créez votre compte greenField en quelques instants
                        </p>
                      </div>

                      <!-- Messages flash -->
                      <div
                        class="alert alert-success"
                        th:if="${success}"
                        th:text="${success}"
                        role="alert"
                      >
                        <i class="fas fa-check-circle me-2"></i>
                      </div>
                      <div
                        class="alert alert-danger"
                        th:if="${error}"
                        th:text="${error}"
                        role="alert"
                      >
                        <i class="fas fa-exclamation-circle me-2"></i>
                      </div>

                      <form
                        id="signupForm"
                        method="post"
                        th:action="@{/signup}"
                      >
                        <div class="row g-3">
                          <div class="col-md-6">
                            <label class="form-label fw-bold">
                              <i class="fas fa-user me-2 text-primary"></i
                              >Prénom <span class="text-danger">*</span>
                            </label>
                            <input
                              type="text"
                              class="form-control"
                              name="prenom"
                              id="prenom"
                              placeholder="Votre prénom"
                              required
                            />
                            <span
                              class="text-danger small"
                              id="err-prenom"
                            ></span>
                          </div>

                          <div class="col-md-6">
                            <label class="form-label fw-bold">
                              <i class="fas fa-user me-2 text-primary"></i>Nom
                              <span class="text-danger">*</span>
                            </label>
                            <input
                              type="text"
                              class="form-control"
                              name="nom"
                              id="nom"
                              placeholder="Votre nom"
                              required
                            />
                            <span class="text-danger small" id="err-nom"></span>
                          </div>

                          <div class="col-12">
                            <label class="form-label fw-bold">
                              <i class="fas fa-envelope me-2 text-primary"></i
                              >Adresse email <span class="text-danger">*</span>
                            </label>
                            <input
                              type="email"
                              class="form-control"
                              name="email"
                              id="email"
                              placeholder="votre@email.com"
                              required
                            />
                            <span
                              class="text-danger small"
                              id="err-email"
                            ></span>
                          </div>

                          <div class="col-12">
                            <label class="form-label fw-bold">
                              <i class="fas fa-lock me-2 text-primary"></i>Mot
                              de passe <span class="text-danger">*</span>
                            </label>
                            <input
                              type="password"
                              class="form-control"
                              name="motDePasse"
                              id="motDePasse"
                              placeholder="Votre mot de passe"
                              required
                            />
                            <span
                              class="text-danger small"
                              id="err-motDePasse"
                            ></span>
                          </div>

                          <div class="col-md-6">
                            <label class="form-label fw-bold">
                              <i class="fas fa-phone me-2 text-primary"></i
                              >Contact
                            </label>
                            <input
                              type="text"
                              class="form-control"
                              name="contact"
                              id="contact"
                              placeholder="Votre numéro de téléphone"
                            />
                            <span
                              class="text-danger small"
                              id="err-contact"
                            ></span>
                          </div>

                          <div class="col-md-6">
                            <label class="form-label fw-bold">
                              <i class="fas fa-map-pin me-2 text-primary"></i
                              >Adresse
                            </label>
                            <input
                              type="text"
                              class="form-control"
                              name="adresse"
                              id="adresse"
                              placeholder="Votre adresse"
                            />
                            <span
                              class="text-danger small"
                              id="err-adresse"
                            ></span>
                          </div>

                          <div class="col-12">
                            <button
                              type="submit"
                              class="btn btn-primary w-100 rounded-pill py-3"
                              id="btn"
                            >
                              <i class="fas fa-user-plus me-2"></i> S'inscrire
                            </button>
                          </div>

                          <div class="col-12 text-center">
                            <hr />
                            <p class="mb-0">
                              <i
                                class="fas fa-sign-in-alt me-2 text-primary"
                              ></i>
                              Déjà un compte ?
                              <a
                                th:href="@{/login}"
                                class="text-primary fw-bold"
                                >Se connecter</a
                              >
                            </p>
                          </div>
                        </div>
                      </form>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Inscription End -->
    </div>

    <script th:src="@{/js/validate.js}"></script>
  </body>
</html>
