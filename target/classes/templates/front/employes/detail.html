<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{back/fragments/layout :: head('Détail employé')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('employes')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Employés')}"></header>

        <div class="bo-contenu bo-contenu-etroit">

            <div class="page-tete">
                <div>
                    <p class="fil"><a th:href="@{/employes}">Employés</a> / Détail</p>
                    <h1 th:text="${employe.nom + ' ' + employe.prenom}">Détail employé</h1>
                </div>
                <div class="page-actions">
                    <a class="btn btn-ligne" th:href="@{/employes}"><i class="fa-solid fa-arrow-left"></i> Retour liste</a>
                    <a class="btn btn-vert" th:if="${employe.estActif}" th:href="@{/employes/{id}/edit(id=${employe.id})}"><i class="fa-solid fa-pen"></i> Modifier</a>
                </div>
            </div>

            <div class="alerte alerte-succes" th:if="${success}" th:text="${success}"></div>

            <div class="carte">
                <div class="carte-tete">
                    <h2><i class="fa-solid fa-id-badge"></i> Informations</h2>
                </div>
                <div class="carte-corps">
                    <dl class="fiche">
                        <dt>Nom</dt>
                        <dd th:text="${employe.nom}"></dd>

                        <dt>Prénom</dt>
                        <dd th:text="${employe.prenom}"></dd>

                        <dt>Adresse</dt>
                        <dd th:text="${employe.adresse ?: '-'}"></dd>

                        <dt>Contact</dt>
                        <dd th:text="${employe.contact ?: '-'}"></dd>

                        <dt>Mail</dt>
                        <dd th:text="${employe.mail}"></dd>

                        <dt>Rôle</dt>
                        <dd><span class="badge badge-vert" th:text="${employe.role}"></span></dd>

                        <dt>Point de vente</dt>
                        <dd th:text="${employe.pointDeVente != null ? employe.pointDeVente.nom + ' (' + employe.pointDeVente.code + ')' : '-'}"></dd>

                        <dt>Actif</dt>
                        <dd>
                            <span th:class="${employe.estActif} ? 'status-active' : 'status-inactive'" th:text="${employe.estActif ? 'Oui' : 'Non'}"></span>
                        </dd>

                        <dt>Date</dt>
                        <dd th:text="${employe.date}"></dd>
                    </dl>
                </div>
            </div>

            <div class="barre-form" th:if="${employe.estActif}">
                <form th:action="@{/employes/{id}/delete(id=${employe.id})}" method="post">
                    <button class="btn btn-doux-rouge" type="submit"><i class="fa-solid fa-trash-can"></i> Supprimer</button>
                </form>
            </div>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
