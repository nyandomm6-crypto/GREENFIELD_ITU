<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liste des Points de Vente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="container">
      <h1>Liste des Points de Vente</h1>

      <div
        class="message success"
        th:if="${success}"
        th:text="${success}"
      ></div>
      <div class="message error" th:if="${error}" th:text="${error}"></div>

      <a th:href="@{/pointdevente/ajouter}" class="btn-add">+ Ajouter un point de vente</a>

      <form th:action="@{/pointdevente}" method="get" class="filter-form">
        <input type="text" name="code" th:value="${code}" placeholder="Filtrer par code..." />
        <button type="submit" class="btn-filter">Filtrer</button>
        <a th:href="@{/pointdevente}" class="btn-reset">Réinitialiser</a>
      </form>

      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Code</th>
            <th>Adresse</th>
            <th>Contact</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="pointDeVente : ${pointDeVentes}">
            <td th:text="${pointDeVente.nom}"></td>
            <td th:text="${pointDeVente.code}"></td>
            <td th:text="${pointDeVente.adresse}"></td>
            <td th:text="${pointDeVente.contact}"></td>
            <td class="actions">
              <a th:href="@{/pointdevente/} + ${pointDeVente.id}" class="btn-view">Voir</a>
              <a th:href="@{/pointdevente/} + ${pointDeVente.id} + '/modifier'" class="btn-edit">Modifier</a>
              <form
                th:action="@{/pointdevente/} + ${pointDeVente.id} + '/supprimer'"
                method="post"
                style="display: inline"
              >
                <button type="submit" class="btn-delete">Supprimer</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
