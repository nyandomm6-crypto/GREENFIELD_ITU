<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{back/fragments/layout-livreur :: head('Tableau de bord livreur')}"
  ></head>

  <body class="bo">
    <aside
      th:replace="~{back/fragments/layout-livreur :: sidebar('livreur')}"
    ></aside>

    <main class="bo-main">
      <header
        th:replace="~{back/fragments/layout-livreur :: topbar('Tableau de bord')}"
      ></header>

      <div class="bo-contenu">
        <div class="page-tete">
          <div>
            <p class="fil">
              Logistique <i class="fas fa-chevron-right"></i> Tableau de bord
            </p>
            <h1>Bonjour, <span th:text="${livreur.nom}"></span></h1>
            <p class="sous-titre">
              Retrouvez ici vos livraisons, votre historique et votre profil.
            </p>
          </div>
        </div>

        <div class="tuiles">
          <a th:href="@{/livreurs/livraisons}" class="tuile">
            <div class="tuile-icone"><i class="fa-solid fa-truck"></i></div>
            <div>
              <h3>Mes livraisons</h3>
              <p>Consulter et gérer les livraisons en cours</p>
            </div>
          </a>

          <a th:href="@{/livreurs/historique}" class="tuile tuile-ocre">
            <div class="tuile-icone">
              <i class="fa-solid fa-clock-rotate-left"></i>
            </div>
            <div>
              <h3>Historique des livraisons</h3>
              <p>Retrouver les livraisons passées</p>
            </div>
          </a>

          <a th:href="@{/livreurs/profil}" class="tuile">
            <div class="tuile-icone"><i class="fa-solid fa-user"></i></div>
            <div>
              <h3>Mon profil</h3>
              <p>Consulter mes informations personnelles</p>
            </div>
          </a>
        </div>
      </div>

      <footer th:replace="~{back/fragments/layout-livreur :: pied}"></footer>
    </main>
  </body>
</html>
