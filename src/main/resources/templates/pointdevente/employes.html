<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employés - Point de Vente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="container">
      <h1>Employés - <span th:text="${pointDeVente.nom}"></span></h1>

      <div class="filter-section">
        <h3>Filtres</h3>
        <form th:action="@{/pointdevente/} + ${pointDeVente.id} + '/employes'" method="get" class="filter-form">
          <label>
            Mot clé
            <input type="text" name="motCle" th:value="${motCle}" placeholder="Rechercher par nom" />
          </label>
          <label>
            Rôle
            <select name="role">
              <option value="">Tous</option>
              <option
                th:each="role : ${T(itu.GreenField.model.FRole).values()}"
                th:value="${role}"
                th:text="${role}"
                th:selected="${role == role}"
              ></option>
            </select>
          </label>
          <button type="submit" class="btn-filter">Filtrer</button>
        </form>
      </div>

      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Prénom</th>
            <th>Email</th>
            <th>Contact</th>
            <th>Rôle</th>
            <th>Actif</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="employe : ${employes}">
            <td th:text="${employe.nom}"></td>
            <td th:text="${employe.prenom}"></td>
            <td th:text="${employe.mail}"></td>
            <td th:text="${employe.contact}"></td>
            <td th:text="${employe.role}"></td>
            <td>
              <span th:class="${employe.estActif} ? 'status-active' : 'status-inactive'" 
                    th:text="${employe.estActif} ? 'Oui' : 'Non'"></span>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="back-links">
        <a th:href="@{/pointdevente/} + ${pointDeVente.id}">← Retour au détail</a>
        <a th:href="@{/pointdevente}">Retour à la liste</a>
      </div>
    </div>
  </body>
</html>
