<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Produit - Point de Vente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="container">
      <h1>Stock Produit - <span th:text="${pointDeVente.nom}"></span></h1>

      <div
        class="message success"
        th:if="${success}"
        th:text="${success}"
      ></div>
      <div class="message error" th:if="${error}" th:text="${error}"></div>

      <div class="filter-section">
        <h3>Filtres</h3>
        <form th:action="@{/pointdevente/} + ${pointDeVente.id} + '/stock'" method="get" class="filter-form">
          <label>
            Catégorie
            <input type="text" name="categorie" th:value="${categorie}" placeholder="Filtrer par catégorie" />
          </label>
          <label>
            Produit
            <input type="text" name="produit" th:value="${produit}" placeholder="Filtrer par produit" />
          </label>
          <button type="submit" class="btn-filter">Filtrer</button>
        </form>
      </div>

      <div>
        <a th:href="@{/pointdevente/} + ${pointDeVente.id} + '/ajouter-produit'" class="btn-add">+ Ajouter un produit</a>
      </div>

      <table>
        <thead>
          <tr>
            <th>Type Mouvement</th>
            <th>Date</th>
            <th>Produit</th>
            <th>Quantité</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="mvt : ${mouvements}">
            <td th:text="${mvt.typeMouvement}"></td>
            <td th:text="${mvt.dateMvt}"></td>
            <td>
              <span th:each="fille : ${mvt.mvtStockFilles}" th:text="${fille.produit.nom} + ' '"></span>
            </td>
            <td>
              <span th:each="fille : ${mvt.mvtStockFilles}" th:text="${fille.quantite} + ' '"></span>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="back-links">
        <a th:href="@{/pointdevente/} + ${pointDeVente.id}">← Retour au détail</a>
        <a th:href="@{/pointdevente}">Retour à la liste</a>
      </div>
    </div>
  </body>
</html>
