<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{back/fragments/layout-caissier :: head('Détail commande')}"
  ></head>

  <body class="bo">
    <aside
      th:replace="~{back/fragments/layout-caissier :: sidebar('commandes')}"
    ></aside>

    <main class="bo-main">
      <header
        th:replace="~{back/fragments/layout-caissier :: topbar('Détail commande')}"
      ></header>

      <div class="bo-contenu">
        <div class="page-tete">
          <div>
            <p class="fil">
              <a th:href="@{/caissier/commandes}">Commandes</a>
              <i class="fas fa-chevron-right"></i>
              <span class="mono" th:text="'#' + ${commande.id}"></span>
            </p>
            <h1 th:text="'Commande #' + ${commande.id}"></h1>
          </div>
          <div class="page-actions">
            <a th:href="@{/caissier/commandes}" class="btn btn-ligne">
              <i class="fas fa-arrow-left"></i> Retour
            </a>
            <a th:if="${estLivrable}" th:href="@{/caissier/commande/livrer/{id}(id=${commande.id})}" class="btn btn-vert">
              <i class="fas fa-send"></i> Livrer cette commande
            </a>
          </div>
        </div>

        <th:block
          th:replace="~{back/fragments/layout-caissier :: alertes}"
        ></th:block>

        <div class="kpi-grille">
          <div class="kpi">
            <p class="kpi-libelle"><i class="fas fa-user"></i> Client</p>
            <p
              class="kpi-valeur"
              style="font-size: 18px"
              th:text="${commande.client != null ? commande.client.nom + ' ' + commande.client.prenom : '—'}"
            ></p>
          </div>
          <div class="kpi">
            <p class="kpi-libelle">
              <i class="fas fa-truck"></i> Mode réception
            </p>
            <p
              class="kpi-valeur"
              style="font-size: 18px"
              th:text="${commande.modeReception != null ? commande.modeReception.name() : '—'}"
            ></p>
          </div>
          <div class="kpi kpi-ocre">
            <p class="kpi-libelle">
              <i class="fas fa-coins"></i> Total général
            </p>
            <p class="kpi-valeur">
              <span th:text="${commande.totalGeneral}"></span> <small>Ar</small>
            </p>
          </div>
        </div>

        <div class="carte">
          <div class="carte-tete">
            <h2>
              <i class="fas fa-list texte-vert"></i> Détails de la commande
            </h2>
          </div>
          <div class="tableau-scroll" style="border: none">
            <table>
              <thead>
                <tr>
                  <th>Produit</th>
                  <th class="num">Quantité</th>
                  <th class="num">Prix unitaire</th>
                  <th class="num">Sous-total</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="d : ${commande.detailsCommande}">
                  <td th:text="${d.produit != null ? d.produit.nom : '—'}">
                    Produit
                  </td>
                  <td class="num" th:text="${d.quantite}">0</td>
                  <td class="num" th:text="${d.puAuMomentAchat}">0</td>
                  <td class="num"
                      th:text="${d.puAuMomentAchat != null and d.quantite != null ? d.puAuMomentAchat * d.quantite : 0}">0</td>
                </tr>
                <tr th:if="${#lists.isEmpty(commande.detailsCommande)}">
                  <td colspan="4">
                    <div class="vide">
                      <i class="fas fa-box-open"></i>
                      <p>Aucune ligne.</p>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="carte">
          <div class="carte-tete">
            <h2><i class="fas fa-cash-register texte-vert"></i> Paiement</h2>
          </div>
          <div class="carte-corps">
            <p>
              Reste à payer :
              <strong><span th:text="${reste}">0</span> Ar</strong>
            </p>

            <form
              th:if="${reste != null}"
              th:action="@{/caissier/paiement/save}"
              method="post"
              class="grille-form"
              style="margin-top: 12px"
            >
              <input
                type="hidden"
                name="commandeId"
                th:value="${commande.id}"
              />
              <div class="champ">
                <label for="typePayement">Type de paiement</label>
                <select id="typePayement" name="typePayement">
                  <option
                    th:each="tp : ${typePayements}"
                    th:value="${tp}"
                    th:text="${tp.name()}"
                  ></option>
                </select>
              </div>
              <div class="champ">
                <label for="montant">Montant (Ar)</label>
                <input
                  type="number"
                  step="0.01"
                  id="montant"
                  name="montant"
                  th:value="${reste}"
                  required
                />
              </div>
              <div class="champ" style="grid-column: 1 / -1">
                <button type="submit" class="btn btn-vert">
                  <i class="fas fa-floppy-disk"></i> Enregistrer le paiement
                </button>
              </div>
            </form>

            <p th:unless="${reste != null}" class="texte-vert">
              <i class="fas fa-circle-check"></i> Cette commande est entièrement
              payée.
            </p>
          </div>
        </div>
      </div>

      <footer th:replace="~{back/fragments/layout-caissier :: pied}"></footer>
    </main>
  </body>
</html>
