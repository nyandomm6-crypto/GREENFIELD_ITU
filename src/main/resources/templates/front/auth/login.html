<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{front/fragments/layout :: head(pageTitle='Connexion - GreenField')}"
  ></head>

  <body th:replace="~{front/fragments/layout :: layout(~{::pageContent})}">
    <div th:fragment="pageContent">
      <!-- Single Page Header start -->
      <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Connexion</h1>
        <ol class="breadcrumb justify-content-center mb-0">
          <li class="breadcrumb-item"><a th:href="@{/}">Accueil</a></li>
          <li class="breadcrumb-item active text-white">Connexion</li>
        </ol>
      </div>
      <!-- Single Page Header End -->

      <!-- Connexion Start -->
      <div class="container-fluid py-5">
        <div class="container py-5">
          <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
              <div class="bg-light rounded p-5">
                <div class="text-center mb-4">
                  <h1 class="display-6 text-primary">Connexion</h1>
                  <p class="text-muted">
                    Connectez-vous à votre compte greenField
                  </p>
                </div>

                <!-- Messages flash -->
                <div
                  class="alert alert-success"
                  th:if="${success}"
                  th:text="${success}"
                  role="alert"
                >
                  <i class="fas fa-check-circle me-2"></i>
                </div>
                <div
                  class="alert alert-danger"
                  th:if="${error}"
                  th:text="${error}"
                  role="alert"
                >
                  <i class="fas fa-exclamation-circle me-2"></i>
                </div>

                <form class="auth-form" th:action="@{/login}" method="post">
                  <input type="hidden" name="redirect" th:value="${redirect}" />

                  <div class="mb-3">
                    <label for="email" class="form-label fw-bold">
                      <i class="fas fa-envelope me-2 text-primary"></i> Adresse
                      email
                    </label>
                    <input
                      id="email"
                      type="email"
                      name="email"
                      class="form-control border-2 rounded-pill px-4 py-2"
                      required
                      placeholder="votre@email.com"
                    />
                  </div>

                  <div class="mb-3">
                    <label for="password" class="form-label fw-bold">
                      <i class="fas fa-lock me-2 text-primary"></i> Mot de passe
                    </label>
                    <input
                      id="password"
                      type="password"
                      name="motDePasse"
                      class="form-control border-2 rounded-pill px-4 py-2"
                      required
                      placeholder="Votre mot de passe"
                    />
                  </div>

                  <div
                    class="d-flex justify-content-between align-items-center mb-4"
                  >
                    <div class="form-check">
                      <input
                        type="checkbox"
                        class="form-check-input"
                        id="remember"
                        name="remember"
                      />
                      <label class="form-check-label" for="remember"
                        >Se souvenir de moi</label
                      >
                    </div>
                    <a href="#" class="text-primary">Mot de passe oublié ?</a>
                  </div>

                  <button
                    type="submit"
                    class="btn btn-primary w-100 rounded-pill py-3"
                  >
                    <i class="fas fa-sign-in-alt me-2"></i> Se connecter
                  </button>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                  <p class="mb-0">
                    <i class="fas fa-user-plus me-2 text-primary"></i>
                    Pas encore de compte ?
                    <a th:href="@{/signup}" class="text-primary fw-bold"
                      >S'inscrire</a
                    >
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Connexion End -->
    </div>
  </body>
</html>
