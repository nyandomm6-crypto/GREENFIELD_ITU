<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{back/fragments/layout :: head(${isEdit ? 'Modifier une item accueil' : 'Nouvel item accueil'})}"
  ></head>

  <body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('homepage')}"></aside>

    <main class="bo-main">
      <header
        th:replace="~{back/fragments/layout :: topbar(${isEdit ? 'Modifier un item' : 'Nouvel item'})}"
      ></header>

      <div class="bo-contenu bo-contenu-etroit">
        <div class="page-tete">
          <div>
            <p class="fil">
              <a th:href="@{/back/homepage}">Contenu accueil</a>
              <i class="fas fa-chevron-right"></i>
              <span th:text="${isEdit ? 'Modification' : 'Création'}"></span>
            </p>
            <h1
              th:text="${isEdit ? 'Modifier l''élément' : 'Ajouter un nouvel élément'}"
            ></h1>
          </div>
        </div>

        <th:block th:replace="~{back/fragments/layout :: alertes}"></th:block>

        <form
          method="post"
          th:object="${feature}"
          th:action="${isEdit ? '/back/homepage/' + ((statMode == true) ? 'stats/modifier/' : 'features/modifier/') + feature.id : ((statMode == true) ? '/back/homepage/stats/nouveau' : '/back/homepage/features/nouveau')}"
          class="carte"
        >
          <div class="carte-corps">
            <input type="hidden" th:field="*{id}" />
            <div class="grille-form">
              <div class="champ">
                <label for="icon">Icône Bootstrap</label>
                <div class="icon-picker">
                  <input type="hidden" id="icon" th:field="*{icon}" />
                  <div class="icon-picker-current flex align-center gap-12">
                    <span
                      id="iconPickerPreview"
                      class="fs-4"
                      th:classappend="${feature.icon != null ? ' ' + feature.icon : ''}"
                    ></span>
                    <span
                      id="iconPickerLabel"
                      class="fw-600"
                      th:text="${feature.icon != null ? #strings.substringAfter(feature.icon, ' ') : 'Sélectionner une icône'}"
                      >Sélectionner une icône</span
                    >
                  </div>
                  <div class="icon-picker-options flex flex-wrap gap-8 mt-8">
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-alarm"
                    >
                      <i class="bi bi-alarm"></i>
                      <span>Alarm</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-bag"
                    >
                      <i class="bi bi-bag"></i>
                      <span>Bag</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-cart-check"
                    >
                      <i class="bi bi-cart-check"></i>
                      <span>Cart check</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-check2-circle"
                    >
                      <i class="bi bi-check2-circle"></i>
                      <span>Check circle</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-emoji-smile"
                    >
                      <i class="bi bi-emoji-smile"></i>
                      <span>Emoji smile</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-heart"
                    >
                      <i class="bi bi-heart"></i>
                      <span>Heart</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-lightning"
                    >
                      <i class="bi bi-lightning"></i>
                      <span>Lightning</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-star"
                    >
                      <i class="bi bi-star"></i>
                      <span>Star</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-truck"
                    >
                      <i class="bi bi-truck"></i>
                      <span>Truck</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-wallet2"
                    >
                      <i class="bi bi-wallet2"></i>
                      <span>Wallet</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-people"
                    >
                      <i class="bi bi-people"></i>
                      <span>People</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-globe"
                    >
                      <i class="bi bi-globe"></i>
                      <span>Globe</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-chat-dots"
                    >
                      <i class="bi bi-chat-dots"></i>
                      <span>Chat</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-shield-lock"
                    >
                      <i class="bi bi-shield-lock"></i>
                      <span>Shield</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-clipboard-check"
                    >
                      <i class="bi bi-clipboard-check"></i>
                      <span>Checklist</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-graph-up"
                    >
                      <i class="bi bi-graph-up"></i>
                      <span>Graph</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-clock"
                    >
                      <i class="bi bi-clock"></i>
                      <span>Clock</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-gear"
                    >
                      <i class="bi bi-gear"></i>
                      <span>Gear</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-phone"
                    >
                      <i class="bi bi-phone"></i>
                      <span>Phone</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-bookmark-star"
                    >
                      <i class="bi bi-bookmark-star"></i>
                      <span>Bookmark</span>
                    </button>
                    <button
                      type="button"
                      class="icon-picker-item flex align-center gap-8"
                      data-value="bi bi-box-seam"
                    >
                      <i class="bi bi-box-seam"></i>
                      <span>Package</span>
                    </button>
                  </div>
                </div>
                <span
                  class="error"
                  th:if="${errors?.containsKey('icon')}"
                  th:text="${errors['icon']}"
                ></span>
              </div>
              <div class="champ">
                <label for="titre">Titre</label>
                <input
                  type="text"
                  id="titre"
                  name="titre"
                  th:value="${feature.titre}"
                  placeholder="Ex : Livraison gratuite"
                  required
                />
                <span
                  class="error"
                  th:if="${errors?.containsKey('titre')}"
                  th:text="${errors['titre']}"
                ></span>
              </div>
              <div class="champ" style="grid-column: 1 / -1">
                <label for="description">Description</label>
                <textarea
                  id="description"
                  name="description"
                  rows="4"
                  placeholder="Description de l'item"
                  required
                  th:text="${feature.description}"
                ></textarea>
                <span
                  class="error"
                  th:if="${errors?.containsKey('description')}"
                  th:text="${errors['description']}"
                ></span>
              </div>
              <div class="champ" style="grid-column: 1 / -1">
                <label>Section</label>
                <div class="flex gap-12">
                  <label class="radio-inline">
                    <input
                      type="radio"
                      name="section"
                      value="features"
                      th:checked="${statMode != true}"
                    />
                    Fonctionnalités
                  </label>
                  <label class="radio-inline">
                    <input
                      type="radio"
                      name="section"
                      value="stats"
                      th:checked="${statMode == true}"
                    />
                    Statistiques
                  </label>
                </div>
              </div>
            </div>
          </div>

          <div class="carte-pied flex gap-12 aligne-centre">
            <button type="submit" class="btn btn-vert">
              <i class="fas fa-floppy-disk"></i> Enregistrer
            </button>
            <a th:href="@{/back/homepage}" class="btn btn-ligne">Annuler</a>
          </div>
        </form>
      </div>

      <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
  </body>
</html>
