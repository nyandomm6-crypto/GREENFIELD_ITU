<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head
    th:replace="~{front/fragments/layout :: head(pageTitle='Mes paiements - GreenField')}"
  >
    <title>Mes paiements - GreenField</title>
  </head>

  <body th:replace="~{front/fragments/layout :: layout(~{::pageContent})}">
    <div th:fragment="pageContent">
      <!-- Single Page Header start -->
      <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Mes paiements</h1>
      </div>
      <!-- Single Page Header End -->

      <div class="container-fluid fruite py-5">
        <div class="container py-5">
          <div class="row g-4 justify-content-center">
            <div class="col-lg-10">
              <div class="alert alert-danger" th:if="${alert != null}" th:text="${alert}"></div>
              <div class="alert alert-success" th:if="${succes != null}" th:text="${succes}"></div>

              <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                  <div class="table-responsive">
                    <table class="table align-middle mb-0">
                      <thead>
                        <tr>
                          <th>#</th>
                          <th>Commande</th>
                          <th>Date</th>
                          <th>Statut</th>
                          <th class="text-end">Total</th>
                          <th class="text-end">En attente</th>
                          <th></th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr th:each="paiement : ${paiements}">
                          <td th:text="${paiement.id}"></td>
                          <td th:text="${paiement.commande.id}"></td>
                          <td th:text="${paiement.date}"></td>
                          <td>
                            <span
                              class="badge"
                              th:classappend="${paiement.statut.name() == 'Cloture'} ? 'bg-success' : 'bg-warning text-dark'"
                              th:text="${paiement.statut}"
                            ></span>
                          </td>
                          <td
                            class="text-end"
                            th:text="${paiementService.getMontantTotalCommande(paiement.commande)}"
                          ></td>
                          <td
                            class="text-end"
                            th:text="${paiementService.getMontantEnAttente(paiement)}"
                          ></td>
                          <td class="text-end">
                            <a
                              th:href="@{|/paiements/detail/${paiement.id}|}"
                              class="btn btn-sm btn-outline-primary rounded-pill px-3"
                            >
                              Détails
                            </a>
                          </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(paiements)}">
                          <td colspan="7" class="text-center text-muted py-5">
                            <i class="fas fa-money-bill-wave fa-2x mb-3 d-block"></i>
                            Aucun paiement pour le moment.
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>

              <div
                class="d-flex justify-content-between align-items-center flex-wrap gap-3 mt-4"
                th:if="${totalPages > 0}"
              >
                <span class="text-muted">
                  Total : <strong th:text="${totalElements}">0</strong> paiement(s)
                </span>
                <div class="d-flex align-items-center gap-3">
                  <a
                    class="btn btn-sm btn-outline-secondary rounded-pill px-3"
                    th:if="${page > 0}"
                    th:href="@{/paiements/list(page=${page - 1},size=${size})}"
                    >« Précédent</a
                  >
                  <span class="text-muted">
                    Page <strong th:text="${page + 1}">1</strong> sur
                    <strong th:text="${totalPages}">1</strong>
                  </span>
                  <a
                    class="btn btn-sm btn-outline-secondary rounded-pill px-3"
                    th:if="${page + 1 < totalPages}"
                    th:href="@{/paiements/list(page=${page + 1},size=${size})}"
                    >Suivant »</a
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
