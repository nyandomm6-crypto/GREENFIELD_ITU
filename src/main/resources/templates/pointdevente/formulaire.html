<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pointDeVente.id} ? 'Modifier Point de Vente' : 'Ajouter Point de Vente'"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="container-small">
      <h1 th:text="${pointDeVente.id} ? 'Modifier Point de Vente' : 'Ajouter Point de Vente'"></h1>

      <form
        th:action="${pointDeVente.id} ? @{/pointdevente/} + ${pointDeVente.id} + '/modifier' : @{/pointdevente/ajouter}"
        method="post"
        th:object="${pointDeVente}"
      >
        <div class="form-group">
          <label for="nom">Nom</label>
          <input type="text" id="nom" th:field="*{nom}" required placeholder="Entrez le nom du point de vente" />
        </div>

        <div class="form-group">
          <label for="code">Code</label>
          <input type="text" id="code" th:field="*{code}" required placeholder="Entrez le code du point de vente" />
        </div>

        <div class="form-group">
          <label for="adresse">Adresse</label>
          <input type="text" id="adresse" th:field="*{adresse}" required placeholder="Entrez l'adresse" />
        </div>

        <div class="form-group">
          <label for="contact">Contact</label>
          <input type="text" id="contact" th:field="*{contact}" required placeholder="Entrez le contact" />
        </div>

        <button type="submit" class="btn-submit" th:text="${pointDeVente.id} ? 'Modifier' : 'Ajouter'"></button>
      </form>

      <a th:href="@{/pointdevente}" class="btn-back-link">← Retour à la liste</a>
    </div>
  </body>
</html>
