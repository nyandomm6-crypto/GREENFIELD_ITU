<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{fragments/layout :: head(titre='Mes commandes - greenField')}"
  ></head>

  <!-- ==========================================================
       CSS PROPRE A LA PAGE "MES COMMANDES"
  =========================================================== -->
  <style>
    /* ---------- VARIABLE TEXTE BASE 16 ---------- */
    :root {
      --text-base: 16px;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    main.page-commandes {
      flex: 1 0 auto;
    }
    .footer {
      margin-top: auto;
    }

    .page-commandes {
      padding: 24px 0 40px;
    }

    /* ---------- MARGE GAUCHE DE 1cm ---------- */
    .conteneur {
      max-width: 1280px;
      padding-left: 1cm !important;
      padding-right: 1cm !important;
    }
    @media (max-width: 575.98px) {
      .conteneur {
        padding-left: 0.5cm !important;
        padding-right: 0.5cm !important;
      }
    }

    /* ---------- BOUTONS HAUTEUR ÉGALE ---------- */
    .btn {
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 28px;
      font-size: var(--text-base);
      min-width: 120px;
    }
    .btn-sm {
      height: 38px !important;
      padding: 0 16px !important;
      font-size: var(--fs-xs) !important;
      min-width: 80px !important;
    }
    @media (max-width: 767.98px) {
      .btn {
        height: 44px;
        padding: 0 20px;
        font-size: var(--text-base);
        min-width: 100px;
      }
    }
    @media (max-width: 575.98px) {
      .btn {
        height: 40px;
        padding: 0 16px;
        font-size: var(--text-base);
        min-width: 80px;
      }
    }

    /* ---------- BREADCRUMB ---------- */
    .breadcrumb {
      font-size: var(--fs-sm);
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-top: 8px;
    }
    .breadcrumb a {
      color: var(--neon-green);
      transition: var(--transition);
    }
    .breadcrumb a:hover {
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.15);
    }
    .breadcrumb span {
      color: var(--text-light);
      font-weight: 600;
    }
    .breadcrumb i {
      margin: 0 6px;
      color: var(--text-muted);
      font-size: var(--fs-xs);
    }

    /* ---------- EN-TETE DE PAGE ---------- */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0, 255, 136, 0.04);
    }
    .page-header h1 {
      font-size: clamp(1.5rem, 3.5vw, 2.8rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .page-header h1 i {
      color: var(--neon-green);
      font-size: clamp(1.3rem, 3vw, 2.2rem);
    }
    .page-header p {
      color: var(--text-muted);
      font-size: var(--text-base);
      margin-top: 2px;
      margin-bottom: 0;
    }

    /* ---------- LISTE DES COMMANDES ---------- */
    .contenu-commandes {
      display: grid;
      gap: 18px;
    }

    .commande-card {
      background: var(--dark-card);
      border: 1px solid rgba(0, 255, 136, 0.04);
      border-radius: var(--radius-lg);
      padding: 22px 26px;
      box-shadow: var(--shadow-neon);
      transition: var(--transition);
    }
    .commande-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 255, 136, 0.08);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.3),
        0 0 40px rgba(0, 255, 136, 0.03);
    }

    .commande-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }
    .commande-titre {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: var(--fs-lg);
      font-weight: 700;
      color: #fff;
    }
    .commande-titre i {
      color: var(--neon-green);
      font-size: var(--fs-md);
    }
    .commande-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      color: var(--text-muted);
      font-size: var(--fs-sm);
      margin-top: 4px;
    }
    .commande-meta i {
      color: var(--neon-green);
      margin-right: 4px;
      width: 16px;
    }

    /* ---------- BADGE STATUT ---------- */
    .badge-statut {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: var(--radius-full);
      font-size: var(--fs-sm);
      font-weight: 700;
      text-transform: capitalize;
      min-height: 36px;
      border: 1px solid transparent;
    }
    .badge-statut.en-attente {
      background: rgba(212, 163, 115, 0.08);
      color: var(--neon-brown);
      border-color: rgba(212, 163, 115, 0.15);
    }
    .badge-statut.validee {
      background: rgba(0, 255, 136, 0.06);
      color: var(--neon-green);
      border-color: rgba(0, 255, 136, 0.1);
    }
    .badge-statut.en-cours {
      background: rgba(0, 255, 136, 0.06);
      color: var(--green-light);
      border-color: rgba(0, 255, 136, 0.08);
      animation: pulse-glow 2s infinite;
    }
    .badge-statut.livree {
      background: rgba(0, 255, 136, 0.08);
      color: var(--neon-green);
      border-color: rgba(0, 255, 136, 0.12);
    }
    .badge-statut.annulee {
      background: rgba(230, 56, 58, 0.06);
      color: var(--red);
      border-color: rgba(230, 56, 58, 0.1);
    }
    .badge-statut.remboursee {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
      border-color: rgba(255, 255, 255, 0.06);
    }
    .badge-statut i {
      font-size: var(--fs-sm);
    }
    @keyframes pulse-glow {
      0%,
      100% {
        box-shadow: 0 0 10px rgba(0, 255, 136, 0.05);
      }
      50% {
        box-shadow: 0 0 25px rgba(0, 255, 136, 0.1);
      }
    }

    /* ---------- GRILLE D'INFOS ---------- */
    .commande-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .commande-info {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(0, 255, 136, 0.04);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      transition: var(--transition);
    }
    .commande-info:hover {
      border-color: rgba(0, 255, 136, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }
    .commande-info label {
      display: block;
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .commande-info label i {
      margin-right: 6px;
      color: var(--neon-green);
      font-size: var(--fs-xs);
    }
    .commande-info strong {
      font-size: var(--fs-md);
      color: var(--text-light);
      font-weight: 700;
      display: block;
    }

    .commande-actions {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      border-top: 1px solid rgba(0, 255, 136, 0.04);
      padding-top: 16px;
    }
    .commande-actions .btn {
      min-width: 120px;
    }

    /* ---------- ETAT VIDE ---------- */
    .vide {
      background: var(--dark-card);
      border: 2px dashed rgba(0, 255, 136, 0.06);
      border-radius: var(--radius-lg);
      padding: 60px 20px;
      text-align: center;
      color: var(--text-muted);
      transition: var(--transition);
    }
    .vide:hover {
      border-color: rgba(0, 255, 136, 0.1);
    }
    .vide i {
      font-size: 56px;
      display: block;
      margin-bottom: 16px;
      color: var(--neon-green);
      opacity: 0.3;
    }
    .vide p {
      font-size: var(--text-base);
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .vide .btn {
      margin-top: 8px;
    }

    /* ---------- SECTION HEADER ---------- */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0, 255, 136, 0.04);
    }

    .section-header .htitle {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section-header .htitle .ic {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: rgba(0, 255, 136, 0.04);
      color: var(--neon-green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--fs-xl);
      border: 1px solid rgba(0, 255, 136, 0.06);
      flex-shrink: 0;
    }
    .section-header h2 {
      font-size: clamp(1.3rem, 2.5vw, 1.8rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
      margin: 0;
    }
    .section-header .subtitle {
      font-size: var(--fs-sm);
      color: var(--text-muted);
      margin: 0;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 1100px) {
      .commande-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 900px) {
      .commande-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .page-header h1 {
        font-size: var(--fs-3xl);
      }
    }
    @media (max-width: 767.98px) {
      .page-commandes {
        padding: 16px 0 30px;
      }
      .page-header h1 {
        font-size: var(--fs-2xl);
      }
      .page-header p {
        font-size: var(--fs-sm);
      }
      .commande-card {
        padding: 16px 18px;
      }
      .commande-titre {
        font-size: var(--fs-md);
      }
      .commande-meta {
        font-size: var(--fs-xs);
        gap: 10px;
      }
      .commande-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .commande-info {
        padding: 10px 12px;
      }
      .commande-info strong {
        font-size: var(--fs-base);
      }
      .vide {
        padding: 40px 16px;
      }
      .vide i {
        font-size: 40px;
      }
      .vide p {
        font-size: var(--fs-base);
      }
    }
    @media (max-width: 575.98px) {
      .page-header h1 {
        font-size: var(--fs-xl);
      }
      .page-header p {
        font-size: var(--fs-xs);
      }
      .commande-card {
        padding: 12px 14px;
      }
      .commande-card-head {
        flex-direction: column;
        align-items: flex-start;
      }
      .commande-titre {
        font-size: var(--fs-base);
      }
      .commande-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .commande-info {
        padding: 8px 10px;
      }
      .commande-info strong {
        font-size: var(--fs-sm);
      }
      .commande-actions {
        justify-content: center;
      }
      .commande-actions .btn {
        min-width: 100%;
        justify-content: center;
      }
      .badge-statut {
        font-size: var(--fs-xs);
        padding: 4px 12px;
        min-height: 28px;
        align-self: flex-start;
      }
      .vide {
        padding: 30px 16px;
      }
      .vide i {
        font-size: 32px;
      }
      .vide p {
        font-size: var(--fs-sm);
      }
      .section-header .htitle .ic {
        width: 34px;
        height: 34px;
        font-size: var(--fs-md);
      }
      .section-header h2 {
        font-size: var(--fs-xl);
      }
      .section-header .subtitle {
        font-size: var(--fs-xs);
      }
    }
  </style>

  <body>
    <!-- HEADER (layout partagé) -->
    <div th:replace="~{fragments/layout :: header}"></div>

    <!-- ==========================================================
         CONTENU PRINCIPAL
    =========================================================== -->
    <main class="page-commandes">
      <div class="conteneur container">
        <div class="breadcrumb">
          <a href="/">Accueil</a> <i class="fas fa-chevron-right"></i>
          <span>Mes commandes</span>
        </div>

        <div class="page-header">
          <div>
            <h1><i class="fas fa-receipt"></i> Mes commandes</h1>
            <p>Consultez vos commandes, leur statut actuel et leur détail.</p>
          </div>
        </div>

        <!-- LISTE DES COMMANDES -->
        <div
          class="contenu-commandes"
          th:if="${commandes != null and !commandes.isEmpty()}"
        >
          <article class="commande-card" th:each="commande : ${commandes}">
            <div class="commande-card-head">
              <div>
                <div class="commande-titre">
                  <i class="fas fa-receipt"></i>
                  <span th:text="'Commande #' + ${commande.id}"></span>
                </div>

                <div class="commande-meta">
                  <span>
                    <i class="far fa-calendar-alt"></i>
                    <span
                      th:text="${#dates.format(commande.datecommande, 'dd/MM/yyyy HH:mm')}"
                    ></span>
                  </span>
                  <span th:if="${commande.modeReception != null}">
                    <i class="fas fa-truck"></i>
                    <span th:text="${commande.modeReception}"></span>
                  </span>
                </div>
              </div>

              <span
                class="badge-statut"
                th:classappend="${commande.statutActuel != null and commande.statutActuel.nom != null ? #strings.toLowerCase(commande.statutActuel.nom).replace(' ', '-') : 'en-attente'}"
              >
                <i
                  th:if="${commande.statutActuel != null and commande.statutActuel.nom != null}"
                  th:class="${commande.statutActuel.nom == 'Validee' ? 'fas fa-check-circle' : 
                              commande.statutActuel.nom == 'En cours' ? 'fas fa-spinner fa-spin' :
                              commande.statutActuel.nom == 'Livree' ? 'fas fa-check-double' :
                              commande.statutActuel.nom == 'Annulee' ? 'fas fa-times-circle' :
                              commande.statutActuel.nom == 'Remboursee' ? 'fas fa-undo-alt' :
                              'fas fa-clock'}"
                ></i>
                <span
                  th:text="${commande.statutActuel != null and commande.statutActuel.nom != null ? commande.statutActuel.nom : 'En attente'}"
                ></span>
              </span>
            </div>

            <div class="commande-grid">
              <div class="commande-info">
                <label><i class="fas fa-user"></i> Client</label>
                <strong
                  th:text="${commande.client != null ? commande.client.prenom + ' ' + commande.client.nom : 'Non défini'}"
                ></strong>
              </div>

              <div class="commande-info">
                <label><i class="fas fa-credit-card"></i> Total général</label>
                <strong
                  th:text="${#numbers.formatDecimal(commande.totalGeneral, 0, 'DEFAULT', 0, 'DEFAULT') + ' Ar'}"
                ></strong>
              </div>

              <div class="commande-info">
                <label><i class="fas fa-boxes"></i> Total produits</label>
                <strong
                  th:text="${commande.totalProduits != null ? commande.totalProduits : 0}"
                ></strong>
              </div>

              <div class="commande-info">
                <label><i class="fas fa-truck"></i> Réception</label>
                <strong
                  th:text="${commande.modeReception != null ? commande.modeReception : 'Non défini'}"
                ></strong>
              </div>
            </div>

            <div class="commande-actions">
              <a
                class="btn btn-outline-light btn-sm"
                th:href="@{/commandes/{id}(id=${commande.id})}"
              >
                <i class="fas fa-eye"></i> Voir le détail
              </a>
            </div>
          </article>
        </div>

        <!-- MESSAGE SI AUCUNE COMMANDE -->
        <div
          class="vide"
          th:unless="${commandes != null and !commandes.isEmpty()}"
        >
          <i class="fas fa-inbox"></i>
          <p>Aucune commande trouvée pour ce client.</p>
          <a href="/produits" class="btn btn-primary">
            <i class="fas fa-shopping-bag"></i> Découvrir nos produits
          </a>
        </div>
      </div>
    </main>

    <!-- FOOTER (layout partagé) -->
    <div th:replace="~{fragments/layout :: footer}"></div>

    <!-- SCRIPTS COMMUNS (layout partagé) -->
    <div th:replace="~{fragments/layout :: scripts}"></div>
  </body>
</html>
