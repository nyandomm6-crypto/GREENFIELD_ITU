<th:block th:fragment="header">
  <!-- Navbar start -->
  <div class="container-fluid fixed-top">
    <div class="container topbar bg-primary d-none d-lg-block">
      <div class="d-flex justify-content-between">
        <div class="top-info ps-2">
          <small class="me-3">
            <i class="fas fa-envelope me-2 text-secondary"></i>
            <a href="#" class="text-white">Greenfield33@gmail.com</a>
          </small>
        </div>
        <div class="top-link pe-2">
          <a href="#" class="text-white">
            <small class="text-white mx-2">Politique de confidentialité</small>/
          </a>
          <a href="#" class="text-white">
            <small class="text-white mx-2">Conditions d'utilisation</small>/
          </a>
          <a href="#" class="text-white">
            <small class="text-white ms-2">Ventes et remboursements</small>
          </a>
        </div>
      </div>
    </div>
    <div class="container px-0">
      <nav class="navbar navbar-light bg-white navbar-expand-xl">
        <a th:href="@{/}" class="navbar-brand d-flex align-items-center">
          <img th:src="@{/img/logo.png}" alt="greenField"
               style="height: 56px; width: auto; background: transparent;" />
          <span class="text-primary display-6 ms-2 mb-0">GreenField</span>
        </a>
        <button
          class="navbar-toggler py-2 px-3"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarCollapse"
        >
          <span class="fa fa-bars text-primary"></span>
        </button>
        <div class="collapse navbar-collapse bg-white" id="navbarCollapse">
          <div class="navbar-nav mx-auto">
            <a
              th:href="@{/}"
              th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI == '/'} ? ' active' : ''"
              class="nav-item nav-link"
            >
              Accueil
            </a>
            <a
              th:href="@{/produits}"
              th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI.startsWith('/produits')} ? ' active' : ''"
              class="nav-item nav-link"
            >
              Boutique
            </a>
            <a
              th:href="@{/commandes}"
              th:classappend="${#httpServletRequest != null and #httpServletRequest.requestURI.startsWith('/commandes')} ? ' active' : ''"
              class="nav-item nav-link"
            >
              Commandes
            </a>
          </div>
          <div class="d-flex m-3 me-0">
            <button
              class="btn-search btn border border-secondary btn-md-square rounded-circle bg-white me-4"
              data-bs-toggle="modal"
              data-bs-target="#searchModal"
            >
              <i class="fas fa-search text-primary"></i>
            </button>
            <a href="/panier" class="position-relative me-4 my-auto">
              <i class="fa fa-shopping-bag fa-2x"></i>
              <span
                class="position-absolute bg-secondary rounded-circle d-flex align-items-center justify-content-center text-dark px-1"
                style="top: -5px; left: 15px; height: 20px; min-width: 20px"
                th:text="${panierCount} ?: 0"
                >3</span
              >
            </a>
            <a href="/profil" class="my-auto">
              <i class="fas fa-user fa-2x"></i>
            </a>
          </div>
        </div>
      </nav>
    </div>
  </div>
  <!-- Navbar End -->

  <!-- Modal Search Start -->
  <div
    class="modal fade"
    id="searchModal"
    tabindex="-1"
    aria-labelledby="exampleModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-fullscreen">
      <div class="modal-content rounded-0">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Rechercher par mot-clé</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body d-flex align-items-center">
          <form
            th:action="@{/produits}"
            method="get"
            class="input-group w-75 mx-auto d-flex"
          >
            <input
              type="search"
              name="motCle"
              class="form-control p-3"
              placeholder="mots-clés"
              aria-describedby="search-icon-1"
            />
            <button
              id="search-icon-1"
              type="submit"
              class="input-group-text p-3"
            >
              <i class="fa fa-search"></i>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <!-- Modal Search End -->
</th:block>
