<!doctype html>
<!-- =====================================================================
  greenField — LAYOUT ESPACE LIVREUR
  Fragments réutilisables par toutes les pages de l'espace livreur :

    head(titre)     : <head> complet (fonts, CSS, favicon)
    sidebar(actif)  : navigation latérale — 'actif' met l'entrée en surbrillance
                      valeurs : livraisons | historique | contact | compte
    topbar(titre)   : barre supérieure avec titre de page
    alertes         : affiche automatiquement success / succes / error / alert / message
    pied            : pied de page
===================================================================== -->
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head th:fragment="head(titre)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${titre} + ' · greenField Livreur'">
      greenField Livreur
    </title>

    <link rel="icon" type="image/png" th:href="@{/img/logo.png}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" th:href="@{/css/greenfield.css}" />
    <script th:src="@{/js/icon-picker.js}" defer></script>
    <link rel="stylesheet" th:href="@{/css/back.css}" />
  </head>

  <body>
    <!-- =================================================================
       SIDEBAR
    ================================================================== -->
    <aside class="bo-sidebar" th:fragment="sidebar(actif)">
      <a th:href="@{/livreurs/dashboard}" class="bo-brand">
        <span
          class="bo-brand-icone"
          style="background: transparent; overflow: hidden"
        >
          <img
            th:src="@{/img/logo.png}"
            alt="greenField"
            style="width: 100%; height: 100%; object-fit: contain"
            onerror="
              this.onerror = null;
              this.outerHTML = '&lt;i class=\'fas fa-seedling\'&gt;&lt;/i&gt;';
            "
          />
        </span>
        <span>
          <span class="bo-brand-nom">green<span>Field</span></span>
          <span class="bo-brand-sous">Livreur</span>
        </span>
      </a>
      <div class="sillons"></div>

      <nav class="bo-nav">
        <p class="bo-nav-groupe">Mes livraisons</p>
        <a
          th:href="@{/livreurs/livraisons}"
          class="bo-nav-lien"
          th:classappend="${actif == 'livraisons'} ? 'actif'"
        >
          <i class="fas fa-truck-fast"></i> Mes livraisons
        </a>

        <p class="bo-nav-groupe">Suivi</p>
        <a
          th:href="@{/livreurs/historique-livraisons}"
          class="bo-nav-lien"
          th:classappend="${actif == 'historique'} ? 'actif'"
        >
          <i class="fas fa-clock-rotate-left"></i> Historique
        </a>

        <p class="bo-nav-groupe">Compte</p>
        <a
          th:href="@{/livreurs/profil}"
          class="bo-nav-lien"
          th:classappend="${actif == 'compte'} ? 'actif'"
        >
          <i class="fas fa-user-gear"></i> Mon compte
        </a>
      </nav>

      <div class="bo-sidebar-pied">
        <form th:action="@{/logout}" method="post" class="w-100 mt-2">
          <button
            type="submit"
            class="bo-nav-lien w-100 text-start border-0 bg-transparent px-3"
          >
            <i class="fas fa-sign-out-alt"></i> Déconnexion
          </button>
        </form>
        <a th:href="@{/}"
          ><i class="fas fa-arrow-up-right-from-square"></i> Voir la boutique</a
        >
        <div>&copy; 2026 greenField</div>
      </div>
    </aside>

    <!-- =================================================================
       TOPBAR
    ================================================================== -->
    <header class="bo-topbar" th:fragment="topbar(titre)">
      <h1 class="bo-topbar-titre" th:text="${titre}">Titre de page</h1>
      <div class="bo-topbar-espace"></div>
      <a th:href="@{/}" class="bo-topbar-lien">
        <i class="fas fa-store"></i> Voir la boutique
      </a>
      <div class="bo-topbar-profil">
        <span class="bo-avatar"><i class="fas fa-user"></i></span>
      </div>
    </header>

    <!-- =================================================================
       ALERTES — couvre tous les noms d'attributs utilisés par les contrôleurs
    ================================================================== -->
    <th:block th:fragment="alertes">
      <div class="alerte alerte-succes" th:if="${success}">
        <i class="fas fa-circle-check"></i>
        <span th:text="${success}"></span>
      </div>
      <div class="alerte alerte-succes" th:if="${succes}">
        <i class="fas fa-circle-check"></i>
        <span th:text="${succes}"></span>
      </div>
      <div class="alerte alerte-erreur" th:if="${error}">
        <i class="fas fa-circle-exclamation"></i>
        <span th:text="${error}"></span>
      </div>
      <div class="alerte alerte-erreur" th:if="${alert}">
        <i class="fas fa-circle-exclamation"></i>
        <span th:text="${alert}"></span>
      </div>
      <div class="alerte alerte-erreur" th:if="${globalError}">
        <i class="fas fa-circle-exclamation"></i>
        <span th:text="${globalError}"></span>
      </div>
      <div class="alerte alerte-info" th:if="${message}">
        <i class="fas fa-circle-info"></i>
        <span th:text="${message}"></span>
      </div>
    </th:block>

    <!-- =================================================================
       PIED DE PAGE
    ================================================================== -->
    <footer class="bo-pied" th:fragment="pied">
      <span>greenField · Marché des producteurs — Espace livreur</span>
      <span>Antananarivo, Madagascar</span>
    </footer>
  </body>
</html>
