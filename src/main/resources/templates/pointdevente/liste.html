<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{back/fragments/layout :: head('Points de vente')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('pdv')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Points de vente')}"></header>

        <div class="bo-contenu">

            <div class="page-tete">
                <div>
                    <p class="fil">Réseau &amp; équipe <i class="fas fa-chevron-right"></i> Points de vente</p>
                    <h1>Points de vente</h1>
                </div>
                <div class="page-actions">
                    <a th:href="@{/pointdevente/ajouter}" class="btn btn-vert"><i class="fas fa-plus"></i> Ajouter un point de vente</a>
                </div>
            </div>

            <div class="alerte alerte-succes" th:if="${success}" th:text="${success}"></div>
            <div class="alerte alerte-erreur" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/pointdevente}" method="get" class="section-filtre barre-filtres">
                <div class="filtre">
                    <label for="code-filtre">Code</label>
                    <input type="text" id="code-filtre" name="code" th:value="${code}" placeholder="Filtrer par code..." />
                </div>
                <div class="filtre">
                    <label for="size">Éléments par page</label>
                    <select name="size" id="size" onchange="this.form.submit()">
                        <option th:each="opt : ${ {5, 10, 25, 50, 100} }"
                                th:value="${opt}" th:text="${opt}"
                                th:selected="${opt == size}"></option>
                    </select>
                </div>
                <div class="barre-form" style="justify-content: flex-start;">
                    <button type="submit" class="btn btn-vert btn-sm">Filtrer</button>
                    <a th:href="@{/pointdevente}" class="btn btn-ligne btn-sm">Réinitialiser</a>
                </div>
            </form>

            <div class="tableau-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Code</th>
                            <th>Adresse</th>
                            <th>Contact</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="pointDeVente : ${pointDeVentes}">
                            <td><strong th:text="${pointDeVente.nom}"></strong></td>
                            <td class="mono" th:text="${pointDeVente.code}"></td>
                            <td th:text="${pointDeVente.adresse}"></td>
                            <td th:text="${pointDeVente.contact}"></td>
                            <td>
                                <div class="cellule-actions">
                                    <a th:href="@{/pointdevente/} + ${pointDeVente.id}" class="btn btn-sm btn-ligne">Voir</a>
                                    <a th:href="@{/pointdevente/} + ${pointDeVente.id} + '/modifier'" class="btn btn-sm btn-doux">Modifier</a>
                                    <form th:action="@{/pointdevente/} + ${pointDeVente.id} + '/supprimer'" method="post" style="display: inline">
                                        <button type="submit" class="btn btn-sm btn-doux-rouge">Supprimer</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pointDeVentes)}">
                            <td colspan="5">
                                <div class="vide">
                                    <i class="fa-solid fa-shop"></i>
                                    <p>Aucun point de vente trouvé.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="section-pagination" th:if="${totalPages > 0}">
                <span>Total : <strong th:text="${totalElements}">0</strong> point(s) de vente</span>
                <div class="pagination">
                    <a class="btn-pagination" th:if="${page > 0}"
                       th:href="@{/pointdevente(code=${code},page=${page - 1},size=${size})}">« Précédent</a>
                    <span>Page <strong th:text="${page + 1}">1</strong> sur <strong th:text="${totalPages}">1</strong></span>
                    <a class="btn-pagination" th:if="${page + 1 < totalPages}"
                       th:href="@{/pointdevente(code=${code},page=${page + 1},size=${size})}">Suivant »</a>
                </div>
            </div>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
