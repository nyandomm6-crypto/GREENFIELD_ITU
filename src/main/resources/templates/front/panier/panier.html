<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head
    th:replace="~{front/fragments/layout :: head(pageTitle='Mon panier - GreenField')}"
  >
    <title>Mon panier - GreenField</title>
  </head>

  <body th:replace="~{front/fragments/layout :: layout(~{::pageContent})}">
    <div th:fragment="pageContent">
      <!-- Single Page Header start -->
      <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Mon panier</h1>
      </div>
      <!-- Single Page Header End -->

      <!-- Panier Start -->
      <div class="container-fluid fruite py-5">
        <div class="container py-5">
          <div class="row g-4">
            <div class="col-lg-12">
              <div class="row g-4">
                <!-- Messages flash -->
                <div class="col-12" th:if="${success != null}">
                  <div
                    class="alert alert-success"
                    th:text="${success}"
                    role="alert"
                  >
                    <i class="fas fa-check-circle me-2"></i>
                  </div>
                </div>
                <div class="col-12" th:if="${error != null}">
                  <div
                    class="alert alert-danger"
                    th:text="${error}"
                    role="alert"
                  >
                    <i class="fas fa-exclamation-circle me-2"></i>
                  </div>
                </div>

                <!-- Panier avec produits -->
                <div class="col-12" th:if="${!lignes.isEmpty()}">
                  <div class="row g-4">
                    <!-- Liste produits -->
                    <div class="col-lg-8">
                      <div class="card shadow-sm border-0 rounded-3">
                        <div class="card-body p-0">
                          <div class="table-responsive">
                            <table
                              class="table table-bordered table-hover mb-0"
                            >
                              <thead class="bg-light">
                                <tr>
                                  <th>Produit</th>
                                  <th class="text-center">Quantité</th>
                                  <th class="text-end">Poids</th>
                                  <th class="text-end">Prix</th>
                                  <th class="text-center">Actions</th>
                                </tr>
                              </thead>
                              <tbody>
                                <tr th:each="ligne : ${lignes}">
                                  <td>
                                    <div class="d-flex align-items-center">
                                      <div
                                        style="
                                          width: 60px;
                                          height: 60px;
                                          overflow: hidden;
                                          border-radius: 8px;
                                          margin-right: 12px;
                                        "
                                      >
                                        <img
                                          th:src="${ligne.produit.imagePath != null and !#strings.isEmpty(ligne.produit.imagePath) ? ligne.produit.imagePath : '/img/fruite-item-5.jpg'}"
                                          class="img-fluid w-100 h-100"
                                          style="object-fit: cover"
                                          th:alt="${ligne.produit.nom}"
                                        />
                                      </div>
                                      <div>
                                        <h6
                                          class="mb-0"
                                          th:text="${ligne.produit.nom}"
                                        ></h6>
                                        <small
                                          class="text-muted"
                                          th:text="'Réf: ' + ${ligne.produit.id}"
                                        ></small>
                                      </div>
                                    </div>
                                  </td>
                                  <td class="text-center">
                                    <div
                                      class="d-flex justify-content-center align-items-center gap-2"
                                    >
                                      <form
                                        th:action="@{/panier/modifier}"
                                        method="post"
                                        style="display: inline"
                                      >
                                        <input
                                          type="hidden"
                                          name="idProduit"
                                          th:value="${ligne.produit.id}"
                                        />
                                        <input
                                          type="hidden"
                                          name="quantite"
                                          th:value="${ligne.quantite - 1}"
                                        />
                                        <button
                                          type="submit"
                                          class="btn btn-sm btn-outline-secondary rounded-circle"
                                          th:disabled="${ligne.quantite <= 1}"
                                          style="width: 30px; height: 30px"
                                        >
                                          <i class="fas fa-minus"></i>
                                        </button>
                                      </form>
                                      <span
                                        class="fw-bold"
                                        th:text="${ligne.quantite}"
                                        >0</span
                                      >
                                      <form
                                        th:action="@{/panier/modifier}"
                                        method="post"
                                        style="display: inline"
                                      >
                                        <input
                                          type="hidden"
                                          name="idProduit"
                                          th:value="${ligne.produit.id}"
                                        />
                                        <input
                                          type="hidden"
                                          name="quantite"
                                          th:value="${ligne.quantite + 1}"
                                        />
                                        <button
                                          type="submit"
                                          class="btn btn-sm btn-outline-secondary rounded-circle"
                                          style="width: 30px; height: 30px"
                                        >
                                          <i class="fas fa-plus"></i>
                                        </button>
                                      </form>
                                    </div>
                                  </td>
                                  <td
                                    class="text-end fw-bold text-primary"
                                    th:text="${ligne.sousTotalPoids} + ' Kg'"
                                  >
                                  <td
                                    class="text-end fw-bold text-primary"
                                    th:text="${ligne.sousTotal} + ' Ar'"
                                  >
                                    0 Ar
                                  </td>
                                  <td class="text-center">
                                    <form
                                      th:action="@{/panier/supprimer/{id}(id=${ligne.produit.id})}"
                                      method="post"
                                      style="display: inline"
                                    >
                                      <button
                                        type="submit"
                                        class="btn btn-sm btn-danger rounded-circle"
                                        style="width: 30px; height: 30px"
                                      >
                                        <i class="fas fa-trash-alt"></i>
                                      </button>
                                    </form>
                                  </td>
                                </tr>
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- Récapitulatif -->
                    <div class="col-lg-4">
                      <div class="card shadow-sm border-0 rounded-3">
                        <div class="card-body p-4">
                          <h5 class="card-title mb-3">
                            <i class="fas fa-receipt text-primary me-2"></i
                            >Récapitulatif
                          </h5>
                          <hr />
                          <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Sous-total</span>
                            <span th:text="${total} + ' Ar'"></span>
                          </div>
                          <hr />
                          <div class="d-flex justify-content-between mb-3">
                            <span class="fw-bold fs-5">Total</span>
                            <span
                              class="fw-bold fs-5 text-primary"
                              th:text="${total} + ' Ar'"
                            ></span>
                          </div>
                          <form
                            th:action="@{/commande/recapitulatif}"
                            method="get"
                          >
                            <button
                              type="submit"
                              class="btn btn-primary w-100 rounded-pill py-3"
                            >
                              <i class="fas fa-lock me-2"></i> Commander
                            </button>
                          </form>
                          <div class="mt-3">
                            <div
                              class="d-flex justify-content-center gap-2 flex-wrap"
                            >
                              <span class="badge bg-light text-dark py-2 px-3">
                                <i class="fas fa-mobile-alt me-1"></i> MVola
                              </span>
                              <span class="badge bg-light text-dark py-2 px-3">
                                <i class="fas fa-mobile-alt me-1"></i> Orange
                                Money
                              </span>
                              <span class="badge bg-light text-dark py-2 px-3">
                                <i class="fas fa-credit-card me-1"></i> Carte
                              </span>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Panier vide -->
                <div class="col-12" th:if="${lignes.isEmpty()}">
                  <div class="text-center py-5">
                    <i class="fas fa-shopping-basket fa-5x text-muted mb-3"></i>
                    <h4 class="text-muted">Votre panier est vide</h4>
                    <p class="text-muted">
                      Découvrez nos produits frais et locaux, directement des
                      producteurs.
                    </p>
                    <a
                      th:href="@{/produits}"
                      class="btn btn-primary rounded-pill px-4 py-2 mt-2"
                    >
                      <i class="fas fa-store me-2"></i> Découvrir les produits
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Panier End -->
    </div>
  </body>
</html>
