<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon profil - greenField</title>
    <th:block th:replace="~{front/fragments/layout :: styles}"></th:block>

    <style>
      .profil-page {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 24px;
        align-items: start;
      }

      .carte-profil,
      .carte-info {
        background: white;
        border: 1px solid var(--bordure);
        border-radius: 14px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.04);
      }

      .carte-profil {
        padding: 28px 22px;
        text-align: center;
      }

      .avatar-profil {
        width: 92px;
        height: 92px;
        border-radius: 50%;
        margin: 0 auto 14px;
        background: linear-gradient(135deg, var(--vert), var(--vert-fonce));
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        font-weight: 700;
      }

      .nom-profil {
        font-size: 22px;
        font-weight: 700;
        margin: 0;
      }

      .mail-profil {
        color: var(--gris);
        margin: 8px 0 0;
        word-break: break-word;
      }

      .actions-profil {
        margin-top: 20px;
        display: grid;
        gap: 10px;
      }

      .carte-info {
        padding: 26px;
      }

      .infos-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .info-item {
        padding: 14px 16px;
        border: 1px solid var(--bordure);
        border-radius: 10px;
        background: #fbfcfb;
      }

      .info-label {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--gris);
        margin-bottom: 6px;
      }

      .info-valeur {
        font-size: 15px;
        font-weight: 600;
      }

      .etat-verification {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
      }

      .etat-verification.ok {
        background: #e8f5e9;
        color: var(--vert-fonce);
      }

      .etat-verification.attente {
        background: #fff8e1;
        color: #8a6d1d;
      }

      @media (max-width: 820px) {
        .profil-page {
          grid-template-columns: 1fr;
        }

        .infos-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div th:replace="~{front/fragments/layout :: nav}"></div>

    <main class="conteneur">
      <h1>Mon profil</h1>
      <p>Consultez et mettez à jour vos informations personnelles.</p>

      <div class="profil-page" th:if="${client != null}">
        <aside class="carte-profil">
          <div
            class="avatar-profil"
            th:text="${#strings.substring(client.prenom, 0, 1)} + ${#strings.substring(client.nom, 0, 1)}"
          ></div>
          <p
            class="nom-profil"
            th:text="${client.prenom} + ' ' + ${client.nom}"
          ></p>
          <p class="mail-profil" th:text="${client.mail}"></p>

          <div class="actions-profil">
            <a class="btn" th:href="@{/profil/edit}">Modifier mon profil</a>
            <a class="btn secondaire" th:href="@{/produits}"
              >Voir les produits</a
            >
          </div>
        </aside>

        <section class="carte-info">
          <h2>Détails du compte</h2>

          <div class="infos-grid">
            <div class="info-item">
              <span class="info-label">Prénom</span>
              <span class="info-valeur" th:text="${client.prenom}"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Nom</span>
              <span class="info-valeur" th:text="${client.nom}"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Email</span>
              <span class="info-valeur" th:text="${client.mail}"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Contact</span>
              <span
                class="info-valeur"
                th:text="${client.contact != null ? client.contact : 'Non renseigné'}"
              ></span>
            </div>
            <div class="info-item">
              <span class="info-label">Adresse</span>
              <span
                class="info-valeur"
                th:text="${client.adresse != null ? client.adresse : 'Non renseignée'}"
              ></span>
            </div>
            <div class="info-item">
              <span class="info-label">Compte</span>
              <span
                class="etat-verification"
                th:classappend="${client.estVerifie != null and client.estVerifie} ? 'ok' : 'attente'"
                th:text="${client.estVerifie != null and client.estVerifie} ? 'Vérifié' : 'En attente de vérification'"
              ></span>
            </div>
            <div class="info-item">
              <span class="info-label">Date d'inscription</span>
              <span
                class="info-valeur"
                th:text="${client.date != null ? client.date : 'Non renseignée'}"
              ></span>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
