<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{back/fragments/layout :: head(${isEdit ? 'Modifier un produit' : 'Nouveau produit'})}"></head>

  <body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('produits')}"></aside>

    <main class="bo-main">
      <header th:replace="~{back/fragments/layout :: topbar(${isEdit ? 'Modifier un produit' : 'Nouveau produit'})}"></header>

      <div class="bo-contenu bo-contenu-etroit">
        <div class="page-tete">
          <div>
            <p class="fil">
              <a th:href="@{/back/produits}">Produits</a>
              <i class="fas fa-chevron-right"></i>
              <span th:text="${isEdit ? 'Modification' : 'Création'}"></span>
            </p>
            <h1 th:text="${isEdit ? 'Modifier le produit' : 'Ajouter un nouveau produit'}"></h1>
            <p class="sous-titre">Les champs sont vérifiés en direct pendant la saisie.</p>
          </div>
        </div>

        <th:block th:replace="~{back/fragments/layout :: alertes}"></th:block>

        <form
          id="produitForm"
          method="post"
          th:action="${isEdit ? '/back/produits/modifier/' + produit.id : '/back/produits/nouveau'}"
          class="carte"
        >
          <div class="carte-corps">
            <input type="hidden" id="prodId" name="id" th:value="${produit.id}" />

            <div class="grille-form">
              <div class="champ">
                <label for="nom">Nom du produit</label>
                <input
                  type="text"
                  id="nom"
                  name="nom"
                  th:value="${produit.nom}"
                  placeholder="Ex : Fromage de chèvre affiné"
                  required
                />
                <span class="error" id="err-nom"></span>
              </div>

              <div class="champ">
                <label for="matricule">Matricule</label>
                <input
                  type="text"
                  id="matricule"
                  name="matricule"
                  th:value="${produit.matricule}"
                  placeholder="Ex : PRD-0042"
                  required
                />
                <span class="error" id="err-matricule"></span>
              </div>

              <div class="champ">
                <label for="pu">Prix unitaire (Ar)</label>
                <input
                  type="number"
                  step="0.01"
                  id="pu"
                  name="pu"
                  th:value="${produit.pu}"
                  placeholder="0.00"
                  required
                />
                <span class="error" id="err-pu"></span>
              </div>

              <div class="champ">
                <label for="idCategorie">Catégorie</label>
                <select id="idCategorie" name="categorie.id" required>
                  <option value="">-- Sélectionner --</option>
                  <option
                    th:each="cat : ${categories}"
                    th:value="${cat.id}"
                    th:text="${cat.libelle}"
                    th:selected="${produit.categorie != null && cat.id == produit.categorie.id}"
                  ></option>
                </select>
                <span class="error" id="err-categorie"></span>
              </div>
            </div>
          </div>

          <div class="carte-pied flex gap-12 aligne-centre">
            <button type="submit" id="btnSubmit" class="btn btn-vert">
              <i class="fas fa-floppy-disk"></i> Enregistrer
            </button>
            <a th:href="@{/back/produits}" class="btn btn-ligne">Annuler</a>
          </div>
        </form>
      </div>

      <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>

    <script>
      const formInputs = document.querySelectorAll(
        "#produitForm input, #produitForm select",
      );
      const btnSubmit = document.getElementById("btnSubmit");

      async function validateForm() {
        const formData = new URLSearchParams();
        formData.append("id", document.getElementById("prodId").value);
        formData.append("nom", document.getElementById("nom").value);
        formData.append(
          "matricule",
          document.getElementById("matricule").value,
        );
        formData.append("pu", document.getElementById("pu").value);
        formData.append(
          "idCategorie",
          document.getElementById("idCategorie").value,
        );

        const response = await fetch("/back/produits/validation", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: formData,
        });

        const errors = await response.json();
        let hasError = false;

        // Réinitialiser l'interface
        formInputs.forEach((i) => i.classList.remove("error-border"));
        document
          .querySelectorAll(".error")
          .forEach((e) => (e.textContent = ""));

        // Afficher les erreurs
        for (let field in errors) {
          hasError = true;

          const inputName = field === "categorie" ? "categorie.id" : field;
          const input = document.querySelector(`[name="${inputName}"]`);
          const errorSpan = document.getElementById("err-" + field);

          if (input) input.classList.add("error-border");
          if (errorSpan) errorSpan.textContent = errors[field];
        }

        // Activer ou non le bouton
        btnSubmit.disabled = hasError;
      }

      formInputs.forEach((i) => i.addEventListener("input", validateForm));
    </script>
  </body>
</html>
