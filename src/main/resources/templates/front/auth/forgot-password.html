<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{front/fragments/layout :: head(pageTitle='Mot de passe oublié - GreenField')}"
  ></head>

  <body th:replace="~{front/fragments/layout :: layout(~{::pageContent})}">
    <div th:fragment="pageContent">
      <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Mot de passe oublié</h1>
      </div>

      <div class="container-fluid py-5">
        <div class="container py-5">
          <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
              <div class="bg-light rounded p-5">
                <div class="text-center mb-4">
                  <h2 class="display-6 text-primary">Récupération du compte</h2>
                  <p class="text-muted">
                    Saisissez votre adresse e-mail pour recevoir un code de
                    vérification.
                  </p>
                </div>

                <div
                  class="alert alert-success"
                  th:if="${success}"
                  th:text="${success}"
                  role="alert"
                ></div>
                <div
                  class="alert alert-danger"
                  th:if="${error}"
                  th:text="${error}"
                  role="alert"
                ></div>

                <form th:action="@{/mot-de-passe-oublie}" method="post">
                  <div class="mb-3">
                    <label for="email" class="form-label fw-bold"
                      >Adresse e-mail</label
                    >
                    <input
                      id="email"
                      type="email"
                      name="email"
                      class="form-control rounded-pill px-4 py-2"
                      required
                      placeholder="votre@email.com"
                    />
                  </div>

                  <button
                    type="submit"
                    class="btn btn-primary w-100 rounded-pill py-3"
                  >
                    <i class="fas fa-paper-plane me-2"></i> Envoyer le code
                  </button>
                </form>

                <div class="text-center mt-4">
                  <a th:href="@{/login}" class="text-primary fw-bold"
                    >Retour à la connexion</a
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
