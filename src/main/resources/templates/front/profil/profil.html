<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head
    th:replace="~{front/fragments/layout :: head(pageTitle='Mon profil - GreenField')}"
  >
    <title>Mon profil - GreenField</title>
  </head>

  <body th:replace="~{front/fragments/layout :: layout(~{::pageContent})}">
    <div th:fragment="pageContent">
      <!-- Single Page Header start -->
      <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Mon profil</h1>
      </div>
      <!-- Single Page Header End -->

      <!-- Profil Start -->
      <div class="container-fluid fruite py-5">
        <div class="container py-5">
          <div class="row g-4">
            <div class="col-lg-12">
              <div class="row g-4">
                <!-- Profil avec données -->
                <div class="col-12" th:if="${client != null}">
                  <div class="row g-4">
                    <!-- Colonne gauche - Carte profil -->
                    <div class="col-lg-4 col-md-5">
                      <div
                        class="card shadow-sm border-0 rounded-3 text-center"
                      >
                        <div class="card-body p-4">
                          <div
                            class="avatar-profil mb-3"
                            style="
                              width: 100px;
                              height: 100px;
                              border-radius: 50%;
                              margin: 0 auto;
                              background: linear-gradient(
                                135deg,
                                #009951,
                                #123d27
                              );
                              color: white;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                              font-size: 36px;
                              font-weight: 700;
                              box-shadow: 0 4px 20px rgba(45, 106, 79, 0.25);
                            "
                            th:text="${#strings.substring(client.prenom, 0, 1)} + ${#strings.substring(client.nom, 0, 1)}"
                          ></div>
                          <h4
                            class="mb-1"
                            th:text="${client.prenom} + ' ' + ${client.nom}"
                          ></h4>
                          <p
                            class="text-muted mb-3"
                            th:text="${client.mail}"
                          ></p>

                          <div class="d-grid gap-2">
                            <a
                              th:href="@{/profil/edit}"
                              class="btn btn-primary rounded-pill"
                            >
                              <i class="fas fa-pen me-2"></i> Modifier mon
                              profil
                            </a>
                            <a
                              th:href="@{/produits}"
                              class="btn btn-outline-secondary rounded-pill"
                            >
                              <i class="fas fa-store me-2"></i> Voir les
                              produits
                            </a>
                            <hr class="my-2" />
                            <form th:action="@{/logout}" method="post">
                              <button
                                type="submit"
                                class="btn btn-danger rounded-pill w-100"
                              >
                                <i class="fas fa-sign-out-alt me-2"></i> Se
                                déconnecter
                              </button>
                            </form>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- Colonne droite - Détails du compte -->
                    <div class="col-lg-8 col-md-7">
                      <div class="card shadow-sm border-0 rounded-3">
                        <div
                          class="card-header bg-light border-0 rounded-top-3"
                        >
                          <h5 class="mb-0">
                            <i class="fas fa-id-card text-primary me-2"></i
                            >Détails du compte
                          </h5>
                        </div>
                        <div class="card-body p-4">
                          <div class="row g-3">
                            <div class="col-md-6">
                              <div class="bg-light rounded-3 p-3">
                                <small class="text-muted d-block"
                                  ><i class="fas fa-user me-1"></i>Prénom</small
                                >
                                <strong th:text="${client.prenom}"></strong>
                              </div>
                            </div>
                            <div class="col-md-6">
                              <div class="bg-light rounded-3 p-3">
                                <small class="text-muted d-block"
                                  ><i class="fas fa-user me-1"></i>Nom</small
                                >
                                <strong th:text="${client.nom}"></strong>
                              </div>
                            </div>
                            <div class="col-md-6">
                              <div class="bg-light rounded-3 p-3">
                                <small class="text-muted d-block"
                                  ><i class="fas fa-envelope me-1"></i
                                  >Email</small
                                >
                                <strong th:text="${client.mail}"></strong>
                              </div>
                            </div>
                            <div class="col-md-6">
                              <div class="bg-light rounded-3 p-3">
                                <small class="text-muted d-block"
                                  ><i class="fas fa-phone me-1"></i
                                  >Contact</small
                                >
                                <strong
                                  th:text="${client.contact != null ? client.contact : 'Non renseigné'}"
                                ></strong>
                              </div>
                            </div>
                            <div class="col-md-6">
                              <div class="bg-light rounded-3 p-3">
                                <small class="text-muted d-block"
                                  ><i class="fas fa-map-pin me-1"></i
                                  >Adresse</small
                                >
                                <strong
                                  th:text="${client.adresse != null ? client.adresse : 'Non renseignée'}"
                                ></strong>
                              </div>
                            </div>
                            <div class="col-md-6">
                              <div class="bg-light rounded-3 p-3">
                                <small class="text-muted d-block"
                                  ><i class="fas fa-shield-alt me-1"></i
                                  >Compte</small
                                >
                                <span
                                  class="badge rounded-pill px-3 py-2"
                                  th:classappend="${client.estVerifie != null and client.estVerifie} ? 'bg-success' : 'bg-warning text-dark'"
                                >
                                  <i
                                    th:if="${client.estVerifie != null and client.estVerifie}"
                                    class="fas fa-check-circle me-1"
                                  ></i>
                                  <i
                                    th:unless="${client.estVerifie != null and client.estVerifie}"
                                    class="fas fa-clock me-1"
                                  ></i>
                                  <span
                                    th:text="${client.estVerifie != null and client.estVerifie} ? 'Vérifié' : 'En attente'"
                                  ></span>
                                </span>
                              </div>
                            </div>
                            <div class="col-md-6">
                              <div class="bg-light rounded-3 p-3">
                                <small class="text-muted d-block"
                                  ><i class="fas fa-calendar-alt me-1"></i>Date
                                  d'inscription</small
                                >
                                <strong
                                  th:text="${client.date != null ? client.date : 'Non renseignée'}"
                                ></strong>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Message si non connecté -->
                <div class="col-12" th:unless="${client != null}">
                  <div class="text-center py-5">
                    <i class="fas fa-user-slash fa-5x text-muted mb-3"></i>
                    <h4 class="text-muted">Vous n'êtes pas connecté</h4>
                    <p class="text-muted">
                      Veuillez vous connecter pour accéder à votre profil.
                    </p>
                    <a
                      th:href="@{/login}"
                      class="btn btn-primary rounded-pill px-4 py-2 mt-2"
                    >
                      <i class="fas fa-sign-in-alt me-2"></i> Se connecter
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Profil End -->
    </div>
  </body>
</html>
