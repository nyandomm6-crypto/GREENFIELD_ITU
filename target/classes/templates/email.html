<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Envoyer un email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Instrument Sans", Arial, sans-serif;
        background: #F4F7F3;
        color: #14261B;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 16px;
      }

      h1 {
        margin: 0 0 24px;
        font-family: "Bricolage Grotesque", "Instrument Sans", sans-serif;
        font-weight: 700;
        font-size: 28px;
        color: #0A2E1C;
      }

      form {
        display: grid;
        gap: 16px;
        background: #ffffff;
        border: 1px solid #E3E9E1;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 14px rgba(10, 46, 28, 0.06);
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #E3E9E1;
        border-radius: 8px;
        padding: 10px 12px;
        font: inherit;
      }
      input:focus, textarea:focus {
        outline: 2px solid #009951;
        border-color: #009951;
      }

      textarea {
        min-height: 180px;
        resize: vertical;
      }

      button {
        justify-self: start;
        border: 0;
        border-radius: 8px;
        background: #009951;
        color: #ffffff;
        padding: 11px 20px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button:hover { background: #007A41; }

      .message {
        margin-bottom: 16px;
        border-radius: 8px;
        padding: 12px 14px;
      }

      .success {
        background: #EAF5EC;
        color: #007A41;
      }

      .error {
        background: #FDEAEA;
        color: #C22A2C;
      }
    </style>
  </head>
  <body>
    <main>
      <h1><i class="fa-solid fa-envelope"></i> Envoyer une remarque</h1>

      <div
        class="message success"
        th:if="${success}"
        th:text="${success}"
      ></div>
      <div class="message error" th:if="${error}" th:text="${error}"></div>

      <form th:action="@{/email}" method="post" enctype="multipart/form-data">
        <label>
          Nom entreprise
          <input type="text" name="nomEntreprise" value="greenField" required />
        </label>

        <label>
          Sujet
          <input type="text" name="sujet" required value="Remarque" />
        </label>

        <label>
          Message
          <textarea name="contenu" required></textarea>
        </label>

        <label>
          Fichier joint
          <input type="file" name="pieceJointe" />
        </label>

        <button type="submit">Envoyer</button>
      </form>
    </main>
  </body>
</html>
