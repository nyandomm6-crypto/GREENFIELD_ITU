<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{front/fragments/layout :: head(pageTitle='Réinitialiser le mot de passe - GreenField')}"
  ></head>

  <body th:replace="~{front/fragments/layout :: layout(~{::pageContent})}">
    <div th:fragment="pageContent">
      <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">
          Réinitialiser le mot de passe
        </h1>
      </div>

      <div class="container-fluid py-5">
        <div class="container py-5">
          <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
              <div class="bg-light rounded p-5">
                <div class="text-center mb-4">
                  <h2 class="display-6 text-primary">Nouveau mot de passe</h2>
                  <p class="text-muted">
                    Entrez le code reçu par e-mail et choisissez un nouveau mot
                    de passe.
                  </p>
                </div>

                <div
                  class="alert alert-success"
                  th:if="${success}"
                  th:text="${success}"
                  role="alert"
                ></div>
                <div
                  class="alert alert-danger"
                  th:if="${error}"
                  th:text="${error}"
                  role="alert"
                ></div>

                <form th:action="@{/reinitialiser-mot-de-passe}" method="post">
                  <div class="mb-3">
                    <label for="email" class="form-label fw-bold"
                      >Adresse e-mail</label
                    >
                    <input
                      id="email"
                      type="email"
                      name="email"
                      class="form-control rounded-pill px-4 py-2"
                      required
                      th:value="${email}"
                    />
                  </div>

                  <div class="mb-3">
                    <label for="code" class="form-label fw-bold"
                      >Code de vérification</label
                    >
                    <input
                      id="code"
                      type="text"
                      name="code"
                      class="form-control rounded-pill px-4 py-2"
                      required
                      placeholder="123456"
                    />
                  </div>

                  <div class="mb-3">
                    <label for="motDePasse" class="form-label fw-bold"
                      >Nouveau mot de passe</label
                    >
                    <input
                      id="motDePasse"
                      type="password"
                      name="motDePasse"
                      class="form-control rounded-pill px-4 py-2"
                      required
                      placeholder="Nouveau mot de passe"
                    />
                  </div>

                  <button
                    type="submit"
                    class="btn btn-success w-100 rounded-pill py-3"
                  >
                    <i class="fas fa-check me-2"></i> Réinitialiser le mot de
                    passe
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
