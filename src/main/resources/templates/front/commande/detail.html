<!doctype html>
<!--
  ============================================================
  PAGE : Détail d'une commande
  Utilise le layout global greenField
  ============================================================
-->
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <th:block
      th:replace="~{fragments/layout :: head(titre='Commande #' + ${commande.id})}"
    ></th:block>

    <!-- CSS spécifique à la page détail commande (dark theme) -->
    <style>
      /* =====================================================
           TOKENS - DESIGN SYSTEM UNIFIÉ (dark theme)
        ====================================================== */
      :root {
        --text-base: 16px;
        --gf-forest: #0f2a1c;
        --gf-forest-2: #173b26;
        --gf-green: #2d6a4f;
        --gf-green-light: #4c9a6f;
        --gf-leaf: #8fd4a8;
        --gf-gold: #d4a373;
        --gf-cream: #f6f4ee;
        --gf-line: rgba(0, 255, 136, 0.08);
        --gf-text: #e8f0e8;
        --gf-muted: #8aa08a;

        /* Couleurs d'accent */
        --ali-orange: #ff6a00;
        --ali-orange-light: #ff9000;
        --ali-orange-dark: #e65c00;
        --danger: #e6383a;
        --success: #2e7d32;

        /* Couleurs dark */
        --dark-bg: #0a0f0a;
        --dark-card: #121a12;
        --dark-surface: #1a261a;
        --neon-green: #00ff88;
        --border-glow: rgba(0, 255, 136, 0.15);

        /* Ombres */
        --ombre: 0 4px 12px rgba(0, 0, 0, 0.3);
        --ombre-forte: 0 8px 30px rgba(0, 0, 0, 0.5);
        --shadow-neon: 0 0 30px rgba(0, 255, 136, 0.05);

        /* Tailles de police */
        --fs-xs: 11px;
        --fs-sm: 13px;
        --fs-base: 14px;
        --fs-md: 15px;
        --fs-lg: 18px;
        --fs-xl: 20px;
        --fs-2xl: 24px;
        --fs-3xl: 28px;
        --fs-4xl: 32px;

        /* Espacements */
        --sp-2: 2px;
        --sp-4: 4px;
        --sp-6: 6px;
        --sp-8: 8px;
        --sp-10: 10px;
        --sp-12: 12px;
        --sp-14: 14px;
        --sp-16: 16px;
        --sp-18: 18px;
        --sp-20: 20px;
        --sp-22: 22px;
        --sp-24: 24px;
        --sp-28: 28px;
        --sp-30: 30px;
        --sp-40: 40px;

        /* Rayons */
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --radius-xl: 20px;
        --radius-full: 50px;

        /* Transitions */
        --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      /* =====================================================
           RESET & BASE
        ====================================================== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        display: flex;
        flex-direction: column;
      }

      a {
        text-decoration: none;
        color: inherit;
      }
      ul {
        list-style: none;
      }

      /* ---------- MARGE GAUCHE DE 1cm ---------- */
      .conteneur {
        max-width: 1280px;
        margin: 0 auto;
        padding-left: 1cm !important;
        padding-right: 1cm !important;
      }
      @media (max-width: 575.98px) {
        .conteneur {
          padding-left: 0.5cm !important;
          padding-right: 0.5cm !important;
        }
      }

      /* =====================================================
           BOUTONS UNIFORMISÉS (dark theme)
        ====================================================== */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--sp-8);
        padding: 0 28px;
        border: none;
        border-radius: var(--radius-full);
        font-size: var(--text-base);
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        text-align: center;
        min-height: 48px;
        min-width: 120px;
        font-family: inherit;
        line-height: 1.2;
        height: 48px;
      }

      .btn-primary {
        background: linear-gradient(135deg, #009951, #5eb453);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--neon-green);
        color: var(--dark-bg);
        box-shadow: 0 0 50px rgba(0, 255, 136, 0.15);
        transform: translateY(-2px);
      }

      .btn-orange {
        background: linear-gradient(
          135deg,
          var(--ali-orange-light),
          var(--ali-orange-dark)
        );
        color: #fff;
        box-shadow: 0 4px 14px rgba(255, 106, 0, 0.2);
      }
      .btn-orange:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(255, 106, 0, 0.3);
        opacity: 0.9;
      }

      .btn-outline {
        background: transparent;
        color: var(--neon-green);
        border: 2px solid var(--neon-green);
      }
      .btn-outline:hover {
        background: var(--neon-green);
        color: var(--dark-bg);
      }

      .btn-secondary {
        background: var(--dark-surface);
        color: var(--gf-text);
        border: 1px solid rgba(0, 255, 136, 0.08);
      }
      .btn-secondary:hover {
        background: rgba(0, 255, 136, 0.04);
        border-color: var(--neon-green);
        color: var(--neon-green);
      }
      .btn-secondary i {
        color: var(--neon-green);
      }

      .btn-sm {
        padding: 0 16px !important;
        font-size: var(--fs-xs) !important;
        min-height: 38px !important;
        min-width: 80px !important;
        height: 38px !important;
      }

      .btn-block {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
      }

      @media (max-width: 767.98px) {
        .btn {
          min-height: 44px;
          height: 44px;
          padding: 0 20px;
          font-size: var(--text-base);
          min-width: 100px;
        }
      }
      @media (max-width: 575.98px) {
        .btn {
          min-height: 40px;
          height: 40px;
          padding: 0 16px;
          font-size: var(--text-base);
          min-width: 80px;
        }
        .btn-sm {
          min-height: 34px !important;
          height: 34px !important;
        }
      }

      /* =====================================================
         PAGE DÉTAIL COMMANDE (dark theme)
        ====================================================== */
      .page-detail-commande {
        padding: var(--sp-24) 0 var(--sp-40);
        flex: 1 0 auto;
        background: var(--dark-bg);
      }

      .breadcrumb {
        font-size: var(--fs-sm);
        color: var(--gf-muted);
        margin-bottom: var(--sp-16);
      }
      .breadcrumb a {
        color: var(--neon-green);
      }
      .breadcrumb a:hover {
        text-decoration: underline;
        color: var(--neon-green);
      }
      .breadcrumb span {
        color: var(--gf-text);
        font-weight: 600;
      }
      .breadcrumb span:not(:last-child) {
        color: var(--gf-muted);
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: var(--sp-16);
        margin-bottom: var(--sp-24);
        padding-bottom: var(--sp-16);
        border-bottom: 1px solid rgba(0, 255, 136, 0.04);
      }

      .page-header h1 {
        font-size: clamp(1.5rem, 3.5vw, 2.8rem);
        font-weight: 700;
        color: var(--gf-text);
        letter-spacing: -0.5px;
      }

      .page-header h1 i {
        color: var(--neon-green);
        margin-right: var(--sp-8);
      }

      .page-header p {
        color: var(--gf-muted);
        font-size: var(--text-base);
        margin-top: var(--sp-4);
      }

      /* =====================================================
           DÉTAIL COMMANDE
        ====================================================== */
      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: var(--sp-22);
        align-items: start;
      }

      .bloc,
      .bloc-ligne {
        background: var(--dark-card);
        border: 1px solid rgba(0, 255, 136, 0.06);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-neon);
        transition: var(--transition);
      }

      .bloc {
        padding: var(--sp-22);
      }

      .bloc:hover {
        border-color: rgba(0, 255, 136, 0.12);
        box-shadow: 0 0 40px rgba(0, 255, 136, 0.04);
      }

      .bloc-ligne {
        padding: var(--sp-16) var(--sp-18);
        margin-bottom: var(--sp-12);
        transition: var(--transition);
      }

      .bloc-ligne:hover {
        border-color: rgba(0, 255, 136, 0.12);
        box-shadow: 0 0 30px rgba(0, 255, 136, 0.04);
      }

      .bloc-ligne:last-child {
        margin-bottom: 0;
      }

      .commande-card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: var(--sp-12);
        margin-bottom: var(--sp-14);
      }

      .commande-titre {
        display: flex;
        align-items: center;
        gap: var(--sp-10);
        font-size: var(--fs-lg);
        font-weight: 700;
        color: var(--gf-text);
      }

      .commande-titre i {
        color: var(--neon-green);
      }

      .commande-meta {
        display: flex;
        gap: var(--sp-12);
        flex-wrap: wrap;
        color: var(--gf-muted);
        font-size: var(--text-base);
        margin-top: var(--sp-4);
      }

      .commande-meta i {
        color: var(--neon-green);
        margin-right: var(--sp-4);
      }

      .badge-statut {
        display: inline-flex;
        align-items: center;
        gap: var(--sp-8);
        padding: var(--sp-6) var(--sp-16);
        border-radius: var(--radius-full);
        font-size: var(--fs-sm);
        font-weight: 700;
        text-transform: capitalize;
        min-height: 36px;
      }

      .badge-statut.en-attente {
        background: rgba(255, 152, 0, 0.15);
        color: #ffb300;
        border: 1px solid rgba(255, 152, 0, 0.2);
      }

      .badge-statut.validee {
        background: rgba(0, 255, 136, 0.1);
        color: var(--neon-green);
        border: 1px solid rgba(0, 255, 136, 0.15);
      }

      .badge-statut.en-cours {
        background: rgba(33, 150, 243, 0.1);
        color: #42a5f5;
        border: 1px solid rgba(33, 150, 243, 0.15);
      }

      .badge-statut.livree {
        background: rgba(0, 255, 136, 0.1);
        color: var(--neon-green);
        border: 1px solid rgba(0, 255, 136, 0.15);
      }

      .badge-statut.annulee {
        background: rgba(230, 56, 58, 0.1);
        color: var(--danger);
        border: 1px solid rgba(230, 56, 58, 0.15);
      }

      .badge-statut.remboursee {
        background: rgba(156, 39, 176, 0.1);
        color: #ab47bc;
        border: 1px solid rgba(156, 39, 176, 0.15);
      }

      .badge-statut i {
        font-size: var(--fs-sm);
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--sp-12);
        margin-top: var(--sp-14);
      }

      .meta-item {
        background: var(--dark-surface);
        border: 1px solid rgba(0, 255, 136, 0.04);
        border-radius: var(--radius-sm);
        padding: var(--sp-12) var(--sp-14);
      }

      .meta-item label {
        display: block;
        font-size: var(--fs-xs);
        text-transform: uppercase;
        color: var(--gf-muted);
        margin-bottom: var(--sp-4);
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .meta-item label i {
        margin-right: var(--sp-4);
        color: var(--neon-green);
      }

      .meta-item strong {
        font-size: var(--fs-md);
        color: var(--gf-text);
        font-weight: 700;
      }

      .details-list {
        display: grid;
        gap: var(--sp-12);
        margin-top: var(--sp-14);
      }

      .ligne-produit {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: var(--sp-10);
        flex-wrap: wrap;
      }

      .ligne-produit .titre {
        font-weight: 700;
        color: var(--gf-text);
        font-size: var(--fs-md);
      }

      .ligne-produit .prix {
        font-weight: 700;
        color: var(--neon-green);
        font-size: var(--fs-md);
      }

      .sous-totaux {
        color: var(--gf-muted);
        font-size: var(--fs-sm);
        margin-top: var(--sp-4);
      }

      .sous-totaux i {
        margin-right: var(--sp-4);
        color: var(--neon-green);
      }

      /* =====================================================
         SECTION LIGNES
        ====================================================== */
      .section-lignes {
        margin-top: var(--sp-22);
      }

      .section-lignes h2 {
        font-size: var(--fs-2xl);
        font-weight: 700;
        color: var(--gf-text);
        margin-bottom: var(--sp-16);
      }

      .section-lignes h2 i {
        color: var(--neon-green);
        margin-right: var(--sp-8);
      }

      .total-commande {
        margin-top: var(--sp-16);
        text-align: right;
        background: var(--dark-card);
        border-radius: var(--radius-lg);
        padding: var(--sp-16) var(--sp-22);
        border: 1px solid rgba(0, 255, 136, 0.06);
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: var(--sp-12);
        flex-wrap: wrap;
      }

      .total-commande .label {
        font-weight: 600;
        color: var(--gf-muted);
        font-size: var(--fs-md);
      }

      .total-commande .montant {
        font-weight: 700;
        font-size: var(--fs-2xl);
        color: var(--neon-green);
      }

      /* Panier vide */
      .vide {
        background: var(--dark-card);
        border: 2px dashed rgba(0, 255, 136, 0.08);
        border-radius: var(--radius-lg);
        padding: var(--sp-40) var(--sp-20);
        text-align: center;
        color: var(--gf-muted);
      }

      .vide i {
        font-size: 36px;
        display: block;
        margin-bottom: var(--sp-12);
        color: var(--gf-muted);
      }

      .vide p {
        font-size: var(--fs-md);
      }

      /* =====================================================
         RESPONSIVE (dark theme)
        ====================================================== */
      @media (max-width: 991.98px) {
        body {
          padding-top: 70px;
        }
      }

      @media (max-width: 920px) {
        .detail-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 768px) {
        body {
          padding-top: 64px;
        }

        .page-header h1 {
          font-size: var(--fs-2xl);
        }
        .page-header p {
          font-size: var(--fs-base);
        }

        .bloc {
          padding: var(--sp-18);
        }

        .meta-grid {
          grid-template-columns: 1fr 1fr;
          gap: var(--sp-10);
        }

        .meta-item {
          padding: var(--sp-10) var(--sp-12);
        }

        .meta-item strong {
          font-size: var(--fs-base);
        }

        .commande-titre {
          font-size: var(--fs-md);
        }

        .section-lignes h2 {
          font-size: var(--fs-xl);
        }

        .total-commande .montant {
          font-size: var(--fs-xl);
        }
      }

      @media (max-width: 575.98px) {
        body {
          padding-top: 58px;
        }

        .page-header h1 {
          font-size: var(--fs-xl);
        }
        .page-header p {
          font-size: var(--fs-sm);
        }

        .detail-grid {
          gap: var(--sp-16);
        }

        .bloc {
          padding: var(--sp-14);
        }

        .meta-grid {
          grid-template-columns: 1fr;
          gap: var(--sp-8);
        }

        .commande-card-head {
          flex-direction: column;
          align-items: stretch;
        }

        .badge-statut {
          align-self: flex-start;
          font-size: var(--fs-sm);
          padding: var(--sp-4) var(--sp-12);
          min-height: 30px;
        }

        .ligne-produit {
          flex-direction: column;
          align-items: flex-start;
          gap: var(--sp-4);
        }

        .ligne-produit .prix {
          font-size: var(--fs-base);
        }

        .btn {
          padding: var(--sp-8) var(--sp-16);
          font-size: var(--fs-sm);
          min-height: 40px;
          min-width: 80px;
          width: 100%;
          justify-content: center;
          height: 40px;
        }

        .section-lignes h2 {
          font-size: var(--fs-lg);
        }

        .bloc-ligne {
          padding: var(--sp-12) var(--sp-14);
        }

        .total-commande {
          padding: var(--sp-14) var(--sp-16);
          flex-direction: column;
          align-items: stretch;
          text-align: center;
        }

        .total-commande .montant {
          font-size: var(--fs-xl);
        }

        .vide {
          padding: var(--sp-30) var(--sp-16);
        }
        .vide i {
          font-size: 28px;
        }
        .vide p {
          font-size: var(--fs-base);
        }
      }
    </style>
  </head>

  <body>
    <!-- =====================================================
         HEADER (via le layout)
    ====================================================== -->
    <div th:replace="~{fragments/layout :: header}"></div>

    <!-- =====================================================
         CONTENU PRINCIPAL
    ====================================================== -->
    <main class="page-detail-commande">
      <div class="conteneur">
        <div class="breadcrumb">
          <a href="/">Accueil</a>
          <span>/</span>
          <a href="/commandes">Mes commandes</a>
          <span>/</span>
          <span th:text="'Commande #' + ${commande.id}"></span>
        </div>

        <div class="page-header">
          <div>
            <h1 th:text="'Commande #' + ${commande.id}"></h1>
            <p>Détail de la commande, statut actuel et lignes achetées.</p>
          </div>
        </div>

        <!-- GRILLE PRINCIPALE -->
        <div class="detail-grid">
          <!-- SECTION GAUCHE - INFOS COMMANDE -->
          <section class="bloc">
            <div class="commande-card-head">
              <div>
                <div class="commande-titre">
                  <i class="fas fa-truck-fast"></i>
                  <span
                    th:text="${commande.statutActuel != null and commande.statutActuel.nom != null ? commande.statutActuel.nom : 'En attente'}"
                  ></span>
                </div>
                <div class="commande-meta">
                  <span>
                    <i class="fas fa-calendar"></i>
                    <span
                      th:text="${#dates.format(commande.datecommande, 'dd/MM/yyyy HH:mm')}"
                    ></span>
                  </span>
                  <span th:if="${commande.modeReception != null}">
                    <i class="fas fa-truck"></i>
                    <span th:text="${commande.modeReception}"></span>
                  </span>
                </div>
              </div>
              <span
                class="badge-statut"
                th:classappend="${commande.statutActuel != null and commande.statutActuel.nom != null ? #strings.toLowerCase(commande.statutActuel.nom).replace(' ', '-') : 'en-attente'}"
              >
                <i
                  th:if="${commande.statutActuel != null and commande.statutActuel.nom != null}"
                  th:class="${commande.statutActuel.nom == 'Validee' ? 'fas fa-check-circle' : 
                             commande.statutActuel.nom == 'En cours' ? 'fas fa-spinner fa-spin' :
                             commande.statutActuel.nom == 'Livree' ? 'fas fa-check-double' :
                             commande.statutActuel.nom == 'Annulee' ? 'fas fa-times-circle' :
                             commande.statutActuel.nom == 'Remboursee' ? 'fas fa-undo' :
                             'fas fa-clock'}"
                ></i>
                <span
                  th:text="${commande.statutActuel != null and commande.statutActuel.nom != null ? commande.statutActuel.nom : 'En attente'}"
                ></span>
              </span>
            </div>

            <div class="meta-grid">
              <div class="meta-item">
                <label><i class="fas fa-user"></i> Client</label>
                <strong
                  th:text="${commande.client != null ? commande.client.prenom + ' ' + commande.client.nom : 'Non défini'}"
                ></strong>
              </div>
              <div class="meta-item">
                <label><i class="fas fa-envelope"></i> Email</label>
                <strong
                  th:text="${commande.client != null ? commande.client.mail : 'Non défini'}"
                ></strong>
              </div>
              <div class="meta-item">
                <label><i class="fas fa-credit-card"></i> Total général</label>
                <strong
                  th:text="${#numbers.formatDecimal(commande.totalGeneral, 0, 'DEFAULT', 0, 'DEFAULT') + ' Ar'}"
                ></strong>
              </div>
              <div class="meta-item">
                <label><i class="fas fa-boxes"></i> Total produits</label>
                <strong
                  th:text="${commande.totalProduits != null ? commande.totalProduits : 0}"
                ></strong>
              </div>
            </div>
          </section>

          <!-- SECTION DROITE - RECAPITULATIF -->
          <aside class="bloc">
            <h2
              style="
                font-size: var(--fs-lg);
                font-weight: 700;
                color: var(--gf-text);
                margin-bottom: var(--sp-16);
              "
            >
              <i class="fas fa-list-check" style="color: var(--neon-green)"></i>
              Récapitulatif
            </h2>

            <div class="details-list">
              <div class="meta-item">
                <label><i class="fas fa-map-pin"></i> Adresse livraison</label>
                <strong
                  th:text="${commande.adresseLivraison != null ? commande.adresseLivraison : 'Non renseignée'}"
                ></strong>
              </div>
              <div class="meta-item">
                <label><i class="fas fa-truck"></i> Frais livraison</label>
                <strong
                  th:text="${commande.fraisLivraison != null ? #numbers.formatDecimal(commande.fraisLivraison, 0, 'DEFAULT', 0, 'DEFAULT') + ' Ar' : '0 Ar'}"
                ></strong>
              </div>
              <div class="meta-item">
                <label><i class="fas fa-receipt"></i> Mode réception</label>
                <strong
                  th:text="${commande.modeReception != null ? commande.modeReception : 'Non défini'}"
                ></strong>
              </div>
            </div>

            <div
              style="
                margin-top: var(--sp-16);
                display: flex;
                gap: var(--sp-10);
                flex-wrap: wrap;
              "
            >
              <a class="btn btn-secondary" th:href="@{/commandes}">
                <i class="fas fa-arrow-left"></i> Retour aux commandes
              </a>
              <form
                th:action="@{/paiements/choix/{id}(id=${commande.id})}"
                method="get"
                style="display: inline"
              >
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-check"></i> Valider achat
                </button>
              </form>
            </div>
          </aside>
        </div>

        <!-- SECTION LIGNES DE COMMANDE -->
        <section class="section-lignes">
          <h2><i class="fas fa-list-ul"></i> Lignes de commande</h2>

          <div
            th:if="${detailsCommande != null and !detailsCommande.isEmpty()}"
          >
            <article class="bloc-ligne" th:each="detail : ${detailsCommande}">
              <div class="ligne-produit">
                <div>
                  <div
                    class="titre"
                    th:text="${detail.produit != null ? detail.produit.nom : 'Produit non disponible'}"
                  ></div>
                  <div class="sous-totaux">
                    <i class="fas fa-hashtag"></i>
                    <span th:text="'Qté : ' + ${detail.quantite}"></span>
                    <span style="margin: 0 var(--sp-8)">|</span>
                    <i class="fas fa-tag"></i>
                    <span
                      th:text="'Prix unitaire : ' + ${#numbers.formatDecimal(detail.puAuMomentAchat, 0, 'DEFAULT', 0, 'DEFAULT') + ' Ar'}"
                    ></span>
                    <span style="margin: 0 var(--sp-8)">|</span>
                    <i class="fas fa-calculator"></i>
                    <span
                      th:text="'Sous-total : ' + ${#numbers.formatDecimal(detail.puAuMomentAchat * detail.quantite, 0, 'DEFAULT', 0, 'DEFAULT') + ' Ar'}"
                    ></span>
                  </div>
                </div>
                <span
                  class="prix"
                  th:text="${#numbers.formatDecimal(detail.puAuMomentAchat, 0, 'DEFAULT', 0, 'DEFAULT') + ' Ar'}"
                ></span>
              </div>
            </article>

            <!-- Total général en bas -->
            <div class="total-commande">
              <span class="label">Total de la commande :</span>
              <span class="montant">
                <span
                  th:text="${#numbers.formatDecimal(commande.totalGeneral, 0, 'DEFAULT', 0, 'DEFAULT')}"
                ></span>
                Ar
              </span>
            </div>
          </div>

          <div
            class="vide"
            th:unless="${detailsCommande != null and !detailsCommande.isEmpty()}"
          >
            <i class="fas fa-box-open"></i>
            <p>Aucun détail de ligne trouvé pour cette commande.</p>
          </div>
        </section>
      </div>
    </main>

    <!-- =====================================================
         FOOTER (via le layout)
    ====================================================== -->
    <div th:replace="~{fragments/layout :: footer}"></div>

    <!-- =====================================================
         SCRIPTS (via le layout)
    ====================================================== -->
    <div th:replace="~{fragments/layout :: scripts}"></div>
  </body>
</html>
