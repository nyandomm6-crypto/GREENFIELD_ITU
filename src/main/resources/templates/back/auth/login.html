<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{front/fragments/layout :: head(pageTitle='Connexion - GreenField')}"
  >
    <title>Connexion - GreenField</title>
  </head>

  <body th:replace="~{front/fragments/layout :: layout(~{::pageContent})}">
    <div th:fragment="pageContent">
      <!-- Single Page Header start -->
      <div class="container-fluid page-header py-5">
        <h1 class="text-center text-white display-6">Connexion</h1>
        <ol class="breadcrumb justify-content-center mb-0">
          <li class="breadcrumb-item"><a th:href="@{/}">Accueil</a></li>
          <li class="breadcrumb-item active text-white">Connexion</li>
        </ol>
      </div>
      <!-- Single Page Header End -->

      <!-- Connexion Start -->
      <div class="container-fluid fruite py-5">
        <div class="container py-5">
          <div class="row g-4">
            <div class="col-lg-12">
              <div class="row g-4 justify-content-center">
                <div class="col-lg-6 col-md-8">
                  <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">
                      <div class="text-center mb-4">
                        <i class="fas fa-leaf fa-3x text-primary mb-3"></i>
                        <h3 class="mb-1">Connexion</h3>
                        <p class="text-muted">
                          Connectez-vous à votre compte greenField
                        </p>
                      </div>

                      <!-- Messages flash -->
                      <div
                        class="alert alert-success"
                        th:if="${success}"
                        th:text="${success}"
                        role="alert"
                      >
                        <i class="fas fa-check-circle me-2"></i>
                      </div>
                      <div
                        class="alert alert-danger"
                        th:if="${error}"
                        th:text="${error}"
                        role="alert"
                      >
                        <i class="fas fa-exclamation-circle me-2"></i>
                      </div>

                      <form th:action="@{/emp/login}" method="post">
                        <input
                          type="hidden"
                          name="redirect"
                          th:value="${redirect}"
                        />

                        <div class="mb-3">
                          <label class="form-label fw-bold">
                            <i class="fas fa-envelope me-2 text-primary"></i
                            >Adresse email
                          </label>
                          <input
                            type="email"
                            class="form-control"
                            name="email"
                            required
                            placeholder="votre@email.com"
                          />
                        </div>

                        <div class="mb-3">
                          <label class="form-label fw-bold">
                            <i class="fas fa-lock me-2 text-primary"></i>Mot de
                            passe
                          </label>
                          <input
                            type="password"
                            class="form-control"
                            name="motDePasse"
                            required
                            placeholder="Votre mot de passe"
                          />
                        </div>

                        <div
                          class="d-flex justify-content-between align-items-center mb-4"
                        >
                          <div class="form-check">
                            <input
                              type="checkbox"
                              class="form-check-input"
                              id="remember"
                              name="remember"
                            />
                            <label class="form-check-label" for="remember"
                              >Se souvenir de moi</label
                            >
                          </div>
                          <a href="#" class="text-primary"
                            >Mot de passe oublié ?</a
                          >
                        </div>

                        <button
                          type="submit"
                          class="btn btn-primary w-100 rounded-pill py-3"
                        >
                          <i class="fas fa-sign-in-alt me-2"></i> Se connecter
                        </button>
                      </form>

                      <div class="text-center mt-4 pt-3 border-top">
                        <p class="mb-0">
                          <i class="fas fa-user-plus me-2 text-primary"></i>
                          Pas encore de compte ?
                          <a th:href="@{/signup}" class="text-primary fw-bold"
                            >S'inscrire</a
                          >
                        </p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Connexion End -->
    </div>
  </body>
</html>
