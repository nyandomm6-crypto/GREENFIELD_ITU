<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{back/fragments/layout :: head('Création de livraison')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('livraisons')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Livraisons')}"></header>

        <div class="bo-contenu bo-contenu-etroit">

            <div class="page-tete">
                <div>
                    <p class="fil"><a th:href="@{/livraison}">Livraisons</a> / Création</p>
                    <h1>Création d'une livraison</h1>
                </div>
                <div class="page-actions">
                    <a th:href="@{/livraison}" class="btn btn-ligne"><i class="fa-solid fa-arrow-left"></i> Voir la liste</a>
                </div>
            </div>

            <div class="alerte alerte-erreur" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/livraison/create}" method="post">
                <div class="carte">
                    <div class="carte-tete">
                        <h2><i class="fa-solid fa-truck"></i> Affectation</h2>
                    </div>
                    <div class="carte-corps">
                        <div class="grille-form">
                            <div class="champ">
                                <label>Date</label>
                                <input type="datetime-local" name="date" />
                            </div>

                            <div class="champ">
                                <label>Véhicule</label>
                                <select name="idVehicule">
                                    <option>Choisir véhicule</option>
                                    <option th:each="vehicule : ${vehicules}" th:value="${vehicule.id}" th:text="${vehicule.matricule}"></option>
                                </select>
                            </div>

                            <div class="champ">
                                <label>Livreur</label>
                                <select name="idEmploye">
                                    <option>Choisir livreur</option>
                                    <option th:each="employe : ${employes}" th:value="${employe.id}" th:text="${employe.nom}"></option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="carte">
                    <div class="carte-tete">
                        <h2><i class="fa-solid fa-basket-shopping"></i> Commandes à livrer</h2>
                    </div>
                    <div class="carte-corps">
                        <div class="liste-coche">
                            <label th:each="commande : ${commandes}">
                                <input type="checkbox" name="idCommandes" th:value="${commande.id}" />
                                Commande N° <span th:text="${commande.id}"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="btn-list barre-form">
                    <a th:href="@{/livraison}" class="btn btn-ligne">Annuler</a>
                    <button type="submit" class="btn btn-vert"><i class="fa-solid fa-check"></i> Créer</button>
                </div>
            </form>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
