<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="transferts/layout :: head"></head>
<body>
    <div th:fragment="content">
        <!-- En-tête -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-plus-circle text-success"></i> Créer un Transfert</h1>
            <a href="/views/transferts" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Retour
            </a>
        </div>

        <!-- Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle"></i> <span th:text="${success}">Succès</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Erreur</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Formulaire -->
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i>
                    Le point de vente source sera automatiquement déterminé par le système
                    (celui qui a le plus de stock).
                </div>

                <form th:action="@{/views/transferts/creer}" th:object="${transfert}" method="post">
                    <!-- ✅ Point de vente cible - Liste déroulante -->
                    <div class="mb-3">
                        <label class="form-label">Point de vente cible *</label>
                        <select class="form-select" th:field="*{codePointDeVenteCible}" required>
                            <option value="">Sélectionner un point de vente</option>
                            <option th:each="pdv : ${pointsDeVente}" 
                                    th:value="${pdv.code}" 
                                    th:text="${pdv.code} + ' - ' + ${pdv.nom}">
                            </option>
                        </select>
                        <small class="text-muted">Choisissez le point de vente qui recevra les produits</small>
                    </div>

                    <!-- Produits -->
                    <div class="mb-3">
                        <label class="form-label">Produits à transférer *</label>
                        <div id="produits-container">
                            <div class="row mb-2 produit-ligne">
                                <div class="col-md-6">
                                    <select class="form-select" th:field="*{produits[0].idProduit}" required>
                                        <option value="">Sélectionner un produit</option>
                                        <option th:each="p : ${produits}" th:value="${p.id}" th:text="${p.nom}"></option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <input type="number" class="form-control" th:field="*{produits[0].quantite}"
                                           placeholder="Quantité" min="1" required>
                                </div>
                                <div class="col-md-2">
                                    <button type="button" class="btn btn-danger w-100" onclick="supprimerLigne(this)">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn btn-secondary mt-2" onclick="ajouterLigne()">
                            <i class="fas fa-plus"></i> Ajouter un produit
                        </button>
                    </div>

                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-exchange-alt"></i> Créer le transfert
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let ligneIndex = 1;
        function ajouterLigne() {
            const container = document.getElementById('produits-container');
            const div = document.createElement('div');
            div.className = 'row mb-2 produit-ligne';
            
            // Récupérer les options des produits existants
            const options = document.querySelectorAll('#produits-container select option:not([value=""])');
            let optionsHtml = '';
            options.forEach(opt => {
                optionsHtml += opt.outerHTML;
            });
            
            div.innerHTML = `
                <div class="col-md-6">
                    <select class="form-select" name="produits[${ligneIndex}].idProduit" required>
                        <option value="">Sélectionner un produit</option>
                        ${optionsHtml}
                    </select>
                </div>
                <div class="col-md-4">
                    <input type="number" class="form-control" name="produits[${ligneIndex}].quantite"
                           placeholder="Quantité" min="1" required>
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-danger w-100" onclick="supprimerLigne(this)">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;
            container.appendChild(div);
            ligneIndex++;
        }
        
        function supprimerLigne(btn) {
            const row = btn.closest('.produit-ligne');
            if (document.querySelectorAll('.produit-ligne').length > 1) {
                row.remove();
            } else {
                alert('Vous devez avoir au moins un produit.');
            }
        }
    </script>
</body>
</html>
