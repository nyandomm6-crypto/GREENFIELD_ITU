<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${titre}">Liste employe</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        color: #1f2933;
      }

      header,
      .actions,
      form.filters {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      header {
        justify-content: space-between;
        margin-bottom: 18px;
      }

      a,
      button {
        border: 1px solid #2f80ed;
        background: #2f80ed;
        color: white;
        padding: 8px 12px;
        border-radius: 4px;
        text-decoration: none;
        cursor: pointer;
      }

      a.secondary,
      button.secondary {
        background: white;
        color: #2f80ed;
      }

      button.danger {
        border-color: #c0392b;
        background: #c0392b;
      }

      input,
      select {
        padding: 8px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 18px;
      }

      th,
      td {
        border-bottom: 1px solid #e5e7eb;
        padding: 10px;
        text-align: left;
      }

      th {
        background: #f8fafc;
      }

      .message {
        padding: 10px;
        border-radius: 4px;
        margin-bottom: 12px;
        background: #dcfce7;
        color: #166534;
      }

      .inline {
        display: inline;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 th:text="${titre}">Liste employe</h1>
      <div class="actions">
        <a th:href="@{/employes/new}">Ajouter</a>
        <a class="secondary" th:href="@{/employes}" th:if="${!estActif}">Employes actifs</a>
        <a class="secondary" th:href="@{/employes/archives}" th:if="${estActif}">Archives</a>
      </div>
    </header>

    <div class="message" th:if="${success}" th:text="${success}"></div>

    <form
      class="filters"
      method="get"
      th:action="${estActif} ? @{/employes} : @{/employes/archives}"
    >
      <input
        type="text"
        name="motCle"
        placeholder="Mot cle"
        th:value="${motCle}"
      />
      <input type="date" name="date" th:value="${date}" />
      <select name="role">
        <option value="">Tous les roles</option>
        <option
          th:each="r : ${roles}"
          th:value="${r}"
          th:text="${r}"
          th:selected="${role != null and role == r}"
        ></option>
      </select>
      <button type="submit">Filtrer</button>
      <a
        class="secondary"
        th:href="${estActif} ? @{/employes} : @{/employes/archives}"
        >Reinitialiser</a
      >
    </form>

    <table>
      <thead>
        <tr>
          <th>Nom</th>
          <th>Prenom</th>
          <th>Mail</th>
          <th>Contact</th>
          <th>Role</th>
          <th>Point de vente</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="employe : ${employes}">
          <td th:text="${employe.nom}"></td>
          <td th:text="${employe.prenom}"></td>
          <td th:text="${employe.mail}"></td>
          <td th:text="${employe.contact ?: '-'}"></td>
          <td th:text="${employe.role}"></td>
          <td
            th:text="${employe.pointDeVente != null ? employe.pointDeVente.nom : '-'}"
          ></td>
          <td th:text="${employe.date}"></td>
          <td>
            <a class="secondary" th:href="@{/employes/{id}(id=${employe.id})}">Detail</a>
            <a
              class="secondary"
              th:if="${estActif}"
              th:href="@{/employes/{id}/edit(id=${employe.id})}"
              >Modifier</a
            >
            <form
              class="inline"
              th:if="${estActif}"
              th:action="@{/employes/{id}/delete(id=${employe.id})}"
              method="post"
            >
              <button class="danger" type="submit">Supprimer</button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(employes)}">
          <td colspan="8">Aucun employe trouve.</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
