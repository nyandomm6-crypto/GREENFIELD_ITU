<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{back/fragments/layout :: head('Suivi des stocks')}"></head>

  <body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('stocks')}"></aside>

    <main class="bo-main">
      <header th:replace="~{back/fragments/layout :: topbar('Suivi des stocks')}"></header>

      <div class="bo-contenu">
        <div class="page-tete">
          <div>
            <p class="fil">Catalogue <i class="fas fa-chevron-right"></i> Stocks</p>
            <h1>Suivi de l'état des stocks</h1>
            <p class="sous-titre">Quantités disponibles par produit et par point de vente.</p>
          </div>
          <div class="page-actions">
            <a th:href="@{/back/stocks/entree}" class="btn btn-vert">
              <i class="fas fa-dolly"></i> Nouvelle entrée de stock
            </a>
          </div>
        </div>

        <th:block th:replace="~{back/fragments/layout :: alertes}"></th:block>

        <form th:action="@{/back/stocks}" method="get" class="barre-filtres">
          <div class="filtre">
            <label for="ptDeVenteCode">Point de vente</label>
            <select name="ptDeVenteCode" id="ptDeVenteCode">
              <option value="">Tous les points de vente</option>
              <option
                th:each="pdv : ${pointsDeVente}"
                th:value="${pdv.code}"
                th:text="${pdv.nom}"
                th:selected="${pdv.code == selectedPdv}"
              ></option>
            </select>
          </div>

          <div class="filtre">
            <label for="idCategorie">Catégorie</label>
            <select name="idCategorie" id="idCategorie">
              <option value="">Toutes les catégories</option>
              <option
                th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.libelle}"
                th:selected="${cat.id == selectedCategorie}"
              ></option>
            </select>
          </div>

          <div class="filtre filtre-large">
            <label for="motCle">Mot clé</label>
            <input
              type="text"
              id="motCle"
              name="motCle"
              th:value="${motCle}"
              placeholder="Nom ou matricule…"
            />
          </div>

          <div class="filtre-actions">
            <button type="submit" class="btn btn-vert">
              <i class="fas fa-magnifying-glass"></i> Rechercher
            </button>
          </div>
        </form>

        <div class="tableau-scroll">
          <table>
            <thead>
              <tr>
                <th>Matricule</th>
                <th>Produit</th>
                <th>Catégorie</th>
                <th>Point de vente</th>
                <th class="num">Quantité en stock</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="s : ${stocks}">
                <td class="mono" th:text="${s.produit.matricule}"></td>
                <td><strong th:text="${s.produit.nom}"></strong></td>
                <td>
                  <span class="badge badge-feuille badge-sans-point"
                    th:text="${s.produit.categorie != null ? s.produit.categorie.libelle : 'Non spécifié'}"></span>
                </td>
                <td th:text="${s.pointDeVenteNom}"></td>
                <td class="num" th:text="${s.stock}"></td>
              </tr>
              <tr th:if="${#lists.isEmpty(stocks)}">
                <td colspan="5">
                  <div class="vide">
                    <i class="fas fa-box-open"></i>
                    <p>Aucun stock ne correspond à ces filtres.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
  </body>
</html>
