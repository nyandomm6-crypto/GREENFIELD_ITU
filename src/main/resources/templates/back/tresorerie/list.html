<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{back/fragments/layout :: head('Trésorerie')}"></head>

  <body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('tresorerie')}"></aside>

    <main class="bo-main">
      <header th:replace="~{back/fragments/layout :: topbar('Trésorerie')}"></header>

      <div class="bo-contenu">
        <div class="page-tete">
          <div>
            <p class="fil">Finance <i class="fas fa-chevron-right"></i> Trésorerie</p>
            <h1>Mouvements de trésorerie</h1>
            <p class="sous-titre">Enregistrez les entrées et dépenses (carburant, salaire, loyer…).</p>
          </div>
        </div>

        <th:block th:replace="~{back/fragments/layout :: alertes}"></th:block>

        <!-- Formulaire de nouveau mouvement -->
        <form th:action="@{/back/tresorerie/nouveau}" method="post" class="carte" style="margin-bottom: 24px;">
          <div class="carte-tete">
            <h2><i class="fa-solid fa-money-bill-transfer"></i> Nouveau mouvement</h2>
          </div>
          <div class="carte-corps">
            <div class="grille-form">
              <div class="champ">
                <label for="nature">Type de flux</label>
                <select id="nature" name="nature" required>
                  <option value="">-- Sélectionner --</option>
                  <optgroup label="Entrées">
                    <option th:each="n : ${natures}" th:if="${!n.estDepense()}"
                            th:value="${n}" th:text="${n.libelle}"></option>
                  </optgroup>
                  <optgroup label="Dépenses">
                    <option th:each="n : ${natures}" th:if="${n.estDepense()}"
                            th:value="${n}" th:text="${n.libelle}"></option>
                  </optgroup>
                </select>
              </div>

              <div class="champ">
                <label for="montant">Montant (Ar)</label>
                <input type="number" step="0.01" min="0" id="montant" name="montant" placeholder="0.00" required />
              </div>

              <div class="champ">
                <label for="dateOperation">Date de l'opération</label>
                <input type="datetime-local" id="dateOperation" name="dateOperation" />
              </div>

              <div class="champ" style="grid-column: 1 / -1;">
                <label for="note">Note (facultatif)</label>
                <input type="text" id="note" name="note" placeholder="Ex : plein gasoil camion IAA-1234" />
              </div>
            </div>
          </div>
          <div class="carte-pied flex gap-12 aligne-centre">
            <button type="submit" class="btn btn-vert"><i class="fas fa-floppy-disk"></i> Enregistrer le mouvement</button>
          </div>
        </form>

        <!-- Liste des mouvements -->
        <div class="tableau-scroll">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Date</th>
                <th>Sens</th>
                <th>Description</th>
                <th class="num">Montant (Ar)</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="m : ${mouvements}">
                <td class="mono" th:text="${m.id}"></td>
                <td th:text="${m.dateOperation != null ? #temporals.format(m.dateOperation, 'dd/MM/yyyy HH:mm') : ''}"></td>
                <td>
                  <span class="badge badge-sans-point"
                        th:classappend="${m.typeMouvement.name() == 'Entree_Vente'} ? 'badge-feuille' : 'badge-ocre'"
                        th:text="${m.typeMouvement.name() == 'Entree_Vente'} ? 'Entrée' : 'Dépense'"></span>
                </td>
                <td th:text="${m.description}"></td>
                <td class="num" th:classappend="${m.typeMouvement.name() == 'Entree_Vente'} ? 'texte-vert' : 'texte-ocre'"
                    th:text="${(m.typeMouvement.name() == 'Entree_Vente' ? '+ ' : '- ') + #numbers.formatDecimal(m.montant, 1, 'NONE', 2, 'POINT')}"></td>
              </tr>
              <tr th:if="${#lists.isEmpty(mouvements)}">
                <td colspan="5">
                  <div class="vide">
                    <i class="fa-solid fa-wallet"></i>
                    <p>Aucun mouvement de trésorerie enregistré.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="section-pagination" th:if="${totalPages > 0}">
          <span>Total : <strong th:text="${totalElements}">0</strong> mouvement(s)</span>
          <div class="pagination">
            <a class="btn-pagination" th:if="${page > 0}"
               th:href="@{/back/tresorerie(page=${page - 1},size=${size})}">« Précédent</a>
            <span>Page <strong th:text="${page + 1}">1</strong> sur <strong th:text="${totalPages}">1</strong></span>
            <a class="btn-pagination" th:if="${page + 1 < totalPages}"
               th:href="@{/back/tresorerie(page=${page + 1},size=${size})}">Suivant »</a>
          </div>
        </div>
      </div>

      <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
  </body>
</html>
