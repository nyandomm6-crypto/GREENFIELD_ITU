<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{back/fragments/layout :: head('Véhicules')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('vehicules')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Véhicules')}"></header>

        <div class="bo-contenu">

            <div class="page-tete">
                <div>
                    <p class="fil">Logistique <i class="fas fa-chevron-right"></i> Véhicules</p>
                    <h1>Liste des véhicules</h1>
                </div>
                <div class="page-actions">
                    <a th:href="@{/vehicules/export}" class="btn btn-ligne"><i class="fas fa-file-export"></i> Exporter Excel</a>
                    <a th:href="@{/vehicules/template}" class="btn btn-ligne"><i class="fas fa-download"></i> Modèle</a>
                    <a th:href="@{/vehicules/import}" class="btn btn-doux"><i class="fas fa-file-import"></i> Importer</a>
                    <a th:href="@{/vehicules/ajouter}" class="btn btn-vert"><i class="fas fa-plus"></i> Ajouter un véhicule</a>
                </div>
            </div>

            <th:block th:replace="~{back/fragments/layout :: alertes}"></th:block>

            <form th:action="@{/vehicules}" method="get" class="section-filtre barre-filtres">
                <div class="filtre filtre-large">
                    <label>Mot-clé</label>
                    <input type="text" name="motCle" th:value="${motCle}" placeholder="marque, modèle, matricule" />
                </div>

                <div class="filtre">
                    <label>Date</label>
                    <input type="date" name="date" th:value="${date}" />
                </div>

                <div class="filtre">
                    <label>Statut</label>
                    <select name="statut">
                        <option value="" th:selected="${statut} == null">Tous</option>
                        <option th:each="etat : ${statuts}" th:value="${etat}" th:text="${etat}" th:selected="${etat} == ${statut}">
                        </option>
                    </select>
                </div>

                <div class="barre-form" style="justify-content: flex-start;">
                    <button type="submit" class="btn btn-vert btn-sm">Rechercher</button>
                </div>
            </form>

            <div class="tableau-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Matricule</th>
                            <th>Marque</th>
                            <th>Modèle</th>
                            <th>Année</th>
                            <th class="num">Capacité</th>
                            <th>Statut</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="vehicule : ${vehicules}">
                            <td class="mono" th:text="${vehicule.id}"></td>
                            <td class="mono" th:text="${vehicule.matricule}"></td>
                            <td th:text="${vehicule.marque}"></td>
                            <td th:text="${vehicule.modele}"></td>
                            <td th:text="${vehicule.annee}"></td>
                            <td class="num" th:text="${vehicule.capacite}"></td>
                            <td><span class="badge badge-vert" th:text="${vehicule.statut}"></span></td>
                            <td th:text="${vehicule.date}"></td>
                            <td>
                                <div class="cellule-actions">
                                    <a th:href="@{/vehicules/{id}(id=${vehicule.id})}" class="btn btn-sm btn-ligne">Détails</a>
                                    <a th:href="@{/vehicules/{id}/modifier(id=${vehicule.id})}" class="btn btn-sm btn-doux">Modifier</a>
                                    <form th:action="@{/vehicules/{id}/supprimer(id=${vehicule.id})}" method="post" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-doux-rouge">Supprimer</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${vehicules.empty}">
                            <td colspan="9">
                                <div class="vide">
                                    <i class="fa-solid fa-truck"></i>
                                    <p>Aucun véhicule trouvé.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="section-pagination" th:if="${totalPages > 0}">
                <span>Total : <strong th:text="${totalElements}">0</strong> véhicule(s)</span>
                <div class="pagination">
                    <a class="btn-pagination" th:if="${page > 0}"
                       th:href="@{/vehicules(motCle=${motCle},date=${date},statut=${statut},page=${page - 1},size=${size})}">« Précédent</a>
                    <span>Page <strong th:text="${page + 1}">1</strong> sur <strong th:text="${totalPages}">1</strong></span>
                    <a class="btn-pagination" th:if="${page + 1 < totalPages}"
                       th:href="@{/vehicules(motCle=${motCle},date=${date},statut=${statut},page=${page + 1},size=${size})}">Suivant »</a>
                </div>
            </div>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
