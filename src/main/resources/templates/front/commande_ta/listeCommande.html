<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head th:replace="~{front/fragments/layout :: head('Mes commandes')}"></head>

<body>
    <div th:replace="~{front/fragments/layout :: nav}"></div>

    <main class="conteneur" style="padding: 32px 20px 60px;">

        <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 14px; margin-bottom: 20px;">
            <div>
                <p style="color: var(--gf-gris); font-size: 13px; margin-bottom: 4px;">Mon compte / Mes commandes</p>
                <h1 style="margin: 0;">Mes commandes</h1>
            </div>
            <div>
                <a th:href="@{/commandes/fo/form/new}" class="btn btn-vert"><i class="fa-solid fa-plus"></i> Nouvelle commande</a>
            </div>
        </div>

        <div class="tableau-scroll">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Date</th>
                        <th>Mode de réception</th>
                        <th>Lieu / adresse</th>
                        <th>Statut</th>
                        <th class="num">Total</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cmd : ${commandes}">
                        <td class="mono" th:text="${cmd.id}"></td>
                        <td th:text="${cmd.datecommande != null ? #dates.format(cmd.datecommande, 'yyyy-MM-dd HH:mm') : ''}"></td>
                        <td>
                            <span class="badge badge-sans-point"
                                th:classappend="${cmd.modeReception == 'Retrait_Boutique'} ? 'badge-feuille' : 'badge-ocre'"
                                th:text="${cmd.modeReception == 'Retrait_Boutique' ? 'Retrait' : (cmd.modeReception == 'Livraison_Domicile' ? 'Livraison' : cmd.modeReception)}"></span>
                        </td>
                        <td th:text="${cmd.pointDeVenteRetrait?.code != null ? cmd.pointDeVenteRetrait?.code : cmd.adresseLivraison}"></td>
                        <td><span class="badge badge-vert" th:text="${cmd.statutActuel?.nom}"></span></td>
                        <td class="num texte-ocre" th:text="${cmd.totalGeneral}"></td>
                        <td>
                            <a th:href="@{|/commandes/fo/detail/${cmd.id}|}" class="btn btn-sm btn-ligne">Détail</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(commandes)}">
                        <td colspan="7">
                            <div class="vide">
                                <i class="fa-solid fa-receipt"></i>
                                <p>Vous n'avez pas encore passé de commande.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <div th:replace="~{front/fragments/layout :: footer}"></div>
</body>

</html>
