<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{back/fragments/layout :: head('Mes livraisons')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('livreur')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Mes livraisons')}"></header>

        <div class="bo-contenu">

            <div class="page-tete">
                <div>
                    <p class="fil"><a th:href="@{/livreurs/dashboard}">Tableau de bord</a> / Mes livraisons</p>
                    <h1>Mes livraisons</h1>
                    <p class="sous-titre">Bonjour <strong th:text="${livreur.prenom + ' ' + livreur.nom}"></strong></p>
                </div>
                <div class="page-actions">
                    <a th:href="@{/livreurs/dashboard}" class="btn btn-ligne"><i class="fa-solid fa-arrow-left"></i> Tableau de bord</a>
                </div>
            </div>

            <div class="tableau-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date</th>
                            <th>Véhicule</th>
                            <th>Immatriculation</th>
                            <th>Statut</th>
                            <th class="num">Commandes</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:if="${#lists.isEmpty(livraisons)}">
                            <td colspan="7">
                                <div class="vide">
                                    <i class="fa-solid fa-truck"></i>
                                    <p>Aucune livraison.</p>
                                </div>
                            </td>
                        </tr>

                        <tr th:each="livraison : ${livraisons}">
                            <td class="mono" th:text="${livraison.id}"></td>

                            <td th:text="${#temporals.format(livraison.dateLivraison,'dd/MM/yyyy HH:mm')}"></td>

                            <td th:text="${livraison.vehicule.marque + ' ' + livraison.vehicule.modele}"></td>

                            <td class="mono" th:text="${livraison.vehicule.matricule}"></td>

                            <td><span class="badge badge-vert" th:text="${livraison.statutLivraison}"></span></td>

                            <td class="num" th:text="${#lists.size(livraison.filles)}"></td>

                            <td>
                                <div class="cellule-actions">
                                    <a th:href="@{/livreurs/livraisons/{id}(id=${livraison.id})}" class="btn btn-sm btn-ligne">
                                        Voir
                                    </a>
                                    <form th:action="@{/livreurs/livraisons/valider}" method="post">
                                        <input type="hidden" name="idLivraison" th:value="${livraison.id}" />
                                        <button type="submit" class="btn btn-sm btn-doux"
                                            th:disabled="${livraison.statutLivraison.name() == 'Validee'}">
                                            Valider
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
