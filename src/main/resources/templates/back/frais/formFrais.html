<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head th:replace="~{back/fragments/layout :: head(${fraisFormDto.id == null} ? 'Ajouter un frais' : 'Modifier un frais')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('frais')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Frais de livraison')}"></header>

        <div class="bo-contenu bo-contenu-etroit">

            <div class="page-tete">
                <div>
                    <p class="fil"><a th:href="@{/frais/list}">Frais de livraison</a> / Formulaire</p>
                    <h1 th:text="${fraisFormDto.id == null} ? 'Ajouter un nouveau frais' : 'Modifier le frais #' + ${fraisFormDto.id}">
                        Formulaire Frais
                    </h1>
                </div>
                <div class="page-actions">
                    <a th:href="@{/frais/list}" class="btn btn-ligne"><i class="fa-solid fa-arrow-left"></i> Voir la liste</a>
                </div>
            </div>

            <div th:if="${alert}" class="alerte alerte-erreur" th:text="${alert}"></div>

            <form th:action="@{/frais/save}" th:object="${fraisFormDto}" method="POST" id="form">

                <input type="hidden" th:field="*{id}" />

                <div class="carte">
                    <div class="carte-tete">
                        <h2><i class="fa-solid fa-truck-fast"></i> Configuration de la tarification</h2>
                    </div>
                    <div class="carte-corps">

                        <div class="champ">
                            <label for="province">Province de destination</label>
                            <th:block th:if="${fraisFormDto.id != null}">
                                <select id="province" disabled>
                                    <option th:each="province : ${provinceLivraisonOptions}" th:value="${province.id}"
                                        th:text="${province.nom}" th:selected="${province.id == fraisFormDto.idProvince}">
                                    </option>
                                </select>
                                <input type="hidden" th:field="*{idProvince}" />
                            </th:block>

                            <th:block th:if="${fraisFormDto.id == null}">
                                <select id="province" th:field="*{idProvince}"
                                    th:classappend="${#fields.hasErrors('idProvince')} ? 'is-invalid' : ''">
                                    <option value="">Sélectionnez la province concernée</option>
                                    <option th:each="province : ${provinceLivraisonOptions}" th:value="${province.id}"
                                        th:text="${province.nom}">
                                    </option>
                                </select>
                            </th:block>
                            <p class="text-danger" th:if="${#fields.hasErrors('idProvince')}" th:errors="*{idProvince}"></p>
                        </div>

                        <div class="grille-form">
                            <div class="champ">
                                <label for="poidsreference">Poids limite de référence (kg &gt;)</label>
                                <input type="number" step="any" id="poidsreference" th:field="*{poidsreference}" placeholder="Ex: 10.00"
                                    th:classappend="${#fields.hasErrors('poidsreference')} ? 'is-invalid' : ''" />
                                <p class="text-danger" th:if="${#fields.hasErrors('poidsreference')}" th:errors="*{poidsreference}"></p>
                            </div>

                            <div class="champ">
                                <label for="montant">Montant du frais appliqué (Ar)</label>
                                <input type="number" step="any" id="montant" th:field="*{montant}" placeholder="Ex: 15000"
                                    th:classappend="${#fields.hasErrors('montant')} ? 'is-invalid' : ''" />
                                <p class="text-danger" th:if="${#fields.hasErrors('montant')}" th:errors="*{montant}"></p>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="btn-list barre-form">
                    <a th:href="@{/frais/list}" class="btn btn-ligne">Annuler</a>
                    <button type="submit" class="btn btn-vert"><i class="fa-solid fa-check"></i> Enregistrer</button>
                </div>
            </form>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
