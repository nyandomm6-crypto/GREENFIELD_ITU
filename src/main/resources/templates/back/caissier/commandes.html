<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head
    th:replace="~{back/fragments/layout-caissier :: head('Commandes')}"
  ></head>

  <body class="bo">
    <aside
      th:replace="~{back/fragments/layout-caissier :: sidebar('commandes')}"
    ></aside>

    <main class="bo-main">
      <header
        th:replace="~{back/fragments/layout-caissier :: topbar('Commandes')}"
      ></header>

      <div class="bo-contenu">
        <div class="page-tete">
          <div>
            <p class="fil">
              Boutique <i class="fas fa-chevron-right"></i> Commandes
            </p>
            <h1>Commandes</h1>
            <p class="sous-titre">
              Consultez les commandes de la boutique et créez-en de nouvelles.
            </p>
          </div>
          <div class="page-actions">
            <a th:href="@{/caissier/commande/new}" class="btn btn-vert"
              ><i class="fa-solid fa-plus"></i> Nouvelle commande</a
            >
          </div>
        </div>

        <th:block
          th:replace="~{back/fragments/layout-caissier :: alertes}"
        ></th:block>

        <div class="tableau-scroll">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Client</th>
                <th>Statut</th>
                <th class="num">Total</th>
                <th>Mode</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="commande : ${commandes}">
                <td class="mono" th:text="${commande.id}">1</td>
                <td
                  th:text="${commande.client != null ? commande.client.nom + ' ' + commande.client.prenom : '—'}"
                >
                  Client
                </td>
                <td
                  th:text="${commande.statutActuel != null ? commande.statutActuel.nom : '—'}"
                >
                  Statut
                </td>
                <td class="num" th:text="${commande.totalGeneral}">0</td>
                <td
                  th:text="${commande.modeReception != null ? commande.modeReception.name() : '—'}"
                >
                  Mode
                </td>
                <td>
                  <a th:href="@{/caissier/commande/detail/{id}(id=${commande.id})}"
                     class="btn btn-sm btn-ligne">
                    <i class="fas fa-eye"></i> Détail
                  </a>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(commandes)}">
                <td colspan="6">
                  <div class="vide">
                    <i class="fas fa-box-open"></i>
                    <p>Aucune commande disponible.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <footer th:replace="~{back/fragments/layout-caissier :: pied}"></footer>
    </main>
  </body>
</html>
