<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head th:replace="~{back/fragments/layout :: head('Détail livraison')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('livraisons')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Livraisons')}"></header>

        <div class="bo-contenu">

            <div class="page-tete">
                <div>
                    <p class="fil"><a th:href="@{/livraison}">Livraisons</a> / Détail</p>
                    <h1>Détail de la livraison</h1>
                </div>
                <div class="page-actions">
                    <button type="button" onclick="window.history.back()" class="btn btn-ligne"><i class="fa-solid fa-arrow-left"></i> Retour</button>
                </div>
            </div>

            <div th:if="${livraison != null}">

                <div class="carte">
                    <div class="carte-tete">
                        <h2><i class="fa-solid fa-circle-info"></i> Informations générales</h2>
                    </div>
                    <div class="carte-corps">
                        <dl class="fiche">
                            <dt>ID</dt>
                            <dd class="mono" th:text="${livraison.id}"></dd>

                            <dt>Statut</dt>
                            <dd><span class="badge badge-vert" th:text="${livraison.statutLivraison}"></span></dd>

                            <dt>Date</dt>
                            <dd th:text="${livraison.dateLivraison}"></dd>

                            <dt>Véhicule</dt>
                            <dd class="mono" th:text="${livraison.vehicule.matricule}"></dd>

                            <dt>Livreur</dt>
                            <dd th:text="${livraison.livreur.nom}"></dd>
                        </dl>
                    </div>
                </div>

                <div class="carte">
                    <div class="carte-tete">
                        <h2><i class="fa-solid fa-basket-shopping"></i> Commandes</h2>
                    </div>
                    <div class="carte-corps">
                        <div class="tableau-scroll">
                            <table>
                                <thead>
                                    <tr>
                                        <th>ID ligne</th>
                                        <th>Commande</th>
                                        <th>Statut</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    <tr th:each="f : ${livraison.filles}">
                                        <td class="mono" th:text="${f.id}"></td>

                                        <td class="mono" th:text="${f.commande.id}"></td>

                                        <!-- IMPORTANT: id ajouté pour AJAX -->
                                        <td>
                                            <span class="badge badge-vert" th:id="'statut_' + ${f.id}" th:text="${f.statutLivraisonFille}"></span>
                                        </td>

                                        <td>
                                            <div class="cellule-actions">
                                                <!-- VALIDER -->
                                                <button type="button" class="btn btn-sm btn-doux"
                                                    th:if="${f.statutLivraisonFille.name() == 'En_attente'}"
                                                    th:attr="onclick=|valider(${f.id},${livraison.id})|">
                                                    Valider
                                                </button>

                                                <!-- OUVRIR MODALE -->
                                                <button type="button" class="btn btn-sm btn-doux-rouge"
                                                    th:if="${f.statutLivraisonFille.name() != 'Annule'
                                                            && f.statutLivraisonFille.name() != 'Livre'}"
                                                    th:attr="onclick=|ouvrirModal('modal_${f.id}')|">
                                                    Action
                                                </button>

                                                <!-- MODALE -->
                                                <div class="gf-modal" th:id="'modal_' + ${f.id}">
                                                    <div class="gf-modal-boite">
                                                        <div class="gf-modal-tete">
                                                            <h3>Gestion livraison</h3>
                                                            <button type="button" class="gf-modal-fermer"
                                                                th:attr="onclick=|fermerModal('modal_${f.id}')|"><i class="fa-solid fa-xmark"></i></button>
                                                        </div>

                                                        <div class="gf-modal-corps">
                                                            <p><strong>Commande :</strong> <span th:text="${f.commande.id}"></span></p>

                                                            <p class="sous-titre-form">Annuler commande</p>
                                                            <button type="button" class="btn btn-sm btn-doux-rouge"
                                                                th:attr="onclick=|annuler(${f.id},${livraison.id})|">
                                                                Confirmer annulation
                                                            </button>

                                                            <p class="sous-titre-form" style="margin-top: 18px;">Reporter livraison</p>
                                                            <form th:action="@{'/livraison-fille/reporter'}" method="post">
                                                                <div class="champ">
                                                                    <label>Date de report</label>
                                                                    <input type="date" name="dateReport" required />
                                                                </div>
                                                                <input type="hidden" name="id" th:value="${f.id}" required />
                                                                <input type="hidden" name="idLivraison" th:value="${livraison.id}" required />

                                                                <button type="submit" class="btn btn-sm btn-ocre">
                                                                    Confirmer report
                                                                </button>
                                                            </form>
                                                        </div>

                                                        <div class="gf-modal-pied">
                                                            <button class="btn btn-sm btn-ligne" th:attr="onclick=|fermerModal('modal_${f.id}')|">
                                                                Fermer
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${livraison == null}" class="vide">
                <i class="fa-solid fa-truck"></i>
                <p>Aucune livraison trouvée.</p>
            </div>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>

    <script>
      function ouvrirModal(id) {
        const modal = document.getElementById(id);
        if (modal) modal.classList.add('ouverte');
      }

      function fermerModal(id) {
        const modal = document.getElementById(id);
        if (modal) modal.classList.remove('ouverte');
      }

      document.addEventListener('click', function (event) {
        if (event.target.classList.contains('gf-modal')) {
          event.target.classList.remove('ouverte');
        }
      });

      function annuler(id, livraisonId) {
        fetch("/livraison-fille/annuler/" + id, {
          method: "POST",
        })
          .then((r) => {
            if (!r.ok) throw new Error("Erreur serveur");
            return r.text();
          })
          .then(() => {
            window.location.href = "/livraison/" + livraisonId;
          })
          .catch((err) => {
            alert("Erreur : " + err.message);
          });
      }

      function valider(id, livraisonId) {
        fetch("/livraison-fille/valider/" + id, {
          method: "POST",
        })
          .then((r) => {
            if (!r.ok) throw new Error("Erreur serveur");
            return r.text();
          })
          .then(() => {
            window.location.href = "/livraison/" + livraisonId;
          })
          .catch((err) => {
            alert("Erreur : " + err.message);
          });
      }
    </script>
</body>

</html>
