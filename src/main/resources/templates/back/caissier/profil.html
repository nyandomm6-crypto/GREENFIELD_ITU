<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head
    th:replace="~{back/fragments/layout-caissier :: head('Mon profil')}"
  ></head>

  <body class="bo">
    <aside
      th:replace="~{back/fragments/layout-caissier :: sidebar('compte')}"
    ></aside>

    <main class="bo-main">
      <header
        th:replace="~{back/fragments/layout-caissier :: topbar('Mon profil')}"
      ></header>

      <div class="bo-contenu bo-contenu-etroit">
        <div class="page-tete">
          <div>
            <p class="fil">
              <a th:href="@{/caissier/dashboard}">Tableau de bord</a> / Mon
              profil
            </p>
            <h1>Mon profil</h1>
          </div>
          <div class="page-actions">
            <a th:href="@{/caissier/dashboard}" class="btn btn-ligne"
              ><i class="fa-solid fa-arrow-left"></i> Tableau de bord</a
            >
          </div>
        </div>

        <div class="carte">
          <div class="carte-tete">
            <h2><i class="fa-solid fa-user"></i> Informations personnelles</h2>
          </div>
          <div class="carte-corps">
            <dl class="fiche">
              <dt>Nom</dt>
              <dd th:text="${employe.nom}"></dd>

              <dt>Prénom</dt>
              <dd th:text="${employe.prenom}"></dd>

              <dt>Email</dt>
              <dd th:text="${employe.mail}"></dd>

              <dt>Contact</dt>
              <dd
                th:text="${employe.contact != null ? employe.contact : '—'}"
              ></dd>

              <dt>Adresse</dt>
              <dd
                th:text="${employe.adresse != null ? employe.adresse : '—'}"
              ></dd>

              <dt>Rôle</dt>
              <dd>
                <span class="badge badge-vert" th:text="${employe.role}"></span>
              </dd>

              <dt>Statut</dt>
              <dd>
                <span th:if="${employe.estActif}" class="status-active"
                  >Actif</span
                >
                <span th:unless="${employe.estActif}" class="status-inactive"
                  >Inactif</span
                >
              </dd>
            </dl>

            <div class="mt-4">
              <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-danger rounded-pill">
                  <i class="fas fa-sign-out-alt me-2"></i> Se déconnecter
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <footer th:replace="~{back/fragments/layout-caissier :: pied}"></footer>
    </main>
  </body>
</html>
