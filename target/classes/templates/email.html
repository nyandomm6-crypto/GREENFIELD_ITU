<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Envoyer un email</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #f4f7f2;
        color: #182018;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 16px;
      }

      h1 {
        margin: 0 0 24px;
        font-size: 28px;
      }

      form {
        display: grid;
        gap: 16px;
        background: #ffffff;
        border: 1px solid #d9e2d3;
        border-radius: 8px;
        padding: 24px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #b9c7b0;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 180px;
        resize: vertical;
      }

      button {
        justify-self: start;
        border: 0;
        border-radius: 6px;
        background: #2f6b3f;
        color: #ffffff;
        padding: 11px 18px;
        font-weight: 700;
        cursor: pointer;
      }

      .message {
        margin-bottom: 16px;
        border-radius: 6px;
        padding: 12px 14px;
      }

      .success {
        background: #e2f4e7;
        color: #155724;
      }

      .error {
        background: #fde8e8;
        color: #8a1c1c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Envoyer remarque</h1>

      <div
        class="message success"
        th:if="${success}"
        th:text="${success}"
      ></div>
      <div class="message error" th:if="${error}" th:text="${error}"></div>

      <form th:action="@{/email}" method="post" enctype="multipart/form-data">
        <label>
          Nom entreprise
          <input type="text" name="nomEntreprise" value="greenField" required />
        </label>

        <label>
          Sujet
          <input type="text" name="sujet" required value="Remarque" />
        </label>

        <label>
          Message
          <textarea name="contenu" required></textarea>
        </label>

        <label>
          Fichier joint
          <input type="file" name="pieceJointe" />
        </label>

        <button type="submit">Envoyer</button>
      </form>
    </main>
  </body>
</html>
