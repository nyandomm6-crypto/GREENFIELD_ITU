<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajouter Produit - Point de Vente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="container-small">
      <h1>Ajouter un Produit - <span th:text="${pointDeVente.nom}"></span></h1>

      <form
        th:action="@{/pointdevente/} + ${pointDeVente.id} + '/ajouter-produit'"
        method="post"
      >
        <div class="form-group">
          <label for="idProduit">Produit</label>
          <select id="idProduit" name="idProduit" required>
            <option value="">Sélectionner un produit</option>
            <option
              th:each="produit : ${produits}"
              th:value="${produit.id}"
              th:text="${produit.nom}"
            ></option>
          </select>
        </div>

        <div class="form-group">
          <label for="quantite">Quantité</label>
          <input type="number" id="quantite" name="quantite" min="1" required placeholder="Entrez la quantité" />
        </div>

        <button type="submit" class="btn-submit">Ajouter</button>
      </form>

      <a th:href="@{/pointdevente/} + ${pointDeVente.id} + '/stock'" class="btn-back-link">← Retour au stock</a>
    </div>
  </body>
</html>
