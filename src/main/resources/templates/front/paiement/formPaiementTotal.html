<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head th:replace="~{back/fragments/layout :: head(${modeReste} ? 'Payer le reste' : 'Paiement total')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('paiements')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Paiements')}"></header>

        <div class="bo-contenu bo-contenu-etroit">

            <div class="page-tete">
                <div>
                    <p class="fil"><a th:href="@{/paiements/list}">Paiements</a> / Formulaire</p>
                    <h1 th:text="${modeReste} ? 'Payer le reste' : 'Paiement total'"></h1>
                </div>
            </div>

            <div th:if="${alert != null}" th:text="${alert}" class="alerte alerte-erreur"></div>
            <div th:if="${succes != null}" th:text="${succes}" class="alerte alerte-succes"></div>

            <div class="carte">
                <div class="carte-tete">
                    <h2><i class="fa-solid fa-circle-info"></i> Commande #<span th:text="${commande.id}"></span></h2>
                </div>
                <div class="carte-corps">
                    <dl class="fiche">
                        <dt>Montant total à payer</dt>
                        <dd class="mono texte-ocre" th:text="${montantTotal}"></dd>

                        <dt>Frais de livraison</dt>
                        <dd class="mono" th:text="${commande.fraisLivraison}"></dd>

                        <dt th:if="${modeReste}">Montant déjà payé</dt>
                        <dd th:if="${modeReste}" class="mono" th:text="${montantPaye}"></dd>

                        <dt>Montant restant à payer</dt>
                        <dd class="mono texte-ocre" th:text="${montantRestant}"></dd>
                    </dl>
                </div>
            </div>

            <div th:if="${fillesExistantes != null and !#lists.isEmpty(fillesExistantes)}" class="carte">
                <div class="carte-tete">
                    <h2><i class="fa-solid fa-receipt"></i> Paiements déjà enregistrés</h2>
                </div>
                <div class="carte-corps">
                    <div class="tableau-scroll">
                        <table>
                            <thead>
                                <tr>
                                    <th>Type</th>
                                    <th class="num">Montant</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="fille : ${fillesExistantes}">
                                    <td th:text="${fille.typePayement}"></td>
                                    <td class="num mono" th:text="${fille.valeur}"></td>
                                    <td th:text="${fille.date}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="carte">
                <div class="carte-tete">
                    <h2><i class="fa-solid fa-money-bill-wave"></i> Nouveau paiement</h2>
                </div>
                <div class="carte-corps">
                    <form th:action="${modeReste} ? @{|/paiements/reste/${commande.id}|} : @{|/paiements/total/${commande.id}|}"
                        th:object="${paiementFormDto}" method="POST">
                        <input type="hidden" th:field="*{commandeId}">

                        <div class="tableau-scroll">
                            <table id="table-paiement">
                                <thead>
                                    <tr>
                                        <th>Type de paiement</th>
                                        <th class="num">Montant</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr class="ligne-paiement" th:each="ligne, stat : *{lignes}">
                                        <td>
                                            <select class="type-paiement" th:field="*{lignes[__${stat.index}__].typePayement}">
                                                <option th:each="type : ${typesPaiement}" th:value="${type}" th:text="${type}"></option>
                                            </select>
                                        </td>
                                        <td>
                                            <input type="number" step="0.01" class="montant" th:field="*{lignes[__${stat.index}__].montant}" required>
                                        </td>
                                        <td>
                                            <button type="button" class="btn btn-sm btn-doux-rouge" onclick="supprimerLignePaiement(this)"><i class="fa-solid fa-xmark"></i> Supprimer</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="barre-form" style="justify-content: flex-start; margin-bottom: 10px;">
                            <button type="button" class="btn btn-doux btn-sm" onclick="ajouterLignePaiement()"><i class="fa-solid fa-plus"></i> Ajouter une ligne</button>
                        </div>

                        <div id="bloc-mobile-money" class="champ">
                            <label>Numéros de transfert</label>
                            <div class="liste-coche" style="max-height: none;">
                                <p th:each="numero : ${numerosTransfert}" th:text="${numero}" style="margin: 0; padding: 4px 0;"></p>
                            </div>
                        </div>

                        <div class="barre-form">
                            <button type="submit" class="btn btn-vert"><i class="fa-solid fa-check"></i> Payer</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>

    <script th:inline="javascript">
        const typesPaiement = /*[[${typesPaiement}]]*/[];

        function ajouterLignePaiement() {
            const tbody = document.querySelector('#table-paiement tbody');
            const index = tbody.querySelectorAll('.ligne-paiement').length;
            const options = typesPaiement.map(type => `<option value="${type}">${type}</option>`).join('');
            tbody.insertAdjacentHTML('beforeend', `
                <tr class="ligne-paiement">
                    <td>
                        <select class="type-paiement" name="lignes[${index}].typePayement" onchange="toggleMobileMoney()">
                            ${options}
                        </select>
                    </td>
                    <td>
                        <input type="number" step="0.01" class="montant" name="lignes[${index}].montant" required>
                    </td>
                    <td>
                        <button type="button" class="btn btn-sm btn-doux-rouge" onclick="supprimerLignePaiement(this)"><i class="fa-solid fa-xmark"></i> Supprimer</button>
                    </td>
                </tr>
            `);
            toggleMobileMoney();
        }

        function supprimerLignePaiement(button) {
            const lignes = document.querySelectorAll('.ligne-paiement');
            if (lignes.length <= 1) {
                alert('Vous devez garder au moins une ligne de paiement.');
                return;
            }
            button.closest('.ligne-paiement').remove();
            reindexerLignes();
            toggleMobileMoney();
        }

        function reindexerLignes() {
            document.querySelectorAll('.ligne-paiement').forEach((ligne, index) => {
                ligne.querySelector('.type-paiement').name = `lignes[${index}].typePayement`;
                ligne.querySelector('input[type="number"]').name = `lignes[${index}].montant`;
            });
        }

        function toggleMobileMoney() {
            const hasMobileMoney = Array.from(document.querySelectorAll('.type-paiement'))
                .some(select => select.value === 'Mobile_Money');
            document.getElementById('bloc-mobile-money').style.display = hasMobileMoney ? 'block' : 'none';
        }

        document.querySelectorAll('.type-paiement').forEach(select => {
            select.addEventListener('change', toggleMobileMoney);
        });
        toggleMobileMoney();
    </script>
</body>

</html>
