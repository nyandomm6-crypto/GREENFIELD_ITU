<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail employe</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        color: #1f2933;
      }

      dl {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 10px 16px;
        max-width: 760px;
      }

      dt {
        font-weight: bold;
      }

      dd {
        margin: 0;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 22px;
        align-items: center;
      }

      a,
      button {
        border: 1px solid #2f80ed;
        background: #2f80ed;
        color: white;
        padding: 9px 14px;
        border-radius: 4px;
        text-decoration: none;
        cursor: pointer;
      }

      a.secondary {
        background: white;
        color: #2f80ed;
      }

      button.danger {
        border-color: #c0392b;
        background: #c0392b;
      }

      .message {
        padding: 10px;
        border-radius: 4px;
        margin-bottom: 12px;
        background: #dcfce7;
        color: #166534;
      }
    </style>
  </head>
  <body>
    <h1>Detail employe</h1>

    <div class="message" th:if="${success}" th:text="${success}"></div>

    <dl>
      <dt>Nom</dt>
      <dd th:text="${employe.nom}"></dd>

      <dt>Prenom</dt>
      <dd th:text="${employe.prenom}"></dd>

      <dt>Adresse</dt>
      <dd th:text="${employe.adresse ?: '-'}"></dd>

      <dt>Contact</dt>
      <dd th:text="${employe.contact ?: '-'}"></dd>

      <dt>Mail</dt>
      <dd th:text="${employe.mail}"></dd>

      <dt>Role</dt>
      <dd th:text="${employe.role}"></dd>

      <dt>Point de vente</dt>
      <dd
        th:text="${employe.pointDeVente != null ? employe.pointDeVente.nom + ' (' + employe.pointDeVente.code + ')' : '-'}"
      ></dd>

      <dt>Actif</dt>
      <dd th:text="${employe.estActif ? 'Oui' : 'Non'}"></dd>

      <dt>Date</dt>
      <dd th:text="${employe.date}"></dd>
    </dl>

    <div class="actions">
      <a class="secondary" th:href="@{/employes}">Retour liste</a>
      <a
        th:if="${employe.estActif}"
        th:href="@{/employes/{id}/edit(id=${employe.id})}"
        >Modifier</a
      >
      <form
        th:if="${employe.estActif}"
        th:action="@{/employes/{id}/delete(id=${employe.id})}"
        method="post"
      >
        <button class="danger" type="submit">Supprimer</button>
      </form>
    </div>
  </body>
</html>
