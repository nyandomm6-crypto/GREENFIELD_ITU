<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{back/fragments/layout :: head('Ajouter un produit au stock')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('pdv')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Points de vente')}"></header>

        <div class="bo-contenu bo-contenu-etroit">

            <div class="page-tete">
                <div>
                    <p class="fil"><a th:href="@{/pointdevente}">Points de vente</a> / Ajouter un produit</p>
                    <h1>Ajouter un produit — <span th:text="${pointDeVente.nom}"></span></h1>
                </div>
                <div class="page-actions">
                    <a th:href="@{/pointdevente/} + ${pointDeVente.id} + '/stock'" class="btn btn-ligne"><i class="fa-solid fa-arrow-left"></i> Retour au stock</a>
                </div>
            </div>

            <div class="carte">
                <div class="carte-tete">
                    <h2><i class="fa-solid fa-box"></i> Détails de l'ajout</h2>
                </div>
                <div class="carte-corps">
                    <form th:action="@{/pointdevente/} + ${pointDeVente.id} + '/ajouter-produit'" method="post">

                        <div class="grille-form">
                            <div class="champ">
                                <label for="idProduit">Produit</label>
                                <select id="idProduit" name="idProduit" required>
                                    <option value="">Sélectionner un produit</option>
                                    <option th:each="produit : ${produits}" th:value="${produit.id}" th:text="${produit.nom}"></option>
                                </select>
                            </div>

                            <div class="champ">
                                <label for="quantite">Quantité</label>
                                <input type="number" id="quantite" name="quantite" min="1" required placeholder="Entrez la quantité" />
                            </div>
                        </div>

                        <div class="btn-list barre-form">
                            <a th:href="@{/pointdevente/} + ${pointDeVente.id} + '/stock'" class="btn btn-ligne">Annuler</a>
                            <button type="submit" class="btn btn-vert"><i class="fa-solid fa-check"></i> Ajouter</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
