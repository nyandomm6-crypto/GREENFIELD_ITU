<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <!-- ===================== -->
    <!-- STYLE COMMUN greenField -->
    <!-- ===================== -->
    <th:block th:fragment="styles">
      <style>
        :root {
          --vert: #2e7d32;
          --vert-clair: #e8f5e9;
          --vert-fonce: #1b5e20;
          --texte: #2b2b2b;
          --gris: #6b7280;
          --bordure: #e0e0e0;
          --rouge: #c62828;
          --fond: #f7f9f7;
        }

        * {
          box-sizing: border-box;
        }

        body {
          margin: 0;
          font-family: "Segoe UI", Arial, sans-serif;
          background: var(--fond);
          color: var(--texte);
        }

        a {
          color: var(--vert-fonce);
          text-decoration: none;
        }

        .conteneur {
          max-width: 1100px;
          margin: 0 auto;
          padding: 24px 20px 60px;
        }

        /* Barre de navigation */
        .barre-nav {
          background: var(--vert);
          color: white;
          padding: 14px 20px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          flex-wrap: wrap;
          gap: 10px;
        }

        .barre-nav .logo {
          font-size: 20px;
          font-weight: 700;
          color: white;
        }

        .barre-nav nav {
          display: flex;
          align-items: center;
          gap: 18px;
          flex-wrap: wrap;
        }

        .barre-nav nav a {
          color: white;
          font-weight: 500;
        }

        .barre-nav nav a:hover {
          text-decoration: underline;
        }

        .lien-panier {
          position: relative;
          display: inline-flex;
          align-items: center;
          gap: 6px;
          background: var(--vert-fonce);
          padding: 6px 12px;
          border-radius: 20px;
        }

        .badge-panier {
          background: white;
          color: var(--vert-fonce);
          border-radius: 50%;
          font-size: 12px;
          font-weight: 700;
          min-width: 20px;
          height: 20px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          padding: 0 4px;
        }

        .btn-deconnexion {
          background: transparent;
          border: 1px solid white;
          color: white;
          padding: 5px 12px;
          border-radius: 16px;
          cursor: pointer;
          font-size: 14px;
        }

        .btn-deconnexion:hover {
          background: rgba(255, 255, 255, 0.15);
        }

        /* Messages */
        .message {
          padding: 12px 16px;
          margin: 16px 0;
          border-radius: 8px;
          font-size: 14px;
        }

        .message.success {
          background: #d4edda;
          color: #155724;
        }

        .message.error {
          background: #f8d7da;
          color: #721c24;
        }

        h1 {
          font-size: 26px;
          margin-bottom: 6px;
          color: var(--vert-fonce);
        }

        h2 {
          font-size: 20px;
          color: var(--vert-fonce);
        }

        /* Boutons génériques */
        .btn {
          display: inline-block;
          background: var(--vert);
          color: white;
          border: none;
          padding: 10px 18px;
          border-radius: 8px;
          cursor: pointer;
          font-size: 15px;
          font-weight: 600;
        }

        .btn:hover {
          background: var(--vert-fonce);
        }

        .btn.secondaire {
          background: white;
          color: var(--vert-fonce);
          border: 1px solid var(--vert);
        }

        .btn.secondaire:hover {
          background: var(--vert-clair);
        }

        .btn.danger {
          background: white;
          color: var(--rouge);
          border: 1px solid var(--rouge);
        }

        .btn.danger:hover {
          background: #fdecea;
        }

        .btn:disabled {
          background: #b0b0b0;
          cursor: not-allowed;
        }
      </style>
    </th:block>

    <!-- ===================== -->
    <!-- BARRE DE NAVIGATION -->
    <!-- ===================== -->
  </head>
  <body>
    <header class="barre-nav" th:fragment="nav">
      <a class="logo" th:href="@{/produits}">🌿 greenField</a>

      <nav>
        <a th:href="@{/produits}">Produits</a>

        <a class="lien-panier" th:href="@{/panier}">
          🛒 Panier
          <span
            class="badge-panier"
            th:if="${nombreArticlesPanier != null and nombreArticlesPanier > 0}"
            th:text="${nombreArticlesPanier}"
          ></span>
        </a>

        <span th:if="${session.client != null}">
          <span th:text="'Bonjour, ' + ${session.client.prenom}"></span>
          <form th:action="@{/logout}" method="post" style="display: inline">
            <button type="submit" class="btn-deconnexion">Déconnexion</button>
          </form>
        </span>

        <a th:unless="${session.client != null}" th:href="@{/login}"
          >Connexion</a
        >
      </nav>
    </header>
  </body>
</html>
