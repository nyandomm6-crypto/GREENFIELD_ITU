# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/greenfield}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:112345677}
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=8090

# JPA/Hibernate
spring.jpa.database-platform=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Jackson
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# Thymeleaf
spring.thymeleaf.cache=false