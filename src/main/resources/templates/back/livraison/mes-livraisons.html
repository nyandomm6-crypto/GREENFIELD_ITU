<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Mes livraisons</title>
  </head>
  <body>
    <h1>Mes livraisons</h1>

    <p>
      Bonjour
      <strong th:text="${livreur.prenom + ' ' + livreur.nom}"></strong>
    </p>

    <p>
      <a th:href="@{/livreurs/dashboard}">← Retour au tableau de bord</a>
    </p>

    <table border="1" cellpadding="5" cellspacing="0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>Véhicule</th>
          <th>Immatriculation</th>
          <th>Statut</th>
          <th>Nombre de commandes</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr th:if="${#lists.isEmpty(livraisons)}">
          <td colspan="7">Aucune livraison.</td>
        </tr>

        <tr th:each="livraison : ${livraisons}">
          <td th:text="${livraison.id}"></td>

          <td
            th:text="${#temporals.format(livraison.dateLivraison,'dd/MM/yyyy HH:mm')}"
          ></td>

          <td
            th:text="${livraison.vehicule.marque + ' ' + livraison.vehicule.modele}"
          ></td>

          <td th:text="${livraison.vehicule.matricule}"></td>

          <td th:text="${livraison.statutLivraison}"></td>

          <td th:text="${#lists.size(livraison.filles)}"></td>

          <td>
            <a th:href="@{/livreurs/livraisons/{id}(id=${livraison.id})}">
              Voir
            </a>
            <a th:href="@{/livreurs/livraisons/{id}(id=${livraison.id})}">
              Voir
            </a>
            <form th:action="@{/livreurs/livraisons/valider}" method="post">
              <input
                type="hidden"
                name="idLivraison"
                th:value="${livraison.id}"
              />

              <button
                type="submit"
                th:disabled="${livraison.statutLivraison.name() == 'Validee'}"
              >
                Valider
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
