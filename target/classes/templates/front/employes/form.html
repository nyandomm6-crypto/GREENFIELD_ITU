<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${titre}">Formulaire employe</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
        color: #1f2933;
      }

      form {
        max-width: 720px;
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
      }

      input,
      select {
        padding: 9px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
      }

      .actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      a,
      button {
        border: 1px solid #2f80ed;
        background: #2f80ed;
        color: white;
        padding: 9px 14px;
        border-radius: 4px;
        text-decoration: none;
        cursor: pointer;
      }

      a.secondary {
        background: white;
        color: #2f80ed;
      }

      .error {
        padding: 10px;
        border-radius: 4px;
        background: #fee2e2;
        color: #991b1b;
        margin-bottom: 12px;
      }

      .hint {
        color: #64748b;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1 th:text="${titre}">Formulaire employe</h1>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form th:action="${action}" method="post" th:object="${employe}">
      <label>
        Nom
        <input type="text" th:field="*{nom}" required />
      </label>

      <label>
        Prenom
        <input type="text" th:field="*{prenom}" required />
      </label>

      <label>
        Adresse
        <input type="text" th:field="*{adresse}" />
      </label>

      <label>
        Contact
        <input type="text" th:field="*{contact}" />
      </label>

      <label>
        Mail
        <input type="email" th:field="*{mail}" required />
      </label>

      <label>
        Mot de passe
        <input
          type="password"
          th:field="*{motdepasse}"
          th:required="${creation}"
          autocomplete="new-password"
        />
        <span class="hint" th:if="${!creation}">
          Laisser vide pour garder le mot de passe actuel.
        </span>
      </label>

      <label>
        Role
        <select th:field="*{role}" required>
          <option value="">Choisir role</option>
          <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
        </select>
      </label>

      <label>
        Point de vente
        <select name="codePointDeVente">
          <option value="">Aucun</option>
          <option
            th:each="point : ${pointsDeVente}"
            th:value="${point.code}"
            th:text="${point.nom + ' (' + point.code + ')'}"
            th:selected="${codePointDeVente != null and codePointDeVente == point.code}"
          ></option>
        </select>
      </label>

      <label>
        Date
        <input type="date" th:field="*{date}" />
      </label>

      <div class="actions">
        <button type="submit">Enregistrer</button>
        <a class="secondary" th:href="@{/employes}">Annuler</a>
      </div>
    </form>
  </body>
</html>
