<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{back/fragments/layout :: head('Stock du point de vente')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('pdv')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Points de vente')}"></header>

        <div class="bo-contenu">

            <div class="page-tete">
                <div>
                    <p class="fil"><a th:href="@{/pointdevente}">Points de vente</a> / <a th:href="@{/pointdevente/} + ${pointDeVente.id}" th:text="${pointDeVente.nom}"></a> / Stock</p>
                    <h1>Stock — <span th:text="${pointDeVente.nom}"></span></h1>
                </div>
                <div class="page-actions">
                    <a th:href="@{/pointdevente/} + ${pointDeVente.id}" class="btn btn-ligne"><i class="fa-solid fa-arrow-left"></i> Retour au détail</a>
                    <a th:href="@{/pointdevente/} + ${pointDeVente.id} + '/ajouter-produit'" class="btn btn-vert"><i class="fas fa-plus"></i> Ajouter un produit</a>
                </div>
            </div>

            <div class="alerte alerte-succes" th:if="${success}" th:text="${success}"></div>
            <div class="alerte alerte-erreur" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/pointdevente/} + ${pointDeVente.id} + '/stock'" method="get" class="section-filtre barre-filtres">
                <div class="filtre">
                    <label>Date</label>
                    <input type="datetime-local" name="date" th:value="${date}" />
                </div>
                <div class="filtre filtre-large">
                    <label>Produit</label>
                    <input type="text" name="produit" th:value="${produit}" list="liste-produits" placeholder="Filtrer par produit" />
                    <datalist id="liste-produits">
                        <option th:each="produit : ${produits}" th:value="${produit.nom}"
                            th:data-matricule="${produit.matricule}">
                        </option>
                    </datalist>
                </div>
                <div class="barre-form" style="justify-content: flex-start;">
                    <button type="submit" class="btn btn-vert btn-sm">Filtrer</button>
                </div>
            </form>

            <div class="tableau-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Produit</th>
                            <th class="num">Quantité</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="stock : ${stockDisponible}">
                            <td th:text="${stock.produit.nom}"></td>
                            <td class="num mono" th:text="${stock.quantite}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(stockDisponible)}">
                            <td colspan="2">
                                <div class="vide">
                                    <i class="fa-solid fa-boxes-stacked"></i>
                                    <p>Aucun stock disponible pour ce filtre.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
