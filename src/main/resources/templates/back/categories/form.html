<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{back/fragments/layout :: head(${isEdit ? 'Modifier une catégorie' : 'Nouvelle catégorie'})}"></head>

  <body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('categories')}"></aside>

    <main class="bo-main">
      <header th:replace="~{back/fragments/layout :: topbar(${isEdit ? 'Modifier une catégorie' : 'Nouvelle catégorie'})}"></header>

      <div class="bo-contenu bo-contenu-etroit">
        <div class="page-tete">
          <div>
            <p class="fil">
              <a th:href="@{/back/categories}">Catégories</a>
              <i class="fas fa-chevron-right"></i>
              <span th:text="${isEdit ? 'Modification' : 'Création'}"></span>
            </p>
            <h1 th:text="${isEdit ? 'Modifier la catégorie' : 'Ajouter une nouvelle catégorie'}"></h1>
          </div>
        </div>

        <th:block th:replace="~{back/fragments/layout :: alertes}"></th:block>

        <form
          method="post"
          enctype="multipart/form-data"
          th:action="${isEdit ? '/back/categories/modifier/' + categorie.id : '/back/categories/nouveau'}"
          class="carte"
        >
          <div class="carte-corps">
            <input type="hidden" name="id" th:value="${categorie.id}" />

            <div class="champ">
              <label for="libelle">Libellé de la catégorie</label>
              <input
                type="text"
                id="libelle"
                name="libelle"
                th:value="${categorie.libelle}"
                placeholder="Ex : Fromages"
                required
              />
            </div>

            <div class="champ">
              <label for="image">Image de la catégorie</label>
              <div th:if="${isEdit && categorie.image != null}" style="margin-bottom: 10px;">
                <img th:src="@{${categorie.image}}" alt="Image actuelle"
                     style="max-width: 160px; max-height: 160px; border-radius: 12px; border: 1px solid #e2e2e2; object-fit: cover;" />
                <p class="aide">Image actuelle. Choisissez un fichier pour la remplacer.</p>
              </div>
              <input type="file" id="image" name="image" accept="image/*" />
              <img id="apercuImage" alt="Aperçu" style="display:none; max-width: 160px; max-height: 160px; margin-top: 10px; border-radius: 12px; object-fit: cover;" />
              <span class="aide">Formats image (jpg, png…). Facultatif.</span>
            </div>
          </div>

          <div class="carte-pied flex gap-12 aligne-centre">
            <button type="submit" class="btn btn-vert">
              <i class="fas fa-floppy-disk"></i> Enregistrer
            </button>
            <a th:href="@{/back/categories}" class="btn btn-ligne">Annuler</a>
          </div>
        </form>
      </div>

      <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>

    <script>
      // Aperçu de l'image avant upload
      const imageInput = document.getElementById("image");
      const apercuImage = document.getElementById("apercuImage");
      if (imageInput) {
        imageInput.addEventListener("change", function () {
          const file = imageInput.files[0];
          if (file) {
            apercuImage.src = URL.createObjectURL(file);
            apercuImage.style.display = "block";
          } else {
            apercuImage.style.display = "none";
          }
        });
      }
    </script>
  </body>
</html>
