<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head th:replace="~{back/fragments/layout :: head('Paiement avance')}"></head>

<body class="bo">
    <aside th:replace="~{back/fragments/layout :: sidebar('paiements')}"></aside>

    <main class="bo-main">
        <header th:replace="~{back/fragments/layout :: topbar('Paiements')}"></header>

        <div class="bo-contenu bo-contenu-etroit">

            <div class="page-tete">
                <div>
                    <p class="fil"><a th:href="@{/back/paiements/list}">Paiements</a> / Avance</p>
                    <h1>Paiement de l'avance</h1>
                </div>
            </div>

            <div th:if="${alert != null}" th:text="${alert}" class="alerte alerte-erreur"></div>
            <div th:if="${succes != null}" th:text="${succes}" class="alerte alerte-succes"></div>

            <form th:action="@{|/back/paiements/avance/${commande.id}|}" method="POST">
                <div class="carte">
                    <div class="carte-tete">
                        <h2><i class="fa-solid fa-money-bill-wave"></i> Commande #<span th:text="${commande.id}"></span></h2>
                    </div>
                    <div class="carte-corps">
                        <dl class="fiche">
                            <dt>Montant total à payer</dt>
                            <dd class="mono texte-ocre" th:text="${montantTotal}"></dd>

                            <dt>Frais de livraison</dt>
                            <dd class="mono" th:text="${commande.fraisLivraison}"></dd>

                            <dt>Avance à payer</dt>
                            <dd class="mono texte-ocre" th:text="${avanceAPayer}"></dd>
                        </dl>

                        <div class="champ">
                            <label>Mode de paiement</label>
                            <div class="choix-ligne">
                                <div th:each="t : ${typesPaiement}" class="choix-pastille">
                                    <input type="radio" th:id="${'type-' + t}" name="typePayement" th:value="${t}" checked>
                                    <label th:for="${'type-' + t}" th:text="${t}"></label>
                                </div>
                            </div>
                        </div>

                        <!-- Mobile Money : le montant n'est pas saisi, c'est l'avance calculée. -->
                        <input type="hidden" id="montant" name="montant" th:value="${avanceAPayer}">

                        <div class="champ">
                            <label>Numéros de transfert</label>
                            <div class="liste-coche" style="max-height: none;">
                                <p th:each="numero : ${numerosTransfert}" th:text="${numero}" style="margin: 0; padding: 4px 0;"></p>
                            </div>

                            <label for="messageMobileMoney" style="margin-top: 12px;">Message (facultatif)</label>
                            <input type="text" id="messageMobileMoney" name="messageMobileMoney"
                                placeholder="Référence du transfert, remarque...">

                            <p class="sous-titre" style="margin-top: 8px;">
                                <i class="fa-solid fa-circle-info"></i>
                                L'entrée de trésorerie ne sera créée qu'après confirmation manuelle de l'avance.
                            </p>
                        </div>

                        <div class="barre-form">
                            <button type="submit" class="btn btn-vert"><i class="fa-solid fa-check"></i> Payer</button>
                        </div>
                    </div>
                </div>
            </form>

        </div>

        <footer th:replace="~{back/fragments/layout :: pied}"></footer>
    </main>
</body>

</html>
